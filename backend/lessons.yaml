courses:

  # ============================================================
  # COURSE 1 — Prompt Engineering Fundamentals
  # ============================================================
  - slug: prompt-engineering-fundamentals
    title: "Prompt Engineering Fundamentals"
    tagline: "Learn to talk to AI like you mean it."
    description: >
      Five hands-on lessons covering the core techniques that separate
      good prompts from bad ones. You write real prompts, see real outputs,
      and get graded on what actually matters.
    icon: "🎸"
    tier: 3
    lessons:

      - slug: opening-act
        number: 1
        title: "The Opening Act"
        tagline: "Every rock legend starts somewhere."
        difficulty: beginner
        lesson_type: prompt
        challenge: |
          Write a prompt that gets the AI to explain how electric guitars make sound —
          to a curious 8-year-old who has never touched one.
        instructions: |
          A great prompt is like a great song intro. It sets the vibe, tells the
          performer exactly what you need, and leaves no room for confusion.

          Things to think about before you write:
          — Who is your audience? (You should tell the AI.)
          — What exactly needs explaining?
          — Should there be analogies? How long? What tone?

          There's no single right answer. But there are definitely better and worse ones.
        rubric:
          - criterion: Audience specified in the prompt
            points: 20
            hint: Did you tell the AI this is for an 8-year-old?
            question: Paste the exact phrase in your prompt that specifies who the explanation is for.
          - criterion: Analogy present in the output
            points: 20
            hint: Did the output use a real-world comparison a kid would recognise?
            question: What analogy appeared in the output? Quote or describe it. Did your prompt request one explicitly?
          - criterion: Age-appropriate language throughout
            points: 20
            hint: Would an actual 8-year-old understand every sentence?
            question: Quote a sentence from the output that shows the language is pitched right. Why does it work for a kid?
          - criterion: Physically accurate explanation
            points: 20
            hint: Is the underlying science correct?
            question: How did the output explain the actual physics? Summarise the key mechanism it described — was it accurate?
          - criterion: Engaging and fun to read
            points: 20
            hint: Would a kid actually want to finish reading this?
            question: What specific element of the output makes it engaging for a child? Quote or describe the most effective part.
        max_tokens: 400

      - slug: context-is-king
        number: 2
        title: "Context is King"
        tagline: "Tell the AI who it's dealing with."
        difficulty: beginner
        lesson_type: prompt
        challenge: |
          Write a prompt asking for advice on whether to quit your job to start a band.
          But load it with context: your age, your financial situation, your music
          experience, and what's actually holding you back.

          The goal is to get personalised, specific advice — not a fortune cookie.
        instructions: |
          Context is the difference between a fortune cookie and actual advice.

          Without context, the AI has to guess. With context, it can be specific.
          The more relevant detail you give, the more useful the output.

          Things to include:
          — Age and life stage (early career? family commitments?)
          — Financial situation (savings runway, income, dependents)
          — Music experience level
          — What the real fear is

          Don't just add words. Add signal.
        rubric:
          - criterion: At least 3 pieces of personal context provided
            points: 20
            hint: Age, finances, experience, fears — did you include at least 3?
            question: List the context details you included. Name at least 3 (e.g. age, savings, years of playing, specific fear).
          - criterion: Response is personalised to the context given
            points: 20
            hint: Does the advice change based on the specifics you provided?
            question: Give one specific example where the advice directly addressed a detail you provided. Quote or paraphrase it.
          - criterion: Response addresses financial risk specifically
            points: 20
            hint: Does the output engage with the money angle you provided?
            question: How did the output engage with the financial situation you described? Was it vague or specific?
          - criterion: Response acknowledges emotional or personal dimension
            points: 20
            hint: Does it address what's actually at stake beyond money?
            question: What personal or emotional factor did the output acknowledge? What did it say about it?
          - criterion: Advice is actionable rather than generic
            points: 20
            hint: Could this advice apply to literally anyone, or is it tailored?
            question: Give the most specific, actionable recommendation from the output. Would it apply to anyone, or only to your situation?
        max_tokens: 500

      - slug: persona-play
        number: 3
        title: "Persona Play"
        tagline: "The model wears whatever mask you give it."
        difficulty: beginner
        lesson_type: prompt
        challenge: |
          Write a prompt that asks the AI to respond as a grizzled 1970s rock producer —
          the kind who's seen it all, has no patience for excuses, but genuinely wants
          you to succeed.

          Give that character this task: critique the lyric —
          "I walk alone down the road of life, carrying my heart like a knife."

          The persona should come through in every sentence.
        instructions: |
          A persona prompt has two jobs: tell the AI *who* it is, and give it something
          to actually do. Most people nail one and fumble the other.

          To make the persona stick:
          — Give it a name or clear archetype (not just "an expert")
          — Give it a voice: formal? terse? profane? warm?
          — Give it a backstory detail or two
          — Give it an opinion — bland personas give bland answers

          The task (critique the lyric) stays fixed. The persona is your variable.
        rubric:
          - criterion: Persona is specific and named or clearly described
            points: 20
            hint: '"Rock producer" alone is thin. Does your prompt add texture?'
            question: Paste the part of your prompt that defines who the AI should be. How specific did you get?
          - criterion: Persona voice is consistent throughout the response
            points: 20
            hint: Does it sound like the same character from first sentence to last?
            question: Quote the sentence from the output that best captures the character's voice. Why does it work?
          - criterion: Feedback engages with the actual lyric content
            points: 20
            hint: Does the response actually analyse the lyric, not just the concept?
            question: What did the character say specifically about the lyric "carrying my heart like a knife"? Quote or summarise.
          - criterion: Persona has a clear opinion (not wishy-washy)
            points: 20
            hint: Does the character take a stance, or hedge everything?
            question: What was the character's verdict on the lyric? Positive, negative, or mixed — and how strongly stated?
          - criterion: Response stays in character under pressure of critique
            points: 20
            hint: Does the character give real criticism without breaking the persona?
            question: Did the persona stay consistent when delivering criticism? Give an example of where it held or broke.
        max_tokens: 450

      - slug: iteration-game
        number: 4
        title: "The Iteration Game"
        tagline: "Your first prompt is never your best one."
        difficulty: intermediate
        lesson_type: prompt
        challenge: |
          Rewrite this weak prompt into something sharp and specific:

          WEAK: "Write something about climate change."

          You decide the format, audience, angle, and length constraints.
          Submit your improved version. The grader will assess how well you
          addressed what made the original weak.
        instructions: |
          "Write something about climate change" fails on every dimension:
          — No format (essay? tweet? poem? briefing?)
          — No audience (scientist? child? politician?)
          — No angle (cause? solutions? local impact? economics?)
          — No length or scope
          — No tone

          Your rewrite should fix at least four of those. The goal isn't a longer
          prompt — it's a sharper one. A 30-word prompt that's specific beats a
          200-word one that isn't.
        rubric:
          - criterion: Format explicitly specified
            points: 20
            hint: Did you say what kind of writing you want (essay, list, brief, etc.)?
            question: What format did you request? Paste the instruction from your prompt that specifies it.
          - criterion: Target audience identified
            points: 20
            hint: Does your prompt say who this is for?
            question: Who did you write this for? Quote your audience specification from the prompt.
          - criterion: Specific angle or argument scoped
            points: 20
            hint: Did you narrow "climate change" to a specific aspect or argument?
            question: What specific aspect of climate change did you focus on? Quote your angle from the prompt.
          - criterion: Length or scope constrained
            points: 20
            hint: Did you give the model a sense of how long or detailed to be?
            question: How did you constrain scope or length? Quote the constraint from your prompt.
          - criterion: Output is genuinely useful for the stated purpose
            points: 20
            hint: Would a real person use this output for the stated goal?
            question: Who would realistically use this output, and what would they do with it? Be specific — not just "anyone interested in climate."
        max_tokens: 500

      - slug: chain-of-thought
        number: 5
        title: "Chain of Thought"
        tagline: "Ask it to show its working."
        difficulty: intermediate
        lesson_type: prompt
        challenge: |
          Write a prompt that solves this problem — but requires the AI to show
          its reasoning step by step before giving a final answer:

          A band has 4 members. They earn £12,000 from a tour.
          The drummer gets a 25% bonus because she owns the van.
          The remaining amount is split equally.
          How much does each person take home?

          Your prompt must explicitly instruct the model to reason through it.
          The answer alone gets no credit.
        instructions: |
          Chain-of-thought (CoT) prompting is one of the most powerful techniques
          in the toolkit. By asking the model to reason before concluding, you
          dramatically reduce errors on multi-step problems.

          The magic phrase isn't magic — it's explicit permission:
          — "Think through this step by step before answering"
          — "Show your working"
          — "Reason out loud, then give your final answer"

          What you're graded on: did your prompt actually produce visible reasoning,
          or did it just produce a number? The process is the point.
        rubric:
          - criterion: Prompt explicitly requests step-by-step reasoning
            points: 20
            hint: Does your prompt contain an instruction to reason before answering?
            question: Paste the exact phrase you used to request step-by-step reasoning from the AI.
          - criterion: Response shows intermediate calculation steps
            points: 20
            hint: Can you follow the working, or does the answer just appear?
            question: Quote one intermediate calculation step from the output — something between the problem statement and the final answer.
          - criterion: Drummer bonus calculated correctly in the reasoning
            points: 20
            hint: Is £3,000 (25% of £12,000) identified as the bonus?
            question: What did the output calculate as the drummer's bonus? Show the exact working it used.
          - criterion: Remaining split calculated correctly
            points: 20
            hint: Is £9,000 / 4 = £2,250 shown and correct?
            question: How did the output calculate each remaining member's share? Quote the working.
          - criterion: Final answer clearly separated from the working
            points: 20
            hint: Does the response distinguish "here's my reasoning" from "here's the answer"?
            question: How did the output present the final answer as distinct from the reasoning? Quote the final answer section.
        max_tokens: 500

  # ============================================================
  # COURSE 2 — GMP Essentials
  # ============================================================
  - slug: gmp-essentials
    title: "GMP Essentials"
    tagline: "The rules that keep medicines safe."
    description: >
      Five lessons covering the fundamentals of Good Manufacturing Practice.
      No multiple choice — you write real answers to real questions and get
      graded on accuracy, depth, and understanding.
    icon: "🏭"
    tier: 2
    lessons:

      - slug: gmp-what-is-gmp
        number: 1
        title: "What is GMP?"
        tagline: "The foundation everything else is built on."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Good Manufacturing Practice (GMP) is a regulatory framework that ensures products are consistently manufactured and controlled to quality standards appropriate for their intended use. It was developed in direct response to historical disasters — most notably the 1937 sulfanilamide mass poisoning in the United States, where over 100 people died because a solvent was used without safety testing, and the thalidomide tragedy of the late 1950s, which caused severe birth defects when a sedative was marketed without adequate testing. These events demonstrated that relying on manufacturers to self-regulate was insufficient, and GMP regulations were created to mandate minimum standards.

          GMP applies across pharmaceuticals, biologics, medical devices, active pharmaceutical ingredients (APIs), food, and cosmetics. In the pharmaceutical sector, the regulations are set and enforced by national authorities: the FDA in the United States (21 CFR Parts 210/211), the EMA in the European Union (EU GMP Annex guidelines), and the MHRA in the United Kingdom. International harmonisation is driven by the ICH (International Council for Harmonisation), particularly ICH Q10, which defines the Pharmaceutical Quality System framework and underpins how modern GMP is interpreted globally.

          The core pillars of GMP are: qualified and trained personnel; premises and equipment that are fit for purpose and properly maintained; well-written and controlled procedures (SOPs); thorough contemporaneous documentation; rigorous quality control testing; validated processes and cleaning methods; and robust change control to manage modifications. Together, these pillars create a system where every batch produced is demonstrably safe, effective, and of consistent quality — and where any failure can be identified, investigated, and corrected.
        challenge: |
          In your own words, explain what Good Manufacturing Practice (GMP) is,
          who it applies to, and why it was developed.

          Imagine you are explaining it to a new colleague on their first day
          in a pharmaceutical company. They are smart but have no prior GMP knowledge.
        instructions: |
          GMP is a system of controls applied to manufacturing to ensure products
          are consistently produced and controlled to the quality standards
          appropriate for their intended use.

          Think about:
          — Why GMP was developed (what went wrong historically)
          — Which industries and product types it covers
          — Who creates and enforces the regulations
          — What the core principles are
          — What the consequences of non-compliance look like
        rubric:
          - criterion: Core definition is accurate
            points: 20
            hint: Does the answer correctly define GMP and its fundamental purpose?
            question: Write your definition of GMP in 2–3 sentences. What is it, and what does it aim to achieve?
          - criterion: Scope correctly identified
            points: 20
            hint: Does the answer identify which industries or product types GMP applies to?
            question: Which industries or product types does GMP apply to? Name at least 3.
          - criterion: Historical rationale and patient safety
            points: 20
            hint: Does the answer explain why GMP was developed, with reference to safety consequences?
            question: Why was GMP developed? What problem does it solve? Mention a historical event or consequence that drove its creation.
          - criterion: Regulatory framework referenced
            points: 20
            hint: Does the answer name regulatory bodies or guidelines that set GMP standards?
            question: Name at least two regulatory authorities or guidelines (e.g. FDA, EMA, ICH Q10) that set or enforce GMP. What do they govern?
          - criterion: Core GMP principles identified
            points: 20
            hint: Does the answer identify at least 3 of the core GMP pillars?
            question: What are the core principles or pillars of GMP? Name and briefly describe at least 3 (e.g. personnel, documentation, premises, equipment, production, QC).

      - slug: gmp-documentation
        number: 2
        title: "Documentation"
        tagline: "If it wasn't written down, it didn't happen."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          GMP's most important principle is often quoted as: "If it wasn't written down, it didn't happen." This is not a philosophical stance — it is a regulatory one. In a GMP environment, any action that cannot be demonstrated through documentation is treated as though it did not occur. Documentation serves two essential purposes: it proves that processes were followed correctly at the time, and it provides the traceability needed to investigate failures and protect patients if something goes wrong.

          The main document types in a GMP operation include: Batch Manufacturing Records (BMRs), which capture every step, measurement, and check performed during production of a specific batch; Standard Operating Procedures (SOPs), which define precisely how tasks must be carried out; equipment logbooks; deviation and out-of-specification (OOS) reports; change control records; and qualification and validation documentation. Each type serves a specific function within the quality system. Regulators expect to see all of these during inspections, and gaps are treated as critical findings.

          The gold standard for data quality in GMP records is the ALCOA+ framework. Data must be: Attributable (you can tell who did what and when), Legible (readable now and in the future), Contemporaneous (recorded at the moment the action was taken, not reconstructed later), Original (the first recorded observation), and Accurate. The "+" extends this to: Complete, Consistent, Enduring, and Available. When an error is made in a paper GMP record, the correct procedure is a single line through the error, leaving the original text readable, with the author's initials and the date of correction beside it. Using correction fluid, overwriting, or obscuring entries are serious data integrity violations.
        challenge: |
          GMP's most important principle is often quoted as:
          "If it wasn't written down, it didn't happen."

          Explain what this means in practice, what kinds of documents GMP requires,
          and what the consequences of poor documentation are — for the patient,
          the company, and the regulator.
        instructions: |
          Documentation in GMP serves two purposes: it proves that processes were
          followed correctly, and it enables investigation and traceability if
          something goes wrong.

          Think about:
          — Batch records, SOPs, logbooks, change control documents, deviation reports
          — ALCOA+ principles (the gold standard for data integrity)
          — What "contemporaneous" recording means and why it matters
          — What regulators look for during an inspection
          — The difference between a transcription error and falsification
        rubric:
          - criterion: Core documentation principle understood
            points: 20
            hint: Does the answer capture what "written down" means in the GMP context, and why?
            question: In your own words, explain why "if it wasn't written down, it didn't happen" is fundamental to GMP. What does it mean in day-to-day practice?
          - criterion: Key document types identified
            points: 20
            hint: Does the answer list at least 4 distinct GMP document types with their purpose?
            question: Name at least 4 types of documents required in a GMP environment (e.g. SOPs, batch manufacturing records). What is each one used for?
          - criterion: ALCOA or data integrity principles explained
            points: 20
            hint: Does the answer address ALCOA, ALCOA+, or data integrity requirements accurately?
            question: What does ALCOA (or ALCOA+) stand for? Explain at least 3 of its principles and why each one matters for GMP records.
          - criterion: Consequences of poor documentation described
            points: 20
            hint: Does the answer explain specific consequences — regulatory, safety, or operational?
            question: What are the consequences of poor documentation in a GMP environment? Give at least 2 specific examples (regulatory action, product recall, patient harm, etc.).
          - criterion: Good documentation practice described
            points: 20
            hint: Does the answer describe correct habits including error correction?
            question: Describe at least 3 principles of good documentation practice (GDP). What is the correct way to correct an error in a GMP record — and what must never be done?

      - slug: gmp-contamination-control
        number: 3
        title: "Contamination Control"
        tagline: "Keeping the product — and the patient — safe."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Contamination in pharmaceutical manufacturing falls into four main categories: physical contamination (particles, glass, rubber, fibres), chemical contamination (cleaning agents, lubricants, cross-contamination from other products), microbiological contamination (bacteria, mould, endotoxins), and cross-contamination from other active ingredients. Each presents a distinct risk to patient safety, and GMP requires specific controls for all of them. Cross-contamination is of particular concern in multi-product facilities, where highly potent or sensitising compounds can render an entire batch of another product unsafe if transfer occurs.

          Facility and environmental design are the first line of defence. Clean rooms are classified by their permitted particle counts: EU GMP Grades A, B, C, and D (equivalent to ISO Classes 5, 7, and 8) define increasingly stringent environments for sterile manufacturing. Pressure differentials between areas prevent airflow from lower-grade to higher-grade zones. HVAC systems must maintain defined temperature, humidity, and air change rates, and environmental monitoring programmes continuously sample viable (microbiological) and non-viable (particle) contamination. HEPA filtration, unidirectional airflow in Grade A zones, and surface finishes that can withstand repeated sanitisation are all essential design features.

          Personnel are the most significant contamination source in a GMP environment. Humans shed skin cells, hair, and microorganisms continuously. Gowning requirements — which become increasingly stringent as grade increases, reaching full sterile gowns with hoods, goggles, two pairs of gloves, and overshoes for Grade A/B areas — create a physical barrier between the person and the product. Cleaning validation is a formal programme that demonstrates a cleaning process can consistently remove product residues, cleaning agents, and microbiological contamination to defined acceptable limits, and is a requirement before any shared equipment or facility can be used for a different product.
        challenge: |
          Pharmaceutical contamination is one of the most serious risks in
          GMP manufacturing. Describe the main types of contamination, explain
          how they can occur, and outline the key GMP controls that prevent them.
        instructions: |
          Contamination in pharmaceuticals can be physical (particles, glass),
          chemical (cleaning agents, lubricants), microbiological (bacteria, mould),
          or cross-contamination from other products.

          Think about:
          — Clean room classifications (EU GMP Annex 1, ISO)
          — Gowning requirements and personnel as a contamination source
          — Environmental monitoring programmes
          — Cleaning validation and its requirements
          — Cross-contamination controls in multi-product facilities
        rubric:
          - criterion: Contamination types correctly identified
            points: 20
            hint: Does the answer correctly identify physical, chemical, microbiological, and cross-contamination?
            question: List the main types of contamination in pharmaceutical manufacturing. Give one practical example of each type.
          - criterion: Facility and environmental controls described
            points: 20
            hint: Does the answer cover clean room classification or environmental monitoring accurately?
            question: How do facility design and environmental monitoring programmes prevent contamination? Mention clean room classifications or grades if you know them.
          - criterion: Personnel as a contamination source addressed
            points: 20
            hint: Does the answer address personnel hygiene, gowning, and behaviour controls?
            question: How can personnel introduce contamination into a manufacturing area? What GMP controls address this — describe gowning requirements or hygiene expectations.
          - criterion: Cleaning and cleaning validation explained
            points: 20
            hint: Does the answer correctly explain what cleaning validation is and what it must demonstrate?
            question: What is cleaning validation, and why is it required in GMP? What does a cleaning validation programme need to demonstrate?
          - criterion: Cross-contamination prevention described
            points: 20
            hint: Does the answer give at least 2 specific controls for preventing cross-contamination between products?
            question: What is cross-contamination, and how is it prevented in a facility that manufactures more than one product? Give at least 2 specific engineering or procedural controls.

      - slug: gmp-equipment-facilities
        number: 4
        title: "Equipment and Facilities"
        tagline: "Qualified, calibrated, and fit for purpose."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          GMP requires that all equipment used in manufacturing is qualified before use and maintained in a qualified state throughout its operational life. The qualification lifecycle has four stages: Design Qualification (DQ) — documenting that the proposed design meets the user's requirements; Installation Qualification (IQ) — verifying that the equipment is installed correctly per the manufacturer's specification; Operational Qualification (OQ) — demonstrating that it operates within defined parameters under all anticipated conditions; and Performance Qualification (PQ) — confirming it consistently performs as intended under real production conditions. No equipment should be used in GMP manufacturing until IQ and OQ (at minimum) are complete, and PQ is required before routine batch production.

          Calibration ensures that measurement instruments — balances, thermometers, pressure gauges, flow meters — are accurate and traceable to national or international standards. GMP requires calibration programmes with defined intervals, and any instrument found to be out of calibration must trigger a formal investigation: all results obtained with that instrument since its last successful calibration are potentially compromised and must be assessed. Change control is the formal process through which any modification to qualified equipment, facilities, utilities, or systems is assessed, approved, documented, and re-qualified before the change is implemented in production. It exists to ensure that changes do not inadvertently introduce new risks.

          GMP facility design follows several key principles: segregation of operations to prevent mix-up and cross-contamination (separate areas for different products, different stages, quarantine versus released materials); unidirectional material and personnel flows to reduce contamination risk; surfaces (floors, walls, ceilings) that are smooth, impermeable, and cleanable; adequate drainage without backflow risk; and qualified utilities including Purified Water, Water for Injection, compressed air, and clean steam, each of which has its own specification and monitoring programme.
        challenge: |
          GMP places strict requirements on the equipment and facilities used in
          pharmaceutical manufacturing. Explain the qualification lifecycle for
          equipment and the key facility design principles that support GMP compliance.
        instructions: |
          Equipment qualification follows a lifecycle: Design Qualification (DQ),
          Installation Qualification (IQ), Operational Qualification (OQ), and
          Performance Qualification (PQ). Ongoing compliance requires calibration,
          preventive maintenance, and change control.

          For facilities, think about:
          — Segregation and material flow to prevent mix-ups and contamination
          — HVAC design (pressure differentials, air changes, temperature/humidity)
          — Drainage, surfaces, and cleanability
          — Utility qualification (purified water, compressed air, steam)
        rubric:
          - criterion: Qualification stages correctly described
            points: 20
            hint: Does the answer correctly describe DQ, IQ, OQ, and PQ and what each verifies?
            question: Describe the four stages of equipment qualification — DQ, IQ, OQ, and PQ. What does each stage verify, and in what order do they occur?
          - criterion: Calibration requirements explained
            points: 20
            hint: Does the answer explain what calibration is and why it is required in GMP?
            question: What is calibration in the GMP context, and why is it required? What should happen if a critical instrument is found to be out of calibration?
          - criterion: Facility design principles covered
            points: 20
            hint: Does the answer cover at least 3 GMP facility design considerations accurately?
            question: What are the key design principles for a GMP manufacturing facility? Include at least 3 considerations — think about separation, material flow, HVAC, surfaces, or drainage.
          - criterion: Change control explained
            points: 20
            hint: Does the answer explain what change control is and why it matters for qualified equipment?
            question: What is change control, and why is it critical for GMP equipment and facilities? What must happen before a modified piece of equipment is used in production?
          - criterion: Cleaning validation for equipment addressed
            points: 20
            hint: Does the answer explain cleaning validation requirements for manufacturing equipment?
            question: What must a cleaning validation programme for manufacturing equipment demonstrate? Name at least 3 parameters or tests it typically covers.

      - slug: gmp-audits-compliance
        number: 5
        title: "Audits and Compliance"
        tagline: "Verification, deviation, and the culture of quality."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          GMP audits exist to verify that a manufacturing operation is complying with applicable regulations and its own procedures. There are three main types: internal audits (also called self-inspections), which a company conducts on itself on a regular schedule to identify gaps before regulators do; supplier or vendor audits, which assess the GMP compliance of contract manufacturers, API suppliers, or other third parties in the supply chain; and regulatory inspections, conducted by authorities such as the FDA, MHRA, or EMA. Regulatory inspections may be routine, triggered by a specific concern, or conducted as part of a marketing authorisation application review. Findings are classified by severity — typically critical (direct patient risk), major (significant but not immediately critical), and minor (observation-level).

          When something goes wrong in a GMP operation, it generates a deviation — a departure from an approved procedure or specification. Deviations must be formally reported, classified by impact, investigated for root cause, and closed through a Corrective and Preventive Action (CAPA) plan. The CAPA distinguishes between corrective actions (fixing the current problem) and preventive actions (changing systems to prevent recurrence). Root cause analysis — identifying the true underlying cause rather than the immediate symptom — is the critical step that determines whether the CAPA will be effective. A weak root cause investigation leads to a CAPA that addresses symptoms and allows the problem to recur.

          Serious regulatory findings lead to formal written responses from the manufacturer, and depending on severity, to Warning Letters (FDA), GMP non-compliance statements (EMA), or import alerts that prevent products from entering a market. Manufacturing licences can be suspended. Products can be recalled. Behind all of this is the concept of "quality culture" — the attitudes, behaviours, and leadership that determine whether GMP is genuinely lived or merely documented. A strong quality culture means people raise concerns, deviations are investigated honestly, and systemic problems are fixed rather than papered over. Regulators increasingly assess quality culture directly during inspections.
        challenge: |
          GMP compliance doesn't police itself. Describe the main types of GMP
          audits and inspections, explain how deviations and non-conformances are
          managed, and outline what happens when a regulatory inspection finds
          serious failures.
        instructions: |
          Audits can be internal (self-inspection), supplier/vendor, or regulatory
          (conducted by authorities such as the MHRA, FDA, or EMA).

          Non-conformances trigger a formal process: deviation report, root cause
          analysis, and CAPA (Corrective and Preventive Action).

          Serious regulatory findings lead to warning letters, import alerts, or
          manufacturing licence suspension. Behind all of this is "quality culture" —
          the attitudes and behaviours that determine whether GMP is lived or just
          documented.
        rubric:
          - criterion: Audit types correctly identified
            points: 20
            hint: Does the answer describe internal, supplier, and regulatory audits and their distinct purposes?
            question: Describe the three main types of GMP audit — internal, supplier, and regulatory. What is the purpose of each, and who conducts them?
          - criterion: Deviation management process described
            points: 20
            hint: Does the answer explain the steps from deviation detection through to closure?
            question: What is a deviation in a GMP context? Describe the typical steps taken when a deviation occurs — from initial detection through investigation to formal closure.
          - criterion: CAPA correctly explained
            points: 20
            hint: Does the answer correctly distinguish corrective from preventive action with examples?
            question: What does CAPA stand for? Explain the difference between a corrective action and a preventive action, and give one example of each.
          - criterion: Regulatory consequences described
            points: 20
            hint: Does the answer name at least 2 specific regulatory actions that can follow a failed inspection?
            question: What regulatory actions can follow a failed GMP inspection? Name and briefly describe at least 2 (e.g. warning letters, import alerts, licence suspension).
          - criterion: Quality culture articulated
            points: 20
            hint: Does the answer go beyond procedure-following to address the human and organisational dimension?
            question: Why is "quality culture" considered essential for sustainable GMP compliance? What distinguishes a genuine quality culture from a box-ticking approach?

  # ============================================================
  # COURSE 3 — Security+ Readiness
  # ============================================================
  - slug: security-plus-readiness
    title: "Security+ Readiness"
    tagline: "Prep for the most popular entry-level security certification."
    description: >
      Five lessons covering the core CompTIA Security+ domains. No memorising
      definitions — you explain concepts, walk through scenarios, and justify
      decisions. Graded by AI on accuracy, depth, and practical reasoning.
    icon: "🛡️"
    tier: 2
    lessons:

      - slug: secplus-threats-vulnerabilities
        number: 1
        title: "Threats and Vulnerabilities"
        tagline: "Know your enemy before you can defend against them."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          A threat is any potential event or actor that could cause harm to a system; a vulnerability is a weakness that a threat can exploit; and a risk is the likelihood and impact of a threat successfully exploiting a vulnerability. These three concepts are foundational to Security+ and to real-world security work. Understanding the taxonomy of threats — who the adversaries are, what they want, and how they operate — is the starting point for building effective defences. Threat actors range from script kiddies using off-the-shelf tools to nation-state APTs (Advanced Persistent Threats) with substantial resources and long-term objectives.

          Attack types covered in Security+ include: malware (viruses, worms, Trojans, ransomware, spyware, rootkits, keyloggers — each with distinct propagation and payload behaviours); social engineering attacks (phishing, spear phishing, vishing, smishing, pretexting, tailgating); and technical exploitation techniques including SQL injection, buffer overflows, cross-site scripting (XSS), privilege escalation, and man-in-the-middle attacks. Phishing remains the leading initial access vector for enterprise breaches because it targets humans, not technology — and humans are harder to patch than software.

          Vulnerability management is the ongoing process of identifying, classifying, prioritising, remediating, and verifying vulnerabilities in systems and applications. Key concepts include: CVE (Common Vulnerabilities and Exposures) identifiers that give vulnerabilities a standard reference; CVSS (Common Vulnerability Scoring System) scores that rate severity from 0–10; zero-day vulnerabilities, which are unknown to the vendor and have no available patch; and the distinction between vulnerability scanning (finding weaknesses) and penetration testing (actively exploiting them to assess real-world impact). Defenders must understand attackers' tools and techniques — including the MITRE ATT&CK framework, which catalogues real adversary tactics and techniques — to build meaningful detection and response capabilities.
        challenge: |
          Security+ expects you to identify, classify, and reason about threats
          and vulnerabilities — not just name them.

          Answer the five questions below. For each one, go beyond definitions:
          explain the mechanism, give an example, or describe what a defender
          should do in response.
        instructions: |
          Key areas this lesson covers:
          — Malware categories: virus, worm, trojan, ransomware, rootkit, spyware, keylogger, fileless
          — Social engineering: phishing, spear phishing, vishing, whaling, pretexting, baiting, tailgating
          — Attack types: active vs passive, DoS/DDoS, MITM, injection, privilege escalation
          — Vulnerability concepts: CVEs, zero-days, patch management, vulnerability scanning vs pen testing
          — Threat actors: script kiddies, insiders, APTs, hacktivists, nation-states
        rubric:
          - criterion: Malware types correctly distinguished
            points: 20
            hint: Does the answer accurately explain the differences between malware categories, not just list names?
            question: >
              Explain the difference between a virus, a worm, and a trojan. Then describe ransomware:
              how does it work mechanically, and why has it become so prevalent as an attack vector?
          - criterion: Social engineering techniques explained with mechanism
            points: 20
            hint: Does the answer explain why social engineering works, not just what the techniques are named?
            question: >
              Describe phishing, spear phishing, and pretexting. For each one, explain what makes it
              effective against its target — what psychological or situational factor does the attacker exploit?
          - criterion: Active vs passive attacks distinguished with examples
            points: 20
            hint: Does the answer correctly distinguish the two categories and give accurate examples of each?
            question: >
              Explain the difference between an active attack and a passive attack. Give two real examples
              of each, and explain why passive attacks are often harder to detect.
          - criterion: Vulnerability lifecycle understood
            points: 20
            hint: Does the answer correctly explain CVEs, zero-days, and the role of patch management?
            question: >
              What is a zero-day vulnerability, and why is it particularly dangerous? Describe the
              window of exposure between a vulnerability being discovered and a patch being applied —
              what should an organisation do during that window?
          - criterion: Threat actor types and motivations identified
            points: 20
            hint: Does the answer name at least 3 distinct threat actor types with accurate motivations?
            question: >
              Describe at least three types of threat actors (e.g. script kiddies, insiders, APTs,
              nation-states). For each, explain their typical motivation and the type of attack they
              are most likely to carry out.

      - slug: secplus-network-security
        number: 2
        title: "Network Security"
        tagline: "The perimeter is dead. Understand what replaced it."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Network security is the practice of protecting the infrastructure — physical, logical, and procedural — that data travels across. Security+ focuses on both the architectural controls that prevent attackers from reaching systems and the monitoring capabilities that detect when they do. The most fundamental architectural concept is network segmentation: dividing a network into zones with controlled communication between them, so that a compromise in one zone does not automatically spread to all others. The DMZ (demilitarised zone) is the classic example — a network segment for public-facing services (web servers, mail servers) that sits between the internet and the internal network.

          Firewalls are the primary enforcement point for network segmentation. Packet-filtering firewalls inspect individual packets against rules; stateful firewalls track connection state and can make more intelligent decisions; next-generation firewalls (NGFWs) add application awareness, intrusion prevention, and deep packet inspection. VPNs (Virtual Private Networks) extend private network access over public infrastructure using encryption. Network Access Control (NAC) systems enforce policies on what devices can connect — checking patch level, certificate validity, or endpoint security posture before granting access. IDS/IPS systems (Intrusion Detection/Prevention Systems) monitor traffic for known attack signatures or anomalous behaviour.

          Common network attacks include: port scanning and enumeration (reconnaissance); ARP poisoning and MAC flooding (attacks against Layer 2 switching); DNS poisoning (redirecting legitimate queries to malicious destinations); VLAN hopping (escaping network segmentation through switch misconfiguration); and distributed denial-of-service (DDoS), which overwhelms services with traffic. Wireless networks introduce additional attack surfaces: WEP is cryptographically broken and should never be used; WPA2 with strong passphrases is the minimum acceptable standard for most environments; WPA3 provides improved protection against offline password attacks. Rogue access points and evil twin attacks — where an attacker creates a WiFi network that mimics a legitimate one — are persistent threats in public and corporate environments.
        challenge: |
          Network security is one of the largest Security+ domains. You need to
          understand not just what tools exist, but when and why to use them —
          and what the tradeoffs are.

          Answer the five questions below with explanation and reasoning.
        instructions: |
          Key areas this lesson covers:
          — Firewall types: packet-filtering, stateful inspection, NGFW, WAF, proxy
          — VPNs: IPSec (tunnel/transport mode), SSL/TLS VPN, split tunnelling
          — Network segmentation: DMZ, VLANs, microsegmentation
          — Insecure vs secure protocols: Telnet→SSH, HTTP→HTTPS, FTP→SFTP, SNMPv1→v3
          — Intrusion detection and prevention: IDS vs IPS, signature vs anomaly-based
          — Network Access Control, honeypots, network hardening
        rubric:
          - criterion: Firewall types correctly compared
            points: 20
            hint: Does the answer accurately distinguish stateful from stateless and explain when each is appropriate?
            question: >
              Explain the difference between a stateless (packet-filtering) firewall and a stateful
              inspection firewall. Give a scenario where a stateless firewall would miss a threat
              that a stateful firewall would catch.
          - criterion: VPN architecture understood
            points: 20
            hint: Does the answer correctly explain IPSec vs SSL VPN and identify a relevant use case for each?
            question: >
              Compare IPSec VPN and SSL/TLS VPN. In what scenarios would you choose one over the other?
              Also explain what split tunnelling is and describe the security tradeoff it creates.
          - criterion: Network segmentation purpose and design explained
            points: 20
            hint: Does the answer correctly explain DMZ architecture and why segmentation improves security posture?
            question: >
              Explain what a DMZ is and draw the logical architecture in words (what sits where, what
              can reach what). Why does placing public-facing servers in a DMZ improve security compared
              to putting them directly on the internal network?
          - criterion: Protocol vulnerabilities identified with secure replacements
            points: 20
            hint: Does the answer correctly identify at least 2 insecure protocols, explain why they are insecure, and name their replacements?
            question: >
              Name two network protocols that are considered insecure and should be replaced in a
              hardened environment. For each, explain specifically what the security weakness is
              (not just "it sends data in plain text" — what can an attacker actually do with that?)
              and name the secure alternative.
          - criterion: IDS vs IPS distinction and detection methods explained
            points: 20
            hint: Does the answer correctly distinguish IDS from IPS and explain signature vs anomaly detection with tradeoffs?
            question: >
              Explain the difference between an IDS and an IPS in terms of what each does when
              it detects suspicious traffic. Then explain the difference between signature-based
              and anomaly-based detection — what is the key weakness of each approach?

      - slug: secplus-iam
        number: 3
        title: "Identity and Access Management"
        tagline: "Who are you, what can you touch, and how do we know?"
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Identity and Access Management (IAM) is the discipline of ensuring that the right people have access to the right resources at the right times, and that this can be proven and audited. Security+ treats IAM as one of the most critical domains because identity is now the primary attack surface in most enterprise breaches: once an attacker has valid credentials, many technical controls become irrelevant. The core principle underpinning IAM is least privilege — every account, service, and process should have exactly the permissions it needs to do its job, and no more. Related concepts include need-to-know (access to information should be granted only when there is a legitimate operational requirement) and separation of duties (no single person should control an entire sensitive process).

          Authentication factors are categorised as: something you know (password, PIN), something you have (hardware token, smart card, authenticator app), and something you are (biometric — fingerprint, face, retina). Multi-factor authentication (MFA) requires two or more categories and dramatically reduces the risk of credential-based attacks. Single Sign-On (SSO) allows users to authenticate once and access multiple systems, reducing password fatigue while centralising authentication. Federated identity extends SSO across organisational boundaries using standards like SAML, OAuth 2.0, and OpenID Connect. Privileged Access Management (PAM) applies additional controls to highly privileged accounts — administrator and service accounts — including just-in-time access, session recording, and vault-based credential storage.

          Access control models determine how authorisation decisions are made. Mandatory Access Control (MAC) uses labels (Top Secret, Secret, etc.) set by the system — used primarily in government and military contexts. Discretionary Access Control (DAC) lets resource owners grant permissions — used in most operating systems. Role-Based Access Control (RBAC) assigns permissions to roles rather than individuals, making large-scale management practical. Attribute-Based Access Control (ABAC) makes decisions based on attributes of the user, resource, and environment. The account lifecycle — provisioning, modification, and especially timely deprovisioning — is a critical control area: orphaned accounts from employees who have left represent a significant attack surface.
        challenge: |
          IAM is one of the most operationally important Security+ domains. Nearly
          every breach involves a compromised identity or misconfigured access control.

          Answer the five questions below. Focus on the "why" and "what goes wrong"
          rather than just describing what things are.
        instructions: |
          Key areas this lesson covers:
          — Authentication factors: something you know, have, are, somewhere you are
          — MFA, SSO, federation (SAML, OAuth, OIDC)
          — Access control models: DAC, MAC, RBAC, ABAC
          — Least privilege, need-to-know, separation of duties, dual control
          — Account lifecycle: provisioning, review, offboarding
          — Directory services: LDAP, Active Directory
          — Credential attacks: password spraying, credential stuffing, pass-the-hash
        rubric:
          - criterion: Authentication factors explained with examples
            points: 20
            hint: Does the answer correctly describe all three (or four) factors with concrete examples?
            question: >
              Describe the three classic authentication factors — something you know, something you have,
              and something you are — with a concrete example of each. Then explain why combining two
              factors from different categories is more secure than using two from the same category.
          - criterion: MFA value explained through attack scenario
            points: 20
            hint: Does the answer explain concretely how MFA stops a specific attack, not just that "it adds a layer"?
            question: >
              An attacker has stolen a user's password through a phishing email. Walk through exactly
              what happens next if the account has MFA enabled versus no MFA. What specific actions
              does the attacker need to take to succeed despite MFA — and which MFA methods are weaker
              against those attacks?
          - criterion: Access control models compared with use cases
            points: 20
            hint: Does the answer accurately describe DAC, MAC, and RBAC with appropriate real-world contexts?
            question: >
              Compare Discretionary Access Control (DAC), Mandatory Access Control (MAC), and
              Role-Based Access Control (RBAC). For each one, describe a real-world environment
              where it would be the most appropriate model and explain why.
          - criterion: Least privilege implications understood
            points: 20
            hint: Does the answer explain least privilege and give a concrete example of what breaks without it?
            question: >
              Explain the principle of least privilege. Describe a specific, realistic scenario where
              failing to enforce least privilege leads to a security incident — walk through what
              happens step by step.
          - criterion: Account offboarding process described
            points: 20
            hint: Does the answer cover the key steps of offboarding and explain the risk of skipping them?
            question: >
              A developer leaves a company. Describe the account offboarding steps that should occur
              on their last day and in the following week. What specific risks exist if each step is
              skipped or delayed?

      - slug: secplus-cryptography
        number: 4
        title: "Cryptography"
        tagline: "The mathematics that keeps secrets secret."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Cryptography is the practice of securing information by transforming it into a form that only authorised parties can read or verify. Security+ focuses on the practical application of cryptographic concepts rather than the mathematics underneath them. The two fundamental categories are: symmetric encryption, where the same key is used to encrypt and decrypt (fast, suitable for bulk data — examples: AES, 3DES, ChaCha20); and asymmetric encryption, which uses a mathematically linked key pair — a public key to encrypt (or verify) and a private key to decrypt (or sign). Asymmetric encryption is slower but solves the key distribution problem: you can freely share your public key without compromising your private key. RSA and ECC (Elliptic Curve Cryptography) are the primary asymmetric algorithms in use.

          Hashing is a one-way function that produces a fixed-length output (digest) from any input. Unlike encryption, hashing cannot be reversed — the same input always produces the same hash, and any change to the input produces a completely different hash. Hashing is used to verify integrity (file checksums, password storage) and in digital signatures. Common algorithms include SHA-256 and SHA-3; MD5 and SHA-1 are cryptographically broken and should not be used for security purposes. Digital signatures combine hashing and asymmetric cryptography: a sender hashes a message and encrypts the hash with their private key. The recipient decrypts the hash with the sender's public key and verifies it matches the message — proving both integrity and authentication.

          PKI (Public Key Infrastructure) is the framework of policies, processes, and technology used to create, manage, distribute, and revoke digital certificates. A digital certificate binds a public key to an identity, and is signed by a Certificate Authority (CA) that vouches for that binding. TLS (Transport Layer Security) — the protocol underlying HTTPS — uses PKI to establish encrypted connections and authenticate servers. Certificate revocation (via CRL or OCSP) handles the case where a certificate is compromised before its expiry. Key concepts for Security+ include: certificate chains, root CAs, intermediate CAs, the difference between DV/OV/EV certificates, and common TLS attack vectors including downgrade attacks and certificate pinning bypass.
        challenge: |
          Cryptography questions on Security+ go beyond "AES is symmetric." You need
          to understand when and why to use different approaches, how PKI works end to
          end, and the difference between encryption and hashing.

          Answer the five questions below with enough depth to show understanding,
          not just memorisation.
        instructions: |
          Key areas this lesson covers:
          — Symmetric encryption: AES, DES/3DES, key exchange problem
          — Asymmetric encryption: RSA, ECC, Diffie-Hellman, public/private key pairs
          — Hybrid encryption (TLS uses both — why)
          — Hashing: SHA-2/SHA-3, MD5 (broken), purpose vs encryption
          — PKI: CA hierarchy, certificate chain, CRL, OCSP, certificate types
          — Digital signatures: signing with private key, verifying with public key
          — Common attacks: brute force, birthday attack, collision, downgrade
        rubric:
          - criterion: Symmetric vs asymmetric correctly explained with use cases
            points: 20
            hint: Does the answer correctly explain both approaches and identify where each is used in practice?
            question: >
              Explain the fundamental difference between symmetric and asymmetric encryption.
              Why is asymmetric encryption not used to encrypt large files directly? Describe
              how TLS solves this by combining both approaches.
          - criterion: PKI trust chain explained end to end
            points: 20
            hint: Does the answer correctly trace the chain from root CA to end-entity certificate?
            question: >
              Explain how a PKI certificate chain works, starting from the root Certificate Authority
              down to the certificate a web server presents. When your browser connects to a website
              over HTTPS, how does it verify the certificate is trustworthy? What happens if the
              certificate is expired or the issuing CA is not trusted?
          - criterion: Hashing vs encryption distinction clear
            points: 20
            hint: Does the answer correctly explain that hashing is one-way and identify appropriate use cases for each?
            question: >
              Explain the conceptual difference between hashing and encryption. A developer suggests
              storing user passwords by encrypting them with AES. Explain why this is worse than
              hashing them, and describe what additional protection a salt provides.
          - criterion: Algorithm selection reasoning demonstrated
            points: 20
            hint: Does the answer correctly explain what each algorithm is used for and why key/hash length matters?
            question: >
              For each of the following, state what it is used for and explain one key security
              property or limitation: AES-256, RSA-2048, SHA-256, MD5. Why is MD5 no longer
              considered secure for integrity verification?
          - criterion: Digital signatures explained with non-repudiation
            points: 20
            hint: Does the answer correctly describe how a digital signature is created and verified, and link it to non-repudiation?
            question: >
              Explain step by step how a digital signature is created and verified — which key signs,
              which key verifies, and what is actually being signed. How does this provide
              non-repudiation, and what would an attacker need to forge a signature?

      - slug: secplus-incident-response
        number: 5
        title: "Incident Response"
        tagline: "When something goes wrong — and it will — what do you do?"
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Incident response (IR) is the structured process an organisation follows when a security event occurs. Security+ maps IR to a defined lifecycle: Preparation (building the capability before incidents happen — policies, playbooks, tools, trained teams); Identification (detecting and confirming that an incident has occurred and scoping its extent); Containment (limiting the damage — isolating affected systems, blocking attacker access, preserving evidence); Eradication (removing the threat — eliminating malware, closing vulnerabilities, disabling compromised accounts); Recovery (restoring systems to normal operation and verifying they are clean); and Lessons Learned (post-incident review to identify what can be improved in detection, response, and prevention). This lifecycle is sometimes abbreviated as PICERL.

          The distinction between an event and an incident matters: a security event is any observable occurrence in a system (a login, a failed authentication, a network connection); a security incident is an event or series of events that has or threatens to have a significant adverse impact on the organisation. Not every alert is an incident, and triage — the process of classifying and prioritising alerts — is a core IR skill. Digital forensics is the discipline of collecting, preserving, and analysing digital evidence in a way that maintains its integrity and admissibility. Chain of custody documentation tracks who has handled evidence and when; order of volatility dictates that the most transient evidence (RAM, running processes, network connections) must be captured before less volatile evidence (disk images, logs).

          Business Continuity (BC) and Disaster Recovery (DR) are closely related to IR but focus on maintaining and restoring operations rather than the security investigation itself. Key metrics include: RPO (Recovery Point Objective — the maximum acceptable data loss, measured in time), and RTO (Recovery Time Objective — how quickly systems must be restored). Tabletop exercises test IR plans without deploying real resources; simulations and red team exercises provide more realistic testing. A mature IR capability also includes threat hunting — proactively searching for attackers who have not yet triggered automated detection — and threat intelligence, which provides context about adversary tools, techniques, and targets to improve detection and prioritisation.
        challenge: |
          Incident response is tested heavily on Security+. You need to know the
          phases, understand forensic principles, and be able to reason through
          real scenarios under pressure.

          Answer the five questions below. Several of them present scenarios —
          walk through your reasoning, not just the textbook answer.
        instructions: |
          Key areas this lesson covers:
          — IR lifecycle: Preparation, Identification, Containment, Eradication, Recovery, Lessons Learned
          — Containment strategies: isolate vs monitor, network segmentation, preserving evidence
          — Digital forensics: chain of custody, order of volatility, write blockers, disk imaging
          — Evidence types: volatile (RAM, running processes, network connections) vs non-volatile (disk)
          — Log analysis, SIEM, indicators of compromise (IoCs)
          — Communication: internal escalation, legal, regulatory notification obligations
          — Post-incident review: root cause, timeline reconstruction, control improvements
        rubric:
          - criterion: IR lifecycle phases described accurately
            points: 20
            hint: Does the answer describe all six phases with what happens in each, not just name them?
            question: >
              Describe all six phases of the incident response lifecycle — Preparation, Identification,
              Containment, Eradication, Recovery, and Lessons Learned. For each phase, give one
              concrete example of an action taken during it.
          - criterion: Containment decisions reasoned through scenario
            points: 20
            hint: Does the answer make a defensible containment decision and explain the tradeoffs rather than just saying "isolate it"?
            question: >
              At 2am, an alert fires: ransomware has been detected encrypting files on one workstation.
              The machine is connected to a shared file server used by 200 employees. Describe your
              immediate containment steps in order. What tradeoff exists between isolating the machine
              immediately versus briefly monitoring it first?
          - criterion: Chain of custody explained with consequences
            points: 20
            hint: Does the answer explain what chain of custody is and what specifically happens if it breaks?
            question: >
              Explain what chain of custody means in digital forensics and describe at least three
              steps involved in maintaining it when seizing a device. What could happen in a legal
              proceeding if chain of custody is broken — give a specific example.
          - criterion: Order of volatility explained with collection rationale
            points: 20
            hint: Does the answer list at least 4 evidence types in correct volatility order and explain why the order matters?
            question: >
              List at least four types of digital evidence in order from most volatile to least volatile.
              Explain why a forensic investigator must collect evidence in volatility order — what
              specifically is lost if you image the hard drive before capturing RAM?
          - criterion: Post-incident review purpose and output described
            points: 20
            hint: Does the answer explain the purpose of a lessons-learned review and describe what it should produce?
            question: >
              Explain the purpose of a post-incident review (lessons learned). What questions should
              it answer? What is the difference between identifying a root cause and assigning blame,
              and why does that distinction matter for a functional security team?

  # ============================================================
  # COURSE 4 — Email Security Essentials
  # ============================================================
  - slug: email-security-essentials
    title: "Email Security Essentials"
    tagline: "The most common attack vector. The least trained skill."
    description: >
      Five practical lessons covering the threats, defences, and habits that
      protect organisations and individuals from email-based attacks — from
      spotting a phish to understanding what happens after a mistaken click.
    icon: "📧"
    tier: 1
    difficulty: beginner
    lesson_type: knowledge
    lessons:

      - slug: email-phishing-recognition
        number: 1
        title: "Phishing Recognition"
        tagline: "If it looks urgent and asks you to click, slow down."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Phishing is the use of deceptive email (or other message) to trick recipients into revealing credentials, transferring money, or installing malware. It remains the most common initial access vector for enterprise breaches, not because it is technically sophisticated, but because it targets people — and people can be socially engineered in ways that firewalls and antivirus cannot easily prevent. Standard phishing casts a wide net with generic lures (fake bank alerts, parcel delivery notifications, account suspension warnings). Spear phishing is targeted: the attacker researches the target and crafts a message that references real colleagues, projects, or contexts to increase credibility. Whaling targets senior executives specifically, often using highly customised pretexts involving board matters, legal issues, or financial transactions.

          The indicators of a phishing email fall into several categories. Sender indicators include: the display name showing a trusted organisation while the actual email address does not match; subtle domain spoofing (micros0ft.com, paypa1.com, company-helpdesk.net); look-alike domains registered by attackers specifically for the campaign; and compromised legitimate accounts, which are harder to detect because the domain is genuine. Content indicators include: urgency or threat language ("your account will be suspended in 24 hours"), requests for sensitive information (legitimate organisations do not ask for passwords by email), generic greetings rather than personalised ones, and grammatical or formatting anomalies — though sophisticated attacks increasingly look professional. Technical indicators include: mismatched or suspicious URLs visible on hover, unexpected attachments (especially .zip, .exe, .doc with macros), and a discrepancy between the link text shown and the actual URL destination.

          The appropriate response to a suspected phishing email is not to forward it, not to click anything to "check if it's safe," and not to reply. Report it to your security team through the designated reporting mechanism (a report button in the email client, or the security team's email address) and delete it. If you have already clicked a link or entered credentials, report it immediately — rapid containment significantly reduces the impact of a successful phish. Many organisations run internal phishing simulations to test awareness; clicking a simulation link is a training opportunity, not a punishable offence, but it should prompt you to reflect on what indicator you missed.
        challenge: |
          Phishing is responsible for the majority of data breaches. Attackers
          craft emails that exploit urgency, authority, and familiarity to bypass
          your critical thinking.

          Answer the five questions below. Explain your reasoning — this is not
          a tick-box quiz. Real-world examples and specific indicators will score
          higher than vague generalisations.
        instructions: |
          Key areas this lesson covers:
          — Phishing vs spear-phishing vs whaling: how targeting changes the attack
          — Social engineering triggers: urgency, fear, authority, curiosity, scarcity
          — Technical indicators: mismatched URLs, lookalike domains, spoofed display names
          — Visual indicators: generic greetings, pressure language, unexpected attachments
          — Vishing and smishing: the same tactics via phone and SMS
          — Reporting procedures and why not clicking is only half the answer
        rubric:
          - criterion: Social engineering triggers identified and explained
            points: 20
            hint: Does the answer name specific psychological triggers and explain how attackers exploit them?
            question: >
              Phishing emails rely on psychological manipulation rather than technical exploits.
              Name at least three psychological triggers attackers commonly use, explain how each
              works, and give a brief example of how an attacker might use each one in an email.
          - criterion: Spear-phishing distinguished from generic phishing
            points: 20
            hint: Does the answer explain that spear-phishing is targeted, describe what personalisation attackers use, and explain why it is more dangerous?
            question: >
              Explain the difference between a generic phishing campaign and a spear-phishing attack.
              What information might an attacker gather before sending a spear-phishing email?
              Why is spear-phishing significantly harder to detect than bulk phishing?
          - criterion: Technical URL indicators correctly identified
            points: 20
            hint: Does the answer describe specific URL manipulation techniques — lookalike domains, subdomain abuse, URL shorteners — not just "check the link"?
            question: >
              A colleague receives an email with a link that displays as
              "https://paypa1.com/verify-account". Explain what is suspicious about this URL,
              describe two other URL techniques attackers use to disguise malicious links, and
              explain how you would safely investigate a suspicious link without clicking it.
          - criterion: Response procedure described accurately
            points: 20
            hint: Does the answer describe a concrete response process — report, do not forward, preserve evidence — rather than just "tell IT"?
            question: >
              You receive a convincing phishing email that appears to come from your CEO asking you
              to urgently purchase gift cards. You did not click anything. Describe the steps you
              should take, in order, including how to report it and what information to preserve.
              Why is forwarding the email to colleagues to warn them potentially harmful?
          - criterion: Vishing and smishing explained with distinguishing features
            points: 20
            hint: Does the answer correctly explain vishing and smishing, describe how they differ from email phishing, and give realistic examples?
            question: >
              Explain what vishing and smishing are. How are the tactics similar to email phishing,
              and what makes them different? Give one realistic example of each, and explain one
              reason why these attacks are often more effective than email-based phishing.

      - slug: email-authentication-protocols
        number: 2
        title: "Email Authentication — SPF, DKIM, DMARC"
        tagline: "Three protocols that make spoofing much harder."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Email was designed in an era when trust was assumed, not verified. As a result, the basic protocol (SMTP) has no built-in mechanism to prevent a sender from claiming to be anyone they like in the "From" field. The three email authentication protocols — SPF, DKIM, and DMARC — were developed to address this, and together they form the foundation of modern email security. Understanding how they work and how they interact is essential for anyone in a technical or security role.

          SPF (Sender Policy Framework) works at the IP level. A domain's DNS record lists the IP addresses and hostnames that are authorised to send email for that domain. When a receiving mail server gets a message claiming to be from your domain, it checks whether the sending IP appears in your SPF record. If it does not, the message fails SPF. The "~all" (softfail) and "-all" (hardfail) qualifiers at the end of an SPF record control what happens to messages that fail: softfail typically still delivers but marks the message; hardfail recommends rejection. SPF has a limitation: it only checks the "envelope from" address (used in the SMTP conversation), not the "header from" address (what users see), and it breaks when email is forwarded. DKIM (DomainKeys Identified Mail) works at the message level. The sending server signs the message with a private key; the public key is published in DNS. The receiving server retrieves the public key and verifies the signature, confirming that the message was not altered in transit and was sent by a server in control of the private key.

          DMARC (Domain-based Message Authentication, Reporting and Conformance) ties SPF and DKIM together and adds policy and reporting. A DMARC record specifies what receiving servers should do when a message fails both SPF and DKIM alignment, and requests that they send aggregate and forensic reports back to the domain owner. Alignment means the "header from" domain must match the domain that passed SPF or DKIM — this is the step that prevents attackers from passing SPF on their own domain while spoofing your domain in the header From address. DMARC policies are p=none (monitor only — no action taken on failures), p=quarantine (send failures to spam), and p=reject (refuse delivery of failures). Organisations should move to p=reject only after ensuring all legitimate senders are covered by SPF and DKIM, guided by the aggregate reports.
        challenge: |
          SPF, DKIM, and DMARC are the technical controls that let receiving mail
          servers verify whether an email actually came from where it claims.
          Together they close the gap that makes email spoofing so easy.

          Answer the five questions below. Explain what each protocol does, how
          they work together, and what happens when one is missing or misconfigured.
        instructions: |
          Key areas this lesson covers:
          — Why SMTP has no built-in sender verification
          — SPF: DNS TXT record listing authorised sending IPs; pass/fail/softfail
          — DKIM: cryptographic signature added by sending server; public key in DNS
          — DMARC: policy record that tells receivers what to do on SPF/DKIM failure; reporting
          — Alignment: DMARC requires SPF or DKIM to align with the From header domain
          — Common misconfigurations: SPF softfail, no DMARC policy (p=none), broken DKIM selector
          — BIMI: brand indicator extension that rewards p=reject/quarantine DMARC policies
        rubric:
          - criterion: SPF purpose and mechanism explained correctly
            points: 20
            hint: Does the answer explain SPF as a DNS record listing authorised senders, describe what happens on pass/fail, and explain its limitation with forwarding?
            question: >
              Explain what SPF is, where it is published, and what it checks. An organisation sets
              its SPF record to "v=spf1 include:mailprovider.com ~all". What does the "~all"
              (softfail) mean compared to "-all" (hardfail)? Describe one common scenario where
              legitimate email fails SPF despite being genuine.
          - criterion: DKIM signature creation and verification described
            points: 20
            hint: Does the answer explain that DKIM signs the message with a private key, that the public key is in DNS, and that this proves the message was not modified in transit?
            question: >
              Explain how DKIM works: what is signed, where the signing key is stored, and how a
              receiving server verifies the signature. What protection does DKIM provide that SPF
              does not? What happens to the DKIM signature if an email is slightly modified after
              being signed?
          - criterion: DMARC policy options and enforcement explained
            points: 20
            hint: Does the answer describe all three DMARC policies (none/quarantine/reject), explain alignment, and describe what DMARC reports contain?
            question: >
              Explain what DMARC does and describe the three policy options: p=none, p=quarantine,
              and p=reject. What does DMARC alignment mean, and why must either SPF or DKIM align
              with the From header domain for DMARC to pass? What should an organisation do first
              before moving to p=reject?
          - criterion: Layered interaction between the three protocols reasoned through
            points: 20
            hint: Does the answer correctly explain that DMARC requires at least one of SPF or DKIM to both pass and align, and reason through what happens if one is missing?
            question: >
              An attacker sends a spoofed email claiming to be from company.com. The attacker's
              sending server is not in company.com's SPF record, but they do not control the
              company.com domain. Explain step by step how SPF, DKIM, and DMARC would each
              evaluate this email, and what the receiving server would do if DMARC is set to
              p=reject versus p=none.
          - criterion: Real-world misconfiguration consequences described
            points: 20
            hint: Does the answer identify specific misconfigurations and explain their real-world consequence — not just "it might fail"?
            question: >
              A security audit finds that a company has SPF published with "~all", no DKIM configured,
              and a DMARC record of "v=DMARC1; p=none; rua=mailto:dmarc@company.com". Describe what
              each of these findings means in practice. What specific attack does this configuration
              make easier, and what should the company prioritise fixing first and why?

      - slug: email-bec-attacks
        number: 3
        title: "Business Email Compromise"
        tagline: "The fraud that cost businesses $2.9 billion last year."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Business Email Compromise (BEC) is a category of fraud in which attackers impersonate trusted individuals — typically executives, finance team members, lawyers, or suppliers — to authorise fraudulent wire transfers, redirect payroll deposits, or steal sensitive data. The FBI consistently ranks BEC among the highest-value cybercrime categories by financial loss, with billions of dollars stolen annually. What makes BEC particularly dangerous is that it typically involves no malware and no malicious links: the attack is entirely social, relying on impersonation, urgency, and authority — which means most technical email security controls offer limited protection against it.

          BEC attacks follow a recognisable pattern. The attacker conducts reconnaissance — gathering information about the organisation's structure, key personnel, finance processes, and supplier relationships — often from public sources (LinkedIn, company websites, press releases) and sometimes from a prior phishing attack that gave them access to real email conversations. They then craft a targeted message that fits naturally into a plausible business context: the CFO needs an urgent wire transfer before the close of business; a supplier has changed their bank details; legal counsel is handling a confidential acquisition and needs silence. The message frequently includes pressure elements: urgency, authority, and requests for secrecy ("please don't discuss this with anyone until it's done"). These elements are red flags, not reassurances. The most dangerous BEC variant is account takeover — where the attacker has actually compromised a legitimate employee's email account and sends messages that appear in all technical respects to be genuine.

          The most effective defence against BEC is out-of-band verification: when an email requests a financial transaction, a change to payment details, or any unusual action, verify the request by calling the requester on a known, previously-used phone number — not a number provided in the email. Dual authorisation for payments above a threshold prevents any single person from being socially engineered into completing a transaction alone. Organisations should also have explicit written policies stating that payment details will never be changed by email alone, and that executives will never instruct staff to make secret urgent transfers. When BEC is suspected, report it immediately to both your security team and your bank — financial institutions can sometimes recall wire transfers if contacted quickly.
        challenge: |
          Business Email Compromise (BEC) is one of the highest-value cybercrime
          categories. Attackers impersonate executives, suppliers, or colleagues
          to authorise wire transfers, redirect payroll, or steal sensitive data —
          often without any malware.

          Answer the five questions below with specific reasoning. Vague answers
          will not score well — think through the attacker's perspective and the
          defender's controls.
        instructions: |
          Key areas this lesson covers:
          — BEC categories: CEO fraud, invoice fraud, payroll redirect, attorney impersonation, data theft
          — Attack chain: reconnaissance → account compromise or spoofing → social engineering → action
          — Why BEC bypasses technical controls: no malware, no malicious links, uses real accounts
          — Indicators: out-of-band requests, urgency, secrecy, unusual payment details
          — Controls: out-of-band verification, dual authorisation, payment change procedures
          — Account takeover (ATO): how compromised email accounts enable BEC
          — Reporting: FBI IC3, financial institution contact, incident response timeline
        rubric:
          - criterion: BEC categories and their objectives distinguished
            points: 20
            hint: Does the answer correctly describe at least three distinct BEC categories and explain what the attacker is trying to achieve in each?
            question: >
              Describe three distinct types of Business Email Compromise attack. For each type,
              explain who the attacker impersonates, what they request, and what the organisation
              loses if the attack succeeds. Why does BEC often achieve higher financial losses than
              ransomware attacks?
          - criterion: Why BEC evades technical controls explained
            points: 20
            hint: Does the answer specifically explain that BEC uses no malware or links, and may use genuinely compromised accounts, making signature-based and URL-filtering tools ineffective?
            question: >
              A company has antivirus, email filtering, and URL scanning deployed. Explain why
              these controls often fail to detect a BEC attack. In a scenario where an attacker
              has genuinely compromised the CFO's email account, describe what the attacker can
              do that makes detection even harder.
          - criterion: Red flags in a BEC scenario correctly identified
            points: 20
            hint: Does the answer identify the specific red flags present in the scenario — urgency, secrecy, unusual channel, payment change — not just generic advice?
            question: >
              You receive an email that appears to be from your CEO. It says: "I'm in meetings all
              day and need you to arrange an urgent wire transfer of $48,000 to a new supplier —
              details attached. Keep this between us until it's done. Don't call me, just reply
              here." List every red flag present in this message, explain why each is suspicious,
              and describe exactly what you should do.
          - criterion: Verification procedures and controls described correctly
            points: 20
            hint: Does the answer describe out-of-band verification specifically — not replying to the same email — and mention dual authorisation or procedural controls?
            question: >
              What is out-of-band verification and why is it the single most effective control
              against BEC? Describe a practical out-of-band verification procedure for a payment
              request. What organisational policy changes would reduce BEC risk for wire transfers
              and payroll changes?
          - criterion: Account takeover pathway into BEC explained
            points: 20
            hint: Does the answer explain how a compromised account is more dangerous than a spoofed one, describe how the attacker uses it, and connect this to detection difficulty?
            question: >
              Explain how an attacker might compromise a genuine employee email account and use it
              to carry out BEC. How does an attack launched from a real, compromised account differ
              from one using a lookalike domain? What signs might indicate an email account has been
              compromised, even before any fraud attempt is made?

      - slug: email-safe-habits
        number: 4
        title: "Safe Email Habits"
        tagline: "The daily decisions that keep attackers out."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Most email security incidents occur not because of sophisticated technical attacks, but because of everyday habits that create unnecessary risk. Safe email habits are the complement to technical controls: no filter catches everything, and the decisions you make when you open your inbox determine whether you are a line of defence or a point of failure. The habits that matter are not complicated — they require consistency and scepticism, applied to the interactions that feel most routine.

          The most important everyday habits are: verify before you trust (unexpected emails asking for action — especially involving money, credentials, or sensitive information — should be verified through a separate channel before you act); hover before you click (check where links actually go before clicking, and be suspicious of URLs that don't match the claimed sender's domain or that use URL shorteners); treat attachments as suspicious by default (legitimate senders rarely send unexpected attachments, and Office documents that prompt you to enable macros should be treated as malware); use your email client's reporting mechanism rather than replying to spam or phishing (replying confirms your address is active); and keep your email client and operating system patched (many email-borne attacks exploit software vulnerabilities, not just human ones).

          Handling sensitive information by email requires additional care. Email is not a secure channel by default — messages may be stored on multiple servers, transmitted without encryption between providers, forwarded, printed, or screenshotted by recipients. Do not send credentials, confidential client data, or sensitive personal information (health data, financial records, national ID numbers) by unencrypted email. If your organisation provides secure file transfer or encrypted email capabilities, use them for sensitive content. Be aware of auto-complete in email clients — it is a common source of misdirected email, where a message intended for an internal colleague is sent to an external contact with a similar name. Misdirected email is a genuine data breach under GDPR and HIPAA, and must be reported.
        challenge: |
          Technical controls help, but the last line of defence is the person
          reading the email. Good email habits reduce your attack surface and
          limit damage when something slips through.

          Answer the five questions below. Focus on the reasoning behind each
          habit — understanding why a control works is more valuable than
          memorising a checklist.
        instructions: |
          Key areas this lesson covers:
          — Email hygiene: separate accounts, unsubscribing, avoiding address harvesting
          — Attachment safety: file types, macros, password-protected zips, sandboxing
          — Link handling: hover-before-click, URL expansion tools, typing URLs manually
          — Sender verification: checking headers, display name vs actual address, reply-to mismatch
          — Auto-forwarding risks and why external forwarding should be blocked by policy
          — Encryption: when to use TLS vs end-to-end encryption (S/MIME, PGP), email vs messaging apps
          — Shared mailboxes and delegation risks
        rubric:
          - criterion: Attachment risk reasoning applied to scenario
            points: 20
            hint: Does the answer identify specific risky file types, explain what macro-enabled documents can do, and describe the right action rather than just "don't open attachments"?
            question: >
              A supplier sends you a Microsoft Word document with a note: "Please enable macros to
              view the content." Explain the specific risk this presents, describe what a malicious
              macro can do when enabled, and describe what you should do instead of enabling macros.
              Which file extensions are commonly used in malicious email attachments and why?
          - criterion: Header inspection technique described correctly
            points: 20
            hint: Does the answer explain display name vs actual email address, describe how to check headers, and correctly identify what the Reply-To header can reveal?
            question: >
              Explain the difference between the display name and the actual sender address in an
              email. How would you check the actual sending address in a typical email client?
              What is the Reply-To header, and how can a mismatch between Reply-To and From be
              a sign of a malicious email?
          - criterion: Auto-forwarding risk explained with attacker use case
            points: 20
            hint: Does the answer explain that auto-forwarding is frequently used by attackers who have compromised an account to silently exfiltrate email, and explain why it is hard to detect?
            question: >
              Why do security policies commonly prohibit automatic email forwarding to external
              addresses? Describe a specific attack scenario in which an attacker would set up
              email auto-forwarding after compromising an account. How might an account owner fail
              to notice this is happening?
          - criterion: Email encryption options and their appropriate use cases described
            points: 20
            hint: Does the answer distinguish between transport encryption (TLS) and end-to-end encryption (S/MIME/PGP), and correctly describe when each is appropriate?
            question: >
              Explain the difference between TLS email encryption and end-to-end email encryption
              such as S/MIME or PGP. For each type, describe what it protects against and what it
              does not protect against. When would you advise someone to use a secure messaging
              app instead of encrypted email, and why?
          - criterion: Practical safe-sending habits described with rationale
            points: 20
            hint: Does the answer give specific actionable habits — CC discipline, sensitive data handling, BCC for bulk, verifying recipient addresses — and explain the risk each mitigates?
            question: >
              Describe at least four practical habits for sending email more securely, focusing on
              reducing the risk of data leakage and accidental exposure. For each habit, explain
              the specific risk it mitigates. Include at least one habit related to recipient
              address handling and one related to sensitive data in email bodies or attachments.

      - slug: email-after-the-click
        number: 5
        title: "What To Do When You Click"
        tagline: "One wrong click doesn't have to become a breach."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Despite training and vigilance, people click malicious links and open malicious attachments. The question is not whether this ever happens in an organisation — it does — but whether the organisation has the controls and culture in place to detect it quickly, contain the damage, and respond effectively. Understanding what happens technically after a malicious click helps both defenders and general users recognise the signs and act appropriately.

          A credential harvesting attack sends the victim to a fake login page that captures their username and password. The page may look identical to a legitimate service. The victim may be redirected to the real site afterwards so they notice nothing unusual. Signs that your credentials may have been harvested include: the page felt slightly slow, the URL was unusual, or you received a login notification for an account you didn't just access. If you have submitted credentials to a suspicious site, act immediately: change the password on the real service, enable MFA if it isn't already enabled, report the incident to your security team, and notify them of any other accounts where you use the same password. A malware delivery attack — via a malicious attachment or a link to a malware download — may result in nothing visible, or may produce error messages, unexpected crashes, or changed browser behaviour. Do not restart your machine (which may trigger further malware stages or destroy volatile forensic evidence) — disconnect it from the network and report to your security team immediately.

          The critical rule after any suspected click is: report it, immediately, even if you are uncertain and embarrassed. Security teams are trained to handle this without judgement. The window between initial compromise and containment is where the difference between a contained incident and a full breach is determined. Delayed reporting, whether from embarrassment or a mistaken belief that nothing bad happened, gives attackers the time they need to establish persistence, exfiltrate data, or move laterally to other systems. Speed of reporting is the single most impactful thing a non-technical employee can do in response to a security incident.
        challenge: |
          Everyone clicks something they shouldn't eventually. What matters is
          what happens next. A fast, correct response limits damage; a slow or
          wrong response turns an incident into a breach.

          Answer the five questions below. Treat this as a practical incident
          response guide — walk through your reasoning clearly.
        instructions: |
          Key areas this lesson covers:
          — Immediate response: disconnect, don't restart, preserve evidence
          — Credential compromise: change passwords vs waiting, where to change them, MFA
          — Reporting: who to tell, what to say, when, why speed matters
          — Indicators of compromise post-click: new processes, network connections, changed settings
          — Credential stuffing: why one compromised password endangers other accounts
          — Organisational response: IT/security team procedures, legal and regulatory considerations
          — Recovery steps: scanning, password resets, reviewing account activity, MFA enrolment
        rubric:
          - criterion: Immediate post-click steps described in correct order
            points: 20
            hint: Does the answer give a prioritised sequence — disconnect network, do not restart, report immediately — and explain why the order matters?
            question: >
              You click a link in an email and a page loads briefly before closing. You are not sure
              what happened. Describe the immediate steps you should take, in order, within the
              first five minutes. Why should you not restart the computer? Why should you disconnect
              from the network before calling IT rather than after?
          - criterion: Credential compromise response described correctly
            points: 20
            hint: Does the answer explain that passwords must be changed from a different, uncompromised device, cover all accounts sharing that password, and include enabling MFA?
            question: >
              After clicking a phishing link, you believe you may have entered your password on a
              fake login page. Describe the steps you should take to contain and recover from a
              potential credential compromise. Why is it important to change the password from a
              different device? Which other accounts should you prioritise reviewing and why?
          - criterion: Reporting rationale and what information to provide explained
            points: 20
            hint: Does the answer explain why fast reporting matters for the organisation — not just for the individual — and describe what specific information the security team will need?
            question: >
              Many employees delay reporting a phishing click because they are embarrassed or hope
              nothing bad happened. Explain why fast reporting is critical from an organisational
              security perspective — what can the security team do in the first hour that they
              cannot do after 24 hours? Describe what information you should preserve and report.
          - criterion: Credential stuffing risk recognised and mitigated
            points: 20
            hint: Does the answer correctly explain that attackers test compromised credentials against other services, and describe unique passwords and a password manager as the mitigations?
            question: >
              Explain what credential stuffing is and how it relates to a phishing attack where a
              password was stolen. If an attacker steals your email password, which other accounts
              are at risk and why? Describe two practices that would significantly reduce the risk
              of credential stuffing affecting you after a phishing compromise.
          - criterion: Indicators of post-click compromise described with detection approach
            points: 20
            hint: Does the answer describe specific observable signs of compromise — new processes, unexpected network traffic, changed browser settings, new email rules — and explain how to look for them?
            question: >
              After clicking a suspicious link, what signs might indicate that malware was
              successfully installed or your account was accessed? Describe at least four specific
              indicators you or an IT team could look for. For one of these indicators, describe
              how you would actually check for it on a Windows computer.

  # ============================================================
  # COURSE 5 — Workplace Respect & Harassment Prevention
  # ============================================================
  - slug: workplace-harassment-prevention
    title: "Workplace Respect & Harassment Prevention"
    tagline: "Required training that actually makes you think."
    description: >
      Five scenario-based lessons covering what harassment is, how to recognise
      it, your rights and responsibilities, how to respond, and how to contribute
      to a workplace where everyone can do their best work.
    icon: "🤝"
    tier: 1
    difficulty: beginner
    lesson_type: knowledge
    lessons:

      - slug: harassment-what-is-it
        number: 1
        title: "What Is Harassment"
        tagline: "Naming it clearly is the first step to addressing it."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Harassment in the workplace is unwanted conduct related to a protected characteristic — such as sex, race, age, disability, religion, sexual orientation, or gender reassignment — that has the purpose or effect of violating a person's dignity or creating an intimidating, hostile, degrading, humiliating, or offensive environment. The definition has two important elements: the behaviour must be unwanted by the recipient, and its effect is assessed from the recipient's perspective, not the intention of the person responsible. Something does not have to be intended as harassment to be harassment — intent is not a defence.

          Harassment takes many forms. Sexual harassment includes unwanted sexual advances, requests for sexual favours, sexual comments or jokes, displaying sexually explicit material, and unwanted physical contact of a sexual nature. It is not limited to harassment by managers or colleagues of the opposite sex, and can occur between people of any gender. Non-sexual harassment based on other protected characteristics — making derogatory comments about someone's race, repeatedly misgendering a colleague, excluding someone because of their religion, or making disability jokes — is equally serious under the law. Harassment can be a single severe incident or a pattern of repeated lower-level behaviour that accumulates over time. Victimisation — treating someone less favourably because they have made a complaint or supported a complaint — is unlawful and treated as seriously as the original conduct.

          Every employee has both rights and responsibilities in this area. You have the right to work in an environment free from harassment, and to raise a concern or make a complaint without fear of retaliation. You have the responsibility to treat colleagues with dignity and respect, to refrain from conduct that you know or should know is unwanted, and — critically — to challenge or report behaviour you witness even when you are not the target. Bystanders who stay silent allow harassment to continue and send an implicit message that the behaviour is acceptable.
        challenge: |
          Harassment has a precise legal and organisational meaning — and a much
          broader everyday reality. Understanding the definitions, categories, and
          legal frameworks gives you the foundation to recognise and respond to
          it correctly.

          Answer the five questions below. Use your own words and reasoning.
          Scenario-based answers will score better than textbook recitations.
        instructions: |
          Key areas this lesson covers:
          — Legal definition of harassment: unwanted conduct related to a protected characteristic
          — Protected characteristics: sex, race, religion, disability, age, sexual orientation, and others
          — Quid pro quo harassment: submission to conduct made a condition of employment or benefit
          — Hostile work environment: conduct that is severe or pervasive enough to alter working conditions
          — Sexual harassment vs other forms: same legal framework, different triggers
          — Harassment vs rudeness: why not every unpleasant interaction meets the legal threshold
          — Third-party harassment: customers, contractors, clients — employer still has a duty of care
        rubric:
          - criterion: Quid pro quo and hostile environment correctly distinguished
            points: 20
            hint: Does the answer correctly explain both categories and give a concrete example of each that demonstrates the distinction?
            question: >
              Explain the difference between quid pro quo harassment and hostile work environment
              harassment. Give one realistic workplace example of each. Why does the distinction
              matter legally — does an employee need to suffer a tangible job consequence for
              hostile environment harassment to be actionable?
          - criterion: Protected characteristics understood in context
            points: 20
            hint: Does the answer correctly list several protected characteristics and explain that harassment is tied to these — not just general rudeness?
            question: >
              Harassment law protects people from unwanted conduct related to specific protected
              characteristics. Name at least five protected characteristics, and explain why the
              law is structured this way rather than simply protecting everyone from all
              unpleasant treatment. Does harassment have to be intentional to be unlawful?
          - criterion: Severity and pervasiveness threshold reasoned through
            points: 20
            hint: Does the answer explain that a single incident can meet the threshold if severe enough, and that milder conduct must be frequent or sustained to qualify?
            question: >
              Not every offensive or uncomfortable interaction constitutes harassment. Explain
              what "severe or pervasive" means in the context of hostile work environment claims.
              Can a single incident qualify? Give an example of a single incident that would
              likely meet the threshold and explain why, then give an example of repeated
              behaviour that might also qualify.
          - criterion: Third-party harassment scenario handled correctly
            points: 20
            hint: Does the answer recognise that the employer has an obligation to act even when the harasser is not an employee?
            question: >
              A customer repeatedly makes sexually suggestive comments to a sales associate during
              site visits. The associate reports it to their manager, who responds: "They're an
              important client — just ignore it." Explain what is wrong with the manager's
              response. What obligation does the employer have in this situation, and what steps
              should the manager take?
          - criterion: Harassment distinguished from general workplace conflict
            points: 20
            hint: Does the answer clearly explain that harassment requires a protected characteristic link, distinguishing it from interpersonal friction that is unpleasant but not legally actionable?
            question: >
              A manager repeatedly criticises an employee's work in front of colleagues, assigns
              them undesirable tasks, and excludes them from team lunches. Is this harassment?
              What additional information would you need to know? Explain how the presence or
              absence of a protected characteristic changes the legal and policy analysis.

      - slug: harassment-recognising-behaviour
        number: 2
        title: "Recognising Inappropriate Behaviour"
        tagline: "It isn't always obvious. Sometimes that's the point."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Recognising harassment is harder than it sounds. Harassing behaviour exists on a spectrum, and the lower end of that spectrum — "banter," casual comments, exclusion from social events — is often where the pattern begins before escalating. The cumulative effect of repeated low-level behaviour can be just as harmful as a single serious incident, and it is often harder for the recipient to articulate because each individual incident seems minor in isolation. Part of recognising harassment is understanding that the threshold is not "would most people find this offensive?" but "did this person find it unwanted and did it affect their dignity or working environment?"

          Some behaviours that are commonly minimised but can constitute harassment: persistent "jokes" about a person's accent, body, background, or beliefs after they have made clear they dislike them; deliberately using the wrong name or pronoun for a transgender colleague repeatedly after being corrected; excluding someone from team social events or informal communication channels along lines that correlate with a protected characteristic; and making comments about a pregnant colleague's commitment to her work or plans for return. The context matters: a one-off awkward comment is different from a pattern; a private comment overheard by the target is different from a public remark; and a comment made in a position of power over the recipient carries different weight than the same comment between peers.

          Harassment does not require a formal power relationship. Harassment by peers is as unlawful as harassment by managers. Harassment can occur in written communication (email, messaging platforms, post), over the phone, at work-related social events outside office hours, or through third parties (a client or contractor harassing a supplier's employee). The physical location does not define the boundary — work-related contexts do. If you are uncertain whether a specific behaviour constitutes harassment, a useful question is: would the person responsible be comfortable if this interaction were observed by HR, their manager, or described to a tribunal?
        challenge: |
          Harassment exists on a spectrum — from unmistakable to subtle. The less
          overt forms are often harder to name, easier to dismiss, and just as
          damaging over time. Recognising them requires paying attention to
          patterns, context, and impact.

          Answer the five questions below. Put yourself in the scenarios and
          reason through what you observe, what it means, and what to do.
        instructions: |
          Key areas this lesson covers:
          — Overt harassment: explicit comments, unwanted touching, direct threats or propositions
          — Subtle harassment: exclusion, microaggressions, undermining, "jokes", differential treatment
          — Pattern recognition: why a single incident may seem ambiguous but a pattern makes it clear
          — Bystander experience: what witnesses observe that targets may not fully see
          — Impact vs intent: why "I was joking" does not determine whether conduct is harassment
          — Digital harassment: emails, messaging apps, social media — same rules apply
          — Power dynamics: how seniority and dependency make harassment harder to resist and report
        rubric:
          - criterion: Subtle harassment forms identified and explained
            points: 20
            hint: Does the answer describe specific subtle forms — microaggressions, exclusion, undermining, "jokes" with plausible deniability — rather than only naming obvious examples?
            question: >
              Describe three forms of subtle or indirect workplace harassment that might be
              individually deniable but constitute a pattern over time. For each example,
              explain why it may be harder to identify and report than overt harassment, and
              why that difficulty does not make it less serious.
          - criterion: Impact vs intent principle correctly applied to scenario
            points: 20
            hint: Does the answer explain that intent does not determine whether conduct constitutes harassment, and that the impact on the recipient is what matters?
            question: >
              A colleague who considers himself funny regularly makes jokes about the accents of
              non-native English speakers on the team. When challenged, he says he means no harm
              and that everyone is too sensitive. Evaluate his response. Does intent determine
              whether conduct is harassment? Explain the "impact vs intent" principle and apply
              it to this scenario.
          - criterion: Bystander observation role described accurately
            points: 20
            hint: Does the answer explain that bystanders often have clearer sight lines to patterns, can corroborate reports, and have a responsibility to act?
            question: >
              You notice that a senior colleague consistently talks over a junior female team member
              in meetings, takes credit for her ideas, and makes dismissive comments about her
              contributions — but only when no one from HR is present. The colleague herself has
              not reported anything. What is your role as a bystander? What are your options, and
              what considerations should inform which you choose?
          - criterion: Power dynamic in harassment scenario reasoned through
            points: 20
            hint: Does the answer explain specifically how the power imbalance limits the target's ability to resist, report, or even clearly identify the behaviour as wrong?
            question: >
              A new employee is dependent on a senior manager for project assignments, performance
              reviews, and references. The manager occasionally makes comments about the employee's
              appearance and sends messages outside work hours that feel personal rather than
              professional. The employee is uncertain whether they are overreacting. Explain how
              the power dynamic in this situation affects how the employee experiences and
              interprets the behaviour, and what that means for how the organisation should
              respond if it comes to light.
          - criterion: Digital harassment correctly identified as subject to the same standards
            points: 20
            hint: Does the answer apply the same harassment framework to digital communications and explain that the channel does not change the nature or seriousness of the conduct?
            question: >
              A team member receives repeated messages on the company Slack from a colleague
              containing "just banter" — comments about their appearance, unsolicited opinions
              about their personal life, and forwarded memes that rely on racial stereotypes.
              The colleague argues it is not harassment because it is "just chat, not the real
              workplace." Evaluate this argument. Does the digital channel change whether the
              conduct could constitute harassment? What should the recipient do?

      - slug: harassment-rights-and-responsibilities
        number: 3
        title: "Your Rights and Responsibilities"
        tagline: "Knowing the rules protects everyone — including you."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Employees have legally protected rights in relation to harassment. The most fundamental is the right to a working environment free from harassment and to be treated with dignity and respect. If you experience harassment, you have the right to raise an informal concern or make a formal complaint through your organisation's grievance procedure without suffering retaliation for doing so. If your employer fails to take reasonable steps to prevent harassment or to act on a complaint, they may be liable — both for the original harassment and for any subsequent victimisation. In serious cases, employees may also have recourse to an employment tribunal or, depending on the jurisdiction, regulatory authorities.

          Employers have a legal duty of care and, in many jurisdictions, a specific legal obligation to take reasonable steps to prevent harassment. This includes having a clear anti-harassment policy, providing training, having effective and accessible complaint procedures, investigating complaints promptly and fairly, protecting complainants from retaliation, and acting proportionately on findings. The "reasonable steps" defence is important: an employer may avoid liability if they can demonstrate they took all reasonable steps to prevent the harassment from occurring. An employer who has no policy, provides no training, and ignores complaints has no such defence.

          Individual employees also have active responsibilities — not just as potential targets or perpetrators, but as colleagues and bystanders. You are responsible for your own conduct: ensuring that you do not engage in behaviour that could constitute harassment, even informally, and even if you intend it as friendly. You are also responsible as a bystander: if you witness harassment, you can intervene directly if it is safe to do so, support the person targeted afterwards, or report what you saw to a manager or HR even if the target has not made a formal complaint. The culture of an organisation is shaped by what everyone tolerates, not just by what HR prohibits.
        challenge: |
          Harassment policy is not just about what is prohibited — it is about
          what you are entitled to, what you are required to do, and the
          protections that exist when you act in good faith.

          Answer the five questions below. Think through the obligations and
          protections from multiple perspectives: as a target, a witness, a
          manager, and an organisation.
        instructions: |
          Key areas this lesson covers:
          — Right to a harassment-free workplace: employer's legal duty of care
          — Reporting obligations: who is required to report (managers vs individual contributors)
          — Confidentiality: what can be kept private, what cannot, and why
          — Retaliation: definition, examples, why it is separately prohibited and often more damaging
          — Good faith reporting: protection even if the investigation finds no violation
          — Manager obligations: why supervisors have a heightened duty to act
          — Failure to report: consequences for individuals and organisations
        rubric:
          - criterion: Employer's duty of care explained correctly
            points: 20
            hint: Does the answer explain that the employer has a proactive legal obligation — not just to respond when told, but to take reasonable steps to prevent harassment?
            question: >
              Explain what an employer's "duty of care" means in the context of harassment prevention.
              Does an employer only become responsible once harassment has been reported, or do they
              have proactive obligations? What does "reasonable steps" mean in practice — give two
              examples of what a reasonable employer should have in place before any incident occurs.
          - criterion: Retaliation defined and its separate prohibition explained
            points: 20
            hint: Does the answer correctly define retaliation, explain that it is prohibited separately from the underlying harassment, and give concrete examples of retaliatory acts?
            question: >
              Define workplace retaliation in the context of harassment reporting. Give three
              examples of retaliatory acts — including at least one that is subtle rather than
              obvious. Explain why retaliation is prohibited separately from the underlying
              harassment, and what someone who experiences retaliation after reporting should do.
          - criterion: Manager reporting obligation distinguished from individual contributor obligation
            points: 20
            hint: Does the answer correctly explain that managers typically have a mandatory obligation to report, even if the target has asked them not to, and explain why?
            question: >
              Explain how a manager's reporting obligation differs from that of a non-managerial
              colleague. If a team member discloses harassment to their manager and asks them to
              keep it confidential and take no action, is the manager free to comply? Explain what
              the manager must do and why the obligation exists even when the target requests
              otherwise.
          - criterion: Good faith reporting protection applied to scenario
            points: 20
            hint: Does the answer explain that good faith protection covers reports that are genuinely believed — even if the investigation does not substantiate the claim — and that false reports made knowingly are not protected?
            question: >
              An employee reports a colleague for harassment. After investigation, HR concludes
              that while the behaviour was inappropriate, it did not meet the threshold for
              disciplinary action. The accused colleague is upset and demands the reporter face
              consequences for making a false claim. Explain what "good faith reporting" protection
              means in this situation. Under what circumstances would a reporter face consequences
              for making a complaint?
          - criterion: Confidentiality limits correctly explained
            points: 20
            hint: Does the answer explain that complete confidentiality cannot always be guaranteed once a formal report is made, because the organisation has an independent obligation to investigate?
            question: >
              An employee tells HR they want to report harassment but only if their identity can
              be kept completely confidential. Explain what HR should tell them. What confidentiality
              protections genuinely exist in the process? Why can complete confidentiality not always
              be guaranteed, and how should HR handle this limitation honestly with the reporter?

      - slug: harassment-how-to-respond
        number: 4
        title: "How To Respond"
        tagline: "What you do — and say — in the moment matters."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          How to respond to harassment depends on your position — whether you are the person targeted, a bystander witnessing it, or a manager receiving a complaint. If you are the target, you have options and none of them is the "correct" one that fits every situation. You can address it directly with the person responsible if you feel safe doing so — clearly stating that the behaviour is unwanted and must stop. You can seek support from a trusted colleague, line manager, HR representative, or employee assistance programme without yet making a formal complaint. Or you can go straight to a formal complaint through your organisation's grievance procedure. You are not required to confront the person responsible, and you are not required to manage the situation informally before escalating.

          Documentation matters — both for the organisation's ability to investigate and for your own protection. Keep a contemporaneous record of incidents: dates, times, locations, what was said or done, who was present, and how it affected you. Save relevant emails, messages, or other written evidence. This record is not required to make a complaint, but it significantly strengthens one. Formal complaints are investigated by HR or a designated officer, typically with both parties given the opportunity to provide their account, and witnesses interviewed if relevant. Outcomes range from informal mediation to formal disciplinary action depending on severity and findings. Complainants must be protected from retaliation throughout and after the process.

          As a manager receiving a complaint — whether formal or informal — your first obligation is to listen carefully and take it seriously. Do not dismiss the concern, express scepticism, or immediately take sides. Do not promise confidentiality you cannot keep (investigations typically require you to share information on a need-to-know basis). Do not confront the alleged perpetrator on the spot. Follow your organisation's procedure: involve HR, ensure the complainant knows what will happen next, and document what was reported to you. Managers who handle complaints badly — by minimising them, leaking information, or retaliating against the complainant — create additional liability for themselves and their organisation.
        challenge: |
          Responding to harassment — whether as the person targeted, a witness,
          or someone accused — requires judgement, knowledge, and composure. The
          right response depends on the situation, but there are principles that
          apply in every case.

          Answer the five questions below with specific, reasoned guidance. "Tell
          HR" is not a complete answer — walk through the thinking.
        instructions: |
          Key areas this lesson covers:
          — Responding as the target: direct response options, documentation, formal reporting
          — Responding as a bystander: the 5Ds — Direct, Distract, Delegate, Delay, Document
          — Responding if accused: how to engage with an investigation, what not to do
          — Documentation: what to record, how, and why it matters for any investigation
          — Informal vs formal resolution: when each is appropriate, and the trade-offs
          — Protecting yourself during and after reporting: evidence, follow-up, escalation
          — Emotional and psychological support: acknowledging that reporting is hard
        rubric:
          - criterion: Target response options described with reasoning
            points: 20
            hint: Does the answer describe multiple response options available to the target — from direct pushback through documentation to formal reporting — and explain how circumstances affect which is appropriate?
            question: >
              Someone has been making unwanted comments about your appearance for several weeks.
              You have not yet reported it. Describe the options available to you at this point,
              from least to most formal. What factors should influence which option you choose?
              What should you be doing throughout this period regardless of which approach you take?
          - criterion: Bystander intervention approach appropriate to scenario
            points: 20
            hint: Does the answer choose a specific bystander approach suited to the scenario, explain why it fits, and acknowledge the safety considerations involved?
            question: >
              You are in a meeting when a senior colleague makes a demeaning comment to a junior
              colleague based on their ethnicity. The junior colleague goes quiet. The senior
              colleague continues as if nothing happened. Describe two ways you could respond as
              a bystander — one in the moment and one after the meeting. What considerations
              affect which approach is safer and more effective? What is the risk of doing nothing?
          - criterion: Response when accused described correctly and professionally
            points: 20
            hint: Does the answer advise cooperation with the process, avoiding retaliation, not confronting the complainant, and seeking appropriate support — without assuming the outcome?
            question: >
              You are informed that a colleague has made a harassment complaint against you and
              that HR will be conducting an investigation. You believe the complaint is
              exaggerated or a misunderstanding. Describe how you should conduct yourself during
              the investigation. What should you avoid doing? What rights do you have in this
              process, and what would be the worst things you could do in response?
          - criterion: Documentation practices described with specificity
            points: 20
            hint: Does the answer describe what to record — date, time, location, exact words, witnesses, your response — and explain why contemporaneous documentation is more credible?
            question: >
              You have decided to document a pattern of inappropriate behaviour before deciding
              whether to make a formal report. Describe what your documentation should include
              for each incident. Why does it matter that documentation is created at the time
              rather than recalled later? Where and how should you store this documentation?
          - criterion: Informal vs formal resolution trade-offs reasoned through
            points: 20
            hint: Does the answer explain specific scenarios where each is appropriate, acknowledge the trade-offs honestly, and avoid presenting one as universally preferable?
            question: >
              Explain the difference between informal and formal resolution of a harassment
              complaint. Describe a situation in which informal resolution might be appropriate
              and one in which it would not be. What are the risks of pursuing only informal
              resolution when the conduct is serious? What are the reasons someone might
              reasonably prefer an informal approach even for serious conduct?

      - slug: harassment-building-respect
        number: 5
        title: "Building a Respectful Workplace"
        tagline: "Prevention is better than response. Culture is built deliberately."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Preventing harassment is not primarily a legal compliance exercise — it is about deliberately building a workplace culture in which dignity, respect, and inclusion are the expected norm rather than an aspiration. Culture is shaped by what leaders model, what colleagues tolerate, and what systems reinforce or undermine. An organisation with a strong anti-harassment policy but a leadership team that makes exclusionary jokes, overlooks complaints from senior staff, or promotes people with known behavioural problems sends a clear signal that the policy is performative. The gap between the policy on paper and the culture in practice is where harassment lives.

          Proactive culture-building involves several interconnected elements. Clear expectations, communicated consistently and from the top, establish that certain behaviour is simply not acceptable here — not just that HR will investigate it. Inclusive practices reduce the conditions in which harassment is more likely: when people from minority groups are isolated, excluded from informal networks, or denied equitable treatment, the conditions for harassment worsen. Psychological safety — the sense that you can raise concerns, disagree with colleagues, and flag problems without fear of social or professional consequences — makes bystander intervention more likely and complaint-making less costly. Regular training that engages people in realistic scenarios is more effective than annual compliance tick-boxes.

          Bystander intervention is one of the most powerful tools available to individuals in building a respectful culture. Research consistently shows that harassment is less likely to continue when bystanders intervene, and that most people want to intervene but are uncertain how to. Effective bystander strategies include: directly naming what you observed ("that comment was not okay"); redirecting (changing the subject or creating a distraction that breaks the dynamic); supporting the person targeted privately afterwards; and reporting what you witnessed even if the target does not — particularly when you have more positional safety than they do. Being a responsible bystander is not about policing every interaction; it is about choosing not to normalise behaviour that harms colleagues.
        challenge: |
          A harassment-free workplace is not an accident. It requires deliberate
          choices by leaders, teams, and individuals. Understanding what a
          healthy culture looks like — and what erodes it — is the foundation
          of prevention.

          Answer the five questions below. Think beyond individual behaviour
          to systems, norms, and leadership responsibility.
        instructions: |
          Key areas this lesson covers:
          — Culture as infrastructure: how norms and expectations are set and reinforced
          — Psychological safety: what it is, why it matters, how it breaks down
          — Leadership behaviours that enable or undermine respect
          — Structural prevention: clear policies, accessible reporting, consistent enforcement
          — Inclusivity and belonging: why diverse teams need deliberate inclusion practices
          — Accountability without blame culture: addressing behaviour while supporting growth
          — Measuring culture: what signals indicate a healthy or deteriorating environment
        rubric:
          - criterion: Psychological safety defined and connected to harassment prevention
            points: 20
            hint: Does the answer correctly define psychological safety, explain how it enables reporting and early intervention, and describe what undermines it?
            question: >
              Explain what psychological safety means in a workplace context. How does the presence
              or absence of psychological safety affect whether harassment gets reported, addressed,
              or allowed to continue? Describe two specific leadership behaviours that build
              psychological safety and two that undermine it.
          - criterion: Leader's role in setting culture described with specificity
            points: 20
            hint: Does the answer go beyond "lead by example" to describe specific visible behaviours, how leaders respond to violations, and the signal their response sends to the team?
            question: >
              A senior leader hears a sexist joke made by a high-performing team member at a
              company event. They laugh uncomfortably and say nothing. Explain what message this
              sends to the team, including to those who were offended and to the person who made
              the joke. What should the leader have done instead, and why is the leader's response
              to this moment more influential than any policy document?
          - criterion: Structural prevention measures identified and explained
            points: 20
            hint: Does the answer describe specific structural elements — accessible reporting channels, consistent enforcement, training, clear policies — and explain why each matters?
            question: >
              Beyond individual behaviour, what structural elements must an organisation have in
              place to genuinely prevent harassment rather than just respond to it? Describe at
              least three structural prevention measures and explain what each one achieves.
              What happens to culture when policies exist on paper but enforcement is inconsistent?
          - criterion: Accountability without blame culture described correctly
            points: 20
            hint: Does the answer explain the distinction between holding someone accountable for behaviour and treating them as irredeemable, and explain why this matters for culture?
            question: >
              Explain the difference between a blame culture and an accountability culture in the
              context of harassment. How can an organisation hold someone accountable for
              inappropriate behaviour while still maintaining a culture where people can grow and
              where reports are made without fear? Why does disproportionate or inconsistent
              punishment harm culture even when the intent is to take a strong stance?
          - criterion: Personal contribution to workplace culture described with concrete actions
            points: 20
            hint: Does the answer describe specific, everyday actions — not just abstract values — that an individual contributor can take to strengthen workplace culture?
            question: >
              You are a non-managerial employee with no formal authority over your colleagues.
              Describe five specific actions you can take — in your day-to-day work — to
              contribute to a more respectful and inclusive workplace. For each action, explain
              the specific cultural outcome it supports. Avoid generic answers like "be kind" —
              focus on concrete, observable behaviour.

  # ============================================================
  # COURSE 6 — Anti-Bribery & Corruption
  # ============================================================
  - slug: anti-bribery-corruption
    title: "Anti-Bribery & Corruption"
    tagline: "Know the line before someone asks you to cross it."
    description: >
      Five lessons covering bribery definitions, red flags, money laundering
      basics, your personal obligations, and how to handle real-world pressure
      situations — grounded in FCPA, the UK Bribery Act, and global standards.
    icon: "⚖️"
    tier: 1
    difficulty: beginner
    lesson_type: knowledge
    lessons:

      - slug: abc-what-is-bribery
        number: 1
        title: "What Is Bribery"
        tagline: "A clear definition prevents a lot of expensive mistakes."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Bribery is the offering, giving, receiving, or soliciting of something of value with the intention of improperly influencing a person's actions or decisions, typically in a business or official capacity. It is a criminal offence in virtually every jurisdiction, and modern anti-bribery laws — particularly the UK Bribery Act 2010 and the US Foreign Corrupt Practices Act (FCPA) — have broad reach and serious consequences. The UK Bribery Act is particularly far-reaching: it applies to any company that does business in the UK regardless of where the company is incorporated, it applies to the conduct of employees and associated persons acting on the company's behalf anywhere in the world, and it creates a strict liability corporate offence of failure to prevent bribery that requires no proof of knowledge or intent.

          The value exchanged does not have to be money. Lavish gifts, hospitality, entertainment, jobs for relatives, preferential contracts, and even intangible benefits like public endorsements can constitute a bribe if they are given with the intention of improperly influencing a decision. The threshold is not about the monetary value of the item — it is about whether a reasonable person would conclude that it was given to influence a business decision or government action. A gift worth €20 that is given to a procurement official in the context of an ongoing tender process is potentially a bribe; an expensive dinner for a longstanding client celebrating a contract renewal may not be, depending on the context, the timing, and whether the hospitality is proportionate to the business relationship.

          Facilitation payments — small informal payments made to government officials to speed up routine actions they are legally required to perform anyway (clearing customs, obtaining a routine permit) — are illegal under the UK Bribery Act, even though they remain a permitted exception under the FCPA in limited circumstances. This distinction matters: UK-connected organisations cannot rely on the FCPA exception, and "everyone does it" or "it's just how business works here" are not defences. The only defence available to an organisation facing a corporate bribery charge under the UK Act is that it had adequate procedures in place to prevent bribery — which places a premium on having a genuine, not merely paper, compliance programme.
        challenge: |
          Bribery is one of the most prosecuted corporate crimes globally. The
          laws are broader than most people expect — covering not just cash
          payments but gifts, hospitality, and anything of value offered to
          improperly influence a decision.

          Answer the five questions below. Focus on how the law defines bribery,
          not just common sense — the gap between the two is where prosecutions happen.
        instructions: |
          Key areas this lesson covers:
          — Core definition: offering, promising, or giving a financial or other advantage to improperly influence
          — Passive bribery: requesting or receiving a bribe (not just paying one)
          — FCPA (US): prohibits payments to foreign officials; strict liability for companies; parent/subsidiary liability
          — UK Bribery Act: broader — covers commercial bribery, not just public officials; corporate offence of failing to prevent
          — "Adequate procedures" defence under UK Bribery Act
          — Intent and improper performance: what "improper" means legally
          — Facilitation payments: illegal under UK law, limited exception under FCPA
        rubric:
          - criterion: Bribery definition applied correctly beyond cash payments
            points: 20
            hint: Does the answer explain that bribery covers any advantage — gifts, hospitality, jobs for family members — and explain the "improper influence" element?
            question: >
              Most people think of bribery as handing someone a cash envelope. Explain the legal
              definition of bribery and why it is much broader than cash payments. Give two
              examples of non-cash advantages that could constitute a bribe, and explain what
              makes them a bribe rather than a legitimate business gesture.
          - criterion: FCPA scope and reach explained correctly
            points: 20
            hint: Does the answer correctly explain that FCPA applies to US companies and issuers globally, covers foreign government officials, and reaches non-US companies listed on US exchanges?
            question: >
              Explain what the Foreign Corrupt Practices Act (FCPA) prohibits and who it applies
              to. Does a company need to be based in the US for the FCPA to apply to it? Give a
              concrete example of conduct that would violate the FCPA's anti-bribery provisions.
              What is the FCPA's "books and records" provision and why does it matter?
          - criterion: UK Bribery Act distinguished from FCPA with corporate offence explained
            points: 20
            hint: Does the answer correctly explain that the UK Act covers commercial bribery (not just officials), includes the corporate failure-to-prevent offence, and has no facilitation payment exception?
            question: >
              Explain two key ways the UK Bribery Act is stricter than the FCPA. What is the
              "corporate offence of failing to prevent bribery" under Section 7 of the UK Bribery
              Act, and what is the only defence available to a company charged under it? Why does
              this create a strong incentive for companies to implement compliance programmes?
          - criterion: Facilitation payments correctly characterised under both laws
            points: 20
            hint: Does the answer correctly state that facilitation payments are illegal under the UK Bribery Act with no exception, and have a narrow exception under FCPA that is practically difficult to use?
            question: >
              Explain what a facilitation payment is and give a realistic example. How are
              facilitation payments treated under the FCPA versus the UK Bribery Act? A
              colleague tells you that paying a small "processing fee" to a customs official
              to release a legitimate shipment is just how business is done locally and is
              legal. How would you respond?
          - criterion: Passive bribery and personal liability understood
            points: 20
            hint: Does the answer correctly explain that receiving a bribe is also a criminal offence, and that individuals — not just companies — face personal criminal liability?
            question: >
              Bribery laws apply to both the person who pays and the person who receives.
              Explain what passive bribery is and give an example from a business context.
              Can an individual employee face personal criminal liability under anti-bribery laws,
              or only the company? What personal consequences can a convicted individual face
              beyond a fine?

      - slug: abc-red-flags
        number: 2
        title: "Recognising Red Flags"
        tagline: "The warning signs are usually visible before the problem becomes serious."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Recognising the situations and relationships that create elevated bribery risk is a practical skill that everyone who works with suppliers, customers, officials, or partners needs. Red flags do not prove that bribery is occurring or intended — they indicate that a situation deserves closer scrutiny, additional approval, or simply that a conversation with your compliance team is warranted. The earlier a potential problem is identified, the easier it is to manage. Ignoring red flags and proceeding regardless is itself a compliance failure.

          Third-party red flags are among the most important. A supplier, agent, or business partner who requests unusually high commissions for vague "facilitation" services; who asks to be paid in cash or through a third-country account; who cannot explain their services clearly; who has family or political connections to the government officials relevant to a contract; or who has a known or rumoured history of improper payments should trigger enhanced due diligence before any engagement. Many significant bribery cases have involved improper payments made through third parties — distributors, local agents, consultants — with the company claiming it did not know what was happening. Courts and regulators increasingly hold this defence to a high standard.

          Situational red flags include: requests that a payment, gift, or favour be made outside normal channels or not recorded in the books; pressure from a client, customer, or official to provide something "off the books" or informally; unusual or unexplained urgency around a transaction where a government decision is pending; requests for personal benefits (a job for a relative, a ticket to a sporting event, a consulting contract for a family member) from someone with decision-making authority over a contract your organisation wants; and markets or business activities that are consistently identified in corruption risk indexes (such as Transparency International's Corruption Perceptions Index) as high-risk. Risk does not mean prohibited — it means additional scrutiny, senior approval, and enhanced documentation are required.
        challenge: |
          Bribery rarely announces itself. It arrives as a generous gift, an
          unusually easy contract, a third-party agent with vague responsibilities,
          or a request to process a payment without documentation.

          Answer the five questions below. Think like a compliance officer — what
          looks normal but isn't, and why does the context matter?
        instructions: |
          Key areas this lesson covers:
          — Gifts and hospitality: value thresholds, timing, frequency, transparency
          — Facilitation payments disguised as fees or expenses
          — Third-party risk: agents, distributors, consultants acting on behalf of the company
          — Conflicts of interest: undisclosed relationships, personal benefit from a business decision
          — Unusual payment requests: cash, third-country accounts, split invoices, inflated invoices
          — Due diligence red flags: agents who won't sign anti-bribery agreements, no verifiable track record
          — Pressure tactics: "this is how it's done here", urgency, implied threats to the deal
        rubric:
          - criterion: Gift and hospitality red flags identified with reasoning
            points: 20
            hint: Does the answer identify specific red flags — high value, poor timing, lack of transparency, personal rather than business benefit — and explain why each is concerning?
            question: >
              Not all gifts and hospitality are bribes. Describe four factors that would raise
              a red flag about a gift or hospitality offer in a business context. For each factor,
              explain specifically what risk it signals. A supplier invites you and your spouse
              on a five-day international trip shortly before a contract renewal decision. What
              should you do and why?
          - criterion: Third-party corruption risk explained correctly
            points: 20
            hint: Does the answer explain that companies are liable for bribes paid by agents acting on their behalf, and describe specific due diligence steps?
            question: >
              Many bribery prosecutions involve third-party agents — consultants, distributors,
              or local partners — rather than direct company employees. Explain why this creates
              legal risk for the company even if no employee personally paid a bribe. What due
              diligence should a company conduct before engaging a third-party agent in a market
              with elevated corruption risk?
          - criterion: Unusual payment red flags identified in scenario
            points: 20
            hint: Does the answer identify the specific red flags in the scenario — cash, third-country routing, lack of documentation — and explain what each suggests?
            question: >
              A business partner requests that their quarterly payment be made in cash, split
              across two invoices each just below the reporting threshold, and sent to a bank
              account in a country where they have no business operations. Identify every red
              flag in this request, explain what each one suggests, and describe what you should
              do rather than process the payment.
          - criterion: '"This is how it''s done here" pressure tactic evaluated'
            points: 20
            hint: Does the answer explain that local custom does not create a legal defence and describe how to respond to this pressure professionally?
            question: >
              You are working on a government contract in a country with a high corruption
              perception index. A local partner tells you that a payment to a procurement
              official is standard practice and that competitors are doing it. They say if
              you don't, you will lose the contract. Evaluate this argument legally and
              practically. What should you do, and what should you say to the partner?
          - criterion: Conflict of interest as a corruption red flag explained
            points: 20
            hint: Does the answer explain that undisclosed conflicts of interest are both an ethical violation and a potential corruption indicator, and describe a disclosure process?
            question: >
              A procurement manager is responsible for selecting a supplier and has not disclosed
              that their spouse is a director of one of the bidding companies. Explain why this
              undisclosed conflict of interest is a serious compliance issue beyond just
              awkwardness. How does a conflict of interest create a corruption risk even if no
              explicit payment is made? What should the organisation require in this situation?

      - slug: abc-money-laundering
        number: 3
        title: "Money Laundering Basics"
        tagline: "Clean money is the goal. Knowing the stages means you can spot the signs."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Money laundering is the process of making the proceeds of criminal activity appear to be legitimate funds. It involves three stages: placement (introducing illegal cash or assets into the financial system, often through cash-intensive businesses, smurfing — breaking large amounts into small deposits — or purchasing assets); layering (moving the funds through multiple transactions, accounts, jurisdictions, and instruments to obscure their origin — wire transfers, currency conversion, shell companies, cryptocurrency); and integration (the laundered funds re-enter the economy as apparently legitimate assets — property, investments, luxury goods — which the criminal can now use openly). Understanding these stages helps identify when a business relationship or transaction may be part of a laundering scheme.

          Businesses have legal obligations under anti-money laundering (AML) regulations, which vary by jurisdiction but commonly include: Customer Due Diligence (CDD) — verifying the identity of customers and, in higher-risk situations, beneficial owners (Enhanced Due Diligence, or EDD); ongoing monitoring of business relationships for transactions inconsistent with the customer's profile; reporting suspicious activity to the relevant financial intelligence unit (the NCA's UKFIU in the UK, FinCEN in the US); and maintaining records of transactions and due diligence for defined periods. In many regulated sectors, designated individuals (Money Laundering Reporting Officers, MLROs) have specific statutory responsibilities for AML compliance.

          Suspicious activity indicators relevant to businesses outside the financial sector include: customers who are unusually reluctant to provide information about their business or the purpose of a transaction; payments from unexpected third parties or through unusual routes (a customer who asks you to invoice someone else); transactions that appear commercially irrational — paying significantly above market rate, or purchasing and quickly reselling at a loss; cash payments for large transactions in contexts where this is unusual; and business structures or corporate arrangements that seem designed to obscure who the ultimate beneficial owner is. Tipping off — informing a customer that they are under suspicion or that a suspicious activity report has been filed — is itself a serious criminal offence under AML legislation.
        challenge: |
          Money laundering is the process of making criminally obtained funds
          appear legitimate. Understanding the three stages and the red flags
          at each one helps you recognise when your organisation — or you
          personally — might be drawn into it.

          Answer the five questions below with specific reasoning. Generic
          definitions will score lower than applied understanding.
        instructions: |
          Key areas this lesson covers:
          — Three stages: placement (entering the financial system), layering (obscuring the trail), integration (appearing legitimate)
          — Predicate offences: bribery and corruption proceeds fuel money laundering
          — Know Your Customer (KYC): verifying identity and beneficial ownership before doing business
          — Suspicious Activity Reports (SARs): when and how to file, tipping-off offence
          — Shell companies and beneficial ownership: why they are used and how to look past them
          — Trade-based money laundering: over/under invoicing, phantom shipments
          — Personal liability: "wilful blindness" — ignoring obvious signs is not a defence
        rubric:
          - criterion: Three stages correctly explained with examples
            points: 20
            hint: Does the answer correctly describe placement, layering, and integration — with a concrete example for each — rather than just naming them?
            question: >
              Explain the three stages of money laundering — placement, layering, and integration
              — and give one realistic example of how each stage might occur in practice.
              At which stage is detection typically easiest, and why? Why is integration the
              most dangerous stage from a business participation risk perspective?
          - criterion: KYC purpose and process explained correctly
            points: 20
            hint: Does the answer explain that KYC verifies who you are actually doing business with — including beneficial owners, not just listed names — and why this matters for money laundering prevention?
            question: >
              Explain what Know Your Customer (KYC) means and why it is important for preventing
              money laundering. What is a "beneficial owner" and why does identifying them matter
              beyond just knowing the company name on a contract? Give an example of how a shell
              company structure could be used to obscure beneficial ownership during a money
              laundering scheme.
          - criterion: Suspicious Activity Report obligation explained correctly
            points: 20
            hint: Does the answer explain who is required to file a SAR, what triggers the obligation, and what the tipping-off offence is?
            question: >
              What is a Suspicious Activity Report (SAR) and who is required to file one? What
              level of suspicion is required to trigger the obligation — must you be certain that
              money laundering is occurring? Explain what "tipping off" means and why it is a
              separate criminal offence to warn a subject that a SAR has been or may be filed
              about them.
          - criterion: Wilful blindness correctly applied to scenario
            points: 20
            hint: Does the answer correctly explain that deliberately ignoring obvious red flags provides no legal protection and may constitute the mental element for a money laundering offence?
            question: >
              A client pays for a large professional services engagement entirely in cash, refuses
              to provide identification, and says they prefer not to have a paper trail for
              "commercial reasons." A colleague says: "I didn't ask where the money came from,
              so I'm not responsible." Evaluate this argument. Explain what "wilful blindness"
              means legally and how it applies to this situation.
          - criterion: Trade-based money laundering red flags identified
            points: 20
            hint: Does the answer correctly explain over/under-invoicing or phantom shipments and describe what due diligence steps would catch them?
            question: >
              Explain what trade-based money laundering is and describe one specific technique
              used to move value through trade transactions. A supplier submits an invoice for
              goods at a price significantly above the market rate with no supporting
              documentation. What red flags does this present, and what steps should your
              organisation take before processing the payment?

      - slug: abc-your-obligations
        number: 4
        title: "Your Obligations"
        tagline: "Compliance is not someone else's job."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Anti-bribery compliance is not only the responsibility of the legal or compliance team — it applies to every employee and is a condition of employment at any organisation with a serious compliance programme. Your personal obligations fall into four main areas: knowing the rules, managing your own conduct, using the systems your organisation has put in place, and raising concerns when you encounter situations that may involve bribery or corruption.

          Knowing the rules means understanding what is and is not permitted in your specific role. Gifts and hospitality policies typically set monetary thresholds for what can be accepted or given without approval (commonly £50–100 for gifts, with more flexibility for hospitality), require that these are recorded in a gifts and hospitality register, prohibit cash gifts in any direction, and apply stricter rules around government officials. Expenses policies prohibit creating slush funds or fictitious expense claims that could be used for improper payments. Procurement policies require competitive tendering and prohibit relationships with suppliers where there is an undisclosed conflict of interest. You are responsible for knowing what your organisation's policies say and following them, even when a counterparty's expectations or local custom suggests otherwise.

          Using the systems available to you means: getting transactions approved through the right channels (not bypassing authorisations because they feel bureaucratic); recording accurately in the books and records (expense claims, hospitality registers, invoices); conducting due diligence on third parties before engaging them; and escalating to your manager or the compliance team when you encounter a situation that doesn't fit cleanly within the rules. Raising concerns means using your organisation's speak-up or whistleblowing channel to report suspected bribery — whether your own concerns or something you have witnessed. Retaliation against whistleblowers is prohibited by law in most jurisdictions, and most serious bribery investigations begin with an internal report from an employee who saw something and spoke up.
        challenge: |
          Anti-bribery and anti-money laundering obligations are not just for
          compliance teams. They attach to individuals — including you — and
          include active duties to report, to conduct due diligence, and to
          keep records.

          Answer the five questions below. Think through both what you must do
          and what happens when you don't.
        instructions: |
          Key areas this lesson covers:
          — Individual reporting obligations: when you must report, to whom, and how
          — Due diligence responsibilities: your role in checking third parties and transactions
          — Record keeping: what to document, for how long, why it matters in an investigation
          — Whistleblower protection: legal protections for good-faith reporting, what they cover
          — Code of conduct obligations: acknowledging, training, certifying compliance
          — Consequences of non-compliance: personal criminal liability, termination, debarment
          — Speak up culture: why silence is not neutral
        rubric:
          - criterion: Individual reporting obligation described correctly
            points: 20
            hint: Does the answer explain that individuals have an affirmative duty to report — not just an option — and describe who to report to and what information to provide?
            question: >
              You suspect that a payment made through your department may have been a bribe.
              You did not authorise it and are not sure of the details. Describe your obligation
              in this situation. Who should you report to? Is it sufficient to mention it
              informally to a colleague, or is something more required? What information should
              you document before reporting?
          - criterion: Whistleblower protection scope correctly explained
            points: 20
            hint: Does the answer correctly describe what protections exist — against dismissal, demotion, harassment — and explain that these apply to good-faith reports even if unsubstantiated?
            question: >
              Explain what whistleblower protection means in the context of anti-bribery reporting.
              What specific forms of retaliation is a reporter legally protected against? Does
              the protection apply only if the report turns out to be correct, or does it cover
              good-faith reports that are investigated and not substantiated? What should you do
              if you experience retaliation after reporting?
          - criterion: Record keeping obligation explained with specificity
            points: 20
            hint: Does the answer explain what records must be kept — approvals, due diligence, hospitality registers — why accuracy matters, and what falsification of records means legally?
            question: >
              Anti-bribery laws often include specific record-keeping requirements alongside the
              bribery prohibitions. Describe at least three categories of records that a company
              should maintain to support its anti-bribery compliance programme. Why is accurate
              record keeping important not just for audits but for individual legal protection?
              What can happen if records are falsified or destroyed after a suspected violation?
          - criterion: Personal due diligence responsibility applied to scenario
            points: 20
            hint: Does the answer explain that due diligence is not purely a compliance team function, and describe specific steps the individual should take before proceeding?
            question: >
              You are asked to approve a payment to a new vendor you have not worked with before.
              The vendor was introduced by a senior colleague and the contract was negotiated
              without a standard procurement process. Describe the due diligence steps you should
              take before approving the payment. Is it sufficient to rely on a senior colleague's
              introduction? What happens to your position if the payment later turns out to be
              corrupt?
          - criterion: Consequences of non-compliance for individuals stated accurately
            points: 20
            hint: Does the answer describe personal criminal liability — not just company consequences — including imprisonment, fines, and professional debarment?
            question: >
              A manager tells their team: "If anything goes wrong with this deal, the company
              will handle it — that's what the legal team is for." Explain why this is wrong.
              What personal consequences can an individual employee face for participating in
              or concealing bribery, even if acting on instructions from a superior? Does
              following orders provide a defence?

      - slug: abc-real-world-scenarios
        number: 5
        title: "Real-World Scenarios"
        tagline: "Pressure looks different in practice than in a policy document."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Abstract principles of anti-bribery compliance become significantly clearer — and significantly harder — when applied to real situations. The difficulty is rarely that someone is explicitly offered a briefcase of cash; it is that situations arise in grey areas, where the right answer requires judgement, context, and sometimes the courage to decline something that everyone around you seems to accept as normal. Scenario-based reasoning is how you develop the judgement to navigate these situations correctly.

          Consider how the same action can be acceptable in one context and a bribe in another. Paying for a client dinner as part of building a long-term business relationship, where the hospitality is proportionate to the relationship and consistent with your organisation's policy, is legitimate. The same dinner, given to the procurement official of a company that is currently reviewing your bid, where the value is above your policy threshold and the event is not disclosed or approved, is a bribe or at minimum a serious compliance risk. The questions you should be asking: Is this reasonable and proportionate? Is it transparent — would I be comfortable if my CEO, my legal team, and the FT's front page could all see this? Is it recorded properly? Is it approved? Is there a government official involved, which requires extra caution?

          The hardest scenarios involve pressure from a client, a market where "everyone does it," or a genuine belief that a payment is the only way to get something done. In these situations, the organisation's obligation — and your personal obligation — is to refuse and to escalate, not to rationalise. "Everyone does it here" has not historically been a successful defence in court or before a regulator. The existence of local custom or commercial pressure does not change the legal position. What it means in practice is that some contracts cannot ethically or legally be won in some markets — and declining them is the correct business decision, even when it is a costly one.
        challenge: |
          Anti-bribery knowledge is tested in moments of pressure — when a deal
          is at risk, a relationship is uncomfortable, or the right answer is
          inconvenient. These scenarios put you in those moments.

          Answer the five questions below. Walk through your reasoning clearly —
          what you would do, what you would say, and why.
        instructions: |
          Key areas this lesson covers:
          — Responding to direct bribe requests from officials or counterparties
          — Managing hospitality and gift situations that approach policy limits
          — Handling pressure from senior colleagues or business partners to "make it work"
          — Escalating concerns without damaging business relationships unnecessarily
          — Documenting interactions that felt improper, even if no payment was made
          — Navigating high-risk markets and relationship-driven business cultures
          — Post-incident response: what to do if you discover a historic violation
        rubric:
          - criterion: Direct bribe request scenario handled correctly
            points: 20
            hint: Does the answer decline clearly, document the interaction, report internally, and avoid aggressive confrontation that could create safety risk or diplomatic incident?
            question: >
              You are meeting with a government official to finalise permits for a project.
              The official makes clear that the permits will be delayed for months unless a
              "processing contribution" is made to a personal account. The project is on a
              tight deadline and your manager is counting on this approval. Describe exactly
              what you would do and say in the meeting, and what steps you would take
              immediately afterwards.
          - criterion: Senior pressure scenario navigated with appropriate escalation
            points: 20
            hint: Does the answer refuse to authorise the payment, document the conversation, and escalate through appropriate channels — including over the manager's head if necessary?
            question: >
              Your manager tells you privately that a payment described in the system as a
              "consulting fee" was actually made to help secure a contract in a high-risk
              market, and that you should not ask questions about it when preparing the
              quarterly accounts. They say this is how the business has always worked and
              that your job is safe as long as you're a team player. Describe your response,
              your obligations, and your escalation path.
          - criterion: Hospitality boundary scenario reasoned through correctly
            points: 20
            hint: Does the answer check against policy, consider timing and context — not just value — and describe the approval or refusal process rather than just accepting or refusing outright?
            question: >
              A key client invites you to a hospitality box at a major sporting event. The
              tickets are expensive, the timing coincides with an ongoing procurement decision
              in which your company is a bidder, and the client mentions your competitor will
              also be there. Walk through your decision process. What factors matter beyond
              the monetary value of the invitation? What should you do before accepting or
              declining?
          - criterion: Historic violation discovery handled correctly
            points: 20
            hint: Does the answer explain that discovery of a historic violation must be reported internally — not concealed — and describe the risk of concealment versus voluntary disclosure?
            question: >
              While reviewing old contracts before a merger due diligence process, you discover
              documentation suggesting that a former employee made improper payments to win a
              contract three years ago. The employee has since left the company. No one else
              appears to know. Describe what you should do. What is the risk of doing nothing?
              What is the potential benefit of voluntary disclosure to the relevant authorities?
          - criterion: High-risk market documentation habit described correctly
            points: 20
            hint: Does the answer describe contemporaneous documentation of interactions — even ones that felt uncomfortable but where no payment was made — and explain why this protects the individual and the company?
            question: >
              You regularly travel to markets with elevated corruption risk and interact with
              government officials as part of your role. No improper payments have ever been
              made, but you occasionally receive requests or comments that you decline. Describe
              the documentation habits you should maintain on an ongoing basis. Why is it
              important to document interactions where you said no, not just transactions that
              occurred?

  # ============================================================
  # COURSE 7 — Data Privacy & GDPR
  # ============================================================
  - slug: data-privacy-gdpr
    title: "Data Privacy & GDPR"
    tagline: "Everyone who touches data needs to know this."
    description: >
      Five lessons covering the legal and practical essentials of data privacy
      under GDPR. Written answers, real scenarios, graded on accuracy and
      reasoning. No multiple choice.
    icon: "🔒"
    tier: 1
    difficulty: beginner
    lesson_type: knowledge
    lessons:

      - slug: gdpr-what-is-personal-data
        number: 1
        title: "What is Personal Data?"
        tagline: "If you can identify a person, it's personal data."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Personal data, under GDPR, is any information relating to an identified or identifiable natural person — the "data subject." A person is identifiable if they can be identified directly or indirectly, by reference to an identifier such as a name, an ID number, location data, an online identifier, or one or more factors specific to their physical, physiological, genetic, mental, economic, cultural, or social identity. The key word is "or" — a person does not need to be directly named for information about them to be personal data. A dataset containing no names but combining postcode, date of birth, and job title may still be personal data if someone could use that combination to identify a specific individual, even with some additional effort.

          GDPR draws a distinction between ordinary personal data and special categories of personal data, which are accorded stronger protection because of their particular sensitivity. The special categories under Article 9 are: racial or ethnic origin, political opinions, religious or philosophical beliefs, trade union membership, genetic data, biometric data processed for the purpose of uniquely identifying a person, health data, data concerning sex life, and data concerning sexual orientation. Processing special category data is prohibited unless one of a specific set of conditions applies — including explicit consent from the data subject, necessity for employment law purposes, vital interests, or scientific research with appropriate safeguards. Criminal offence data is similarly restricted under Article 10.

          Pseudonymisation replaces directly identifying information with a reference code, but if the key linking the code to the individual is retained anywhere, the data remains personal data — because re-identification is possible with the key. True anonymisation removes all reasonable means of re-identification, including through combination with other datasets, and data that is genuinely anonymous falls outside the scope of GDPR entirely. The distinction matters practically: pseudonymised data still requires legal basis, appropriate security, and compliance with data subject rights; anonymised data does not. Achieving genuine anonymisation is harder than it appears — researchers have repeatedly demonstrated re-identification of supposedly anonymous datasets using publicly available information.
        challenge: |
          Data privacy law is built on one foundational concept: personal data.
          If you cannot identify what counts as personal data — and why — you
          cannot apply any of the rules that flow from it.

          Answer the five questions below. Be precise. Vague generalisations
          will not score well.
        instructions: |
          Key areas this lesson covers:
          — The legal definition of personal data under GDPR
          — Special categories of data and why they receive extra protection
          — The difference between identified and identifiable individuals
          — Pseudonymous vs anonymised data
          — Examples from real organisational contexts
        rubric:
          - criterion: Legal definition of personal data accurately stated
            points: 20
            hint: Does the answer correctly reflect the GDPR definition — any information relating to an identified or identifiable natural person?
            question: >
              State the GDPR definition of personal data in your own words. What are the two key
              conditions that make information "personal data"? Give two examples of information
              that is personal data and one example of information that is not.
          - criterion: Special categories of data correctly identified
            points: 20
            hint: Does the answer name at least five of the special categories listed in Article 9, explain why they attract extra protection, and describe what is required to process them?
            question: >
              What are special categories of personal data under GDPR? Name at least five.
              Why do they receive stronger protection than ordinary personal data?
              What must an organisation establish before processing special category data?
          - criterion: Identified vs identifiable distinction correctly explained
            points: 20
            hint: Does the answer correctly explain that "identifiable" includes indirect identification — e.g. combining location, job title, and age — and applies the concept to a realistic scenario?
            question: >
              Explain the difference between an "identified" individual and an "identifiable"
              individual. A dataset contains no names, but includes postcode, date of birth, and
              job title. Is this personal data? Justify your answer with reference to the
              identifiability concept.
          - criterion: Pseudonymisation vs anonymisation distinction correctly drawn
            points: 20
            hint: Does the answer correctly explain that pseudonymous data is still personal data under GDPR while truly anonymous data falls outside the regulation — and explain why?
            question: >
              What is the difference between pseudonymisation and anonymisation under GDPR?
              A company replaces customer names with unique reference codes but retains the
              key linking names to codes in a separate secure file. Is this data still personal
              data? Why or why not? What would need to change for the data to be truly anonymous?
          - criterion: Personal data correctly identified in an organisational scenario
            points: 20
            hint: Does the answer correctly identify all personal data elements in the scenario and correctly classify any special category data?
            question: >
              Your organisation's HR system holds the following: employee name, work email address,
              salary, National Insurance number, sickness absence records, performance review notes,
              CCTV footage from the office entrance, and the employee's work laptop's IP address.
              Which of these are personal data? Are any special category data? Explain your
              reasoning for each item.

      - slug: gdpr-principles
        number: 2
        title: "GDPR Principles"
        tagline: "Six rules that govern everything you do with data."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Article 5 of GDPR sets out six data protection principles that govern every processing activity involving personal data. These are not aspirational guidelines — they are legal obligations, and the organisation responsible for processing (the controller) must be able to demonstrate compliance with all of them at any time. Article 5(2) adds an overarching accountability principle that makes this a proactive obligation: compliance must be actively evidenced, not merely claimed.

          The six principles are: Lawfulness, fairness, and transparency — processing must have a valid legal basis, must not be deceptive or harmful, and data subjects must be informed about how their data is used. Purpose limitation — data collected for a specified purpose must not be further processed in ways incompatible with that purpose. Data minimisation — only data that is adequate, relevant, and limited to what is necessary for the purpose should be collected; collecting data "just in case" violates this principle. Accuracy — data must be kept accurate and up to date, with inaccurate data erased or corrected promptly. Storage limitation — data must not be kept longer than is necessary for the purpose; retention periods should be defined, documented, and enforced. Integrity and confidentiality (security) — appropriate technical and organisational measures must protect data against unauthorised or unlawful processing and against accidental loss, destruction, or damage.

          The practical implication of these principles is that every new processing activity should be designed with them in mind from the outset. Purpose limitation means that when a new use of existing data is proposed — using a customer email list for a new marketing campaign, for example — the new purpose must be assessed for compatibility with the original purpose. Storage limitation means that data must not simply accumulate indefinitely: there must be defined retention periods and a mechanism that enforces them. The accountability principle means that all of this must be documented — in privacy notices, data protection impact assessments, Records of Processing Activities, and training logs — so that the organisation can demonstrate compliance rather than simply assert it.
        challenge: |
          Article 5 of GDPR sets out six data protection principles that apply
          to every processing activity. These are not aspirational guidelines —
          they are legal obligations, and non-compliance can result in regulatory
          action.

          Answer the five questions below. For each principle, go beyond the name:
          explain what it requires in practice and what it looks like when it fails.
        instructions: |
          The six principles are:
          — Lawfulness, fairness and transparency
          — Purpose limitation
          — Data minimisation
          — Accuracy
          — Storage limitation
          — Integrity and confidentiality (security)

          Article 5(2) adds accountability: the controller must be able to
          demonstrate compliance with all of the above.
        rubric:
          - criterion: All six principles named and accurately described
            points: 20
            hint: Does the answer name all six Article 5 principles and give a concise, accurate description of what each requires?
            question: >
              Name and briefly describe all six GDPR data protection principles set out in
              Article 5. For each one, state in plain English what it requires an organisation
              to do (or not do).
          - criterion: Purpose limitation applied to a realistic scenario
            points: 20
            hint: Does the answer correctly identify that processing data for a new purpose incompatible with the original purpose violates purpose limitation, and explain what should be done instead?
            question: >
              A company collects customer email addresses for order confirmations. Six months
              later, the marketing team wants to use the same list to send promotional emails.
              Which GDPR principle is most directly engaged? Is this use permitted? What would
              the company need to establish before proceeding?
          - criterion: Data minimisation principle correctly applied
            points: 20
            hint: Does the answer correctly identify that collecting more data than necessary for the stated purpose violates data minimisation, and describe a corrective approach?
            question: >
              An organisation asks job applicants to provide their full date of birth, home
              address, national insurance number, and passport details on the initial application
              form — before any offer is made. Which principle is most directly at issue?
              What does the principle require, and what should the organisation do instead?
          - criterion: Storage limitation requirements understood
            points: 20
            hint: Does the answer explain that data must not be kept longer than necessary, that retention periods should be defined and documented, and describe what should happen at the end of the retention period?
            question: >
              What does the storage limitation principle require of an organisation?
              A company holds former customer records "just in case they come back."
              No retention period has ever been defined. What is the compliance problem,
              and what practical steps should the organisation take to address it?
          - criterion: Accountability principle explained and distinguished from the others
            points: 20
            hint: Does the answer correctly explain that accountability means actively demonstrating compliance — not just complying — and give at least two examples of accountability evidence?
            question: >
              Article 5(2) introduces the accountability principle. What does it add beyond
              the other five principles? Give at least two concrete examples of how an
              organisation would demonstrate accountability to a regulator. Why is it
              insufficient to simply comply with the principles in practice without documentation?

      - slug: gdpr-individual-rights
        number: 3
        title: "Individual Rights"
        tagline: "Data subjects have power. Know what to do when they use it."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          GDPR gives individuals (data subjects) a set of enforceable rights over their personal data. These rights are not optional features — they are legal entitlements, and organisations must have processes in place to respond to them within defined timeframes. Failing to respond correctly to a rights request — or ignoring it — can result in regulatory complaints and fines. The core rights are: the right of access (to receive a copy of personal data held and information about how it is processed); the right to rectification (to have inaccurate data corrected); the right to erasure ("the right to be forgotten" — to have data deleted in certain circumstances); the right to restriction of processing; the right to data portability (to receive data in a machine-readable format); and the right to object (to stop processing in certain circumstances, particularly direct marketing).

          The right of access — commonly exercised through a Subject Access Request (SAR) — must be responded to within one calendar month of receipt, extendable by a further two months in complex cases (with notification to the data subject). There is generally no fee for a SAR. The response must include: a copy of the personal data; confirmation that data is being processed; the purposes of processing; the categories of data; recipients of the data; the retention period; and information about other rights. The right to erasure is not absolute — it does not apply when processing is necessary for compliance with a legal obligation, the exercise of legal claims, archiving in the public interest, or other specified grounds. Organisations should therefore conduct a careful assessment rather than automatically erasing data on request.

          Requests can be submitted by any means — email, letter, verbally. Organisations cannot insist on a specific format. Identity verification is permissible where there is reasonable doubt about the requester's identity, but the bar for requesting verification should be proportionate — you cannot make it systematically burdensome. Requests that are manifestly unfounded or excessive (particularly where they are repetitive) may be refused or charged a reasonable fee, but the organisation must be able to demonstrate the basis for this conclusion. The right to object to direct marketing is absolute and must be honoured immediately, without any assessment of grounds.
        challenge: |
          GDPR gives individuals a set of rights over their personal data.
          These rights are not theoretical — individuals can and do exercise them,
          and organisations have legal obligations to respond correctly and on time.

          Answer the five questions below with the precision expected of someone
          who might actually receive a rights request at work.
        instructions: |
          The individual rights under GDPR include:
          — Right of access (Subject Access Request / SAR)
          — Right to rectification
          — Right to erasure ("right to be forgotten")
          — Right to restriction of processing
          — Right to data portability
          — Right to object
          — Rights related to automated decision-making and profiling

          Key operational points: one calendar month to respond, right to extend
          by two further months in complex cases (with notification), no fee in
          most cases, identity verification before disclosure.
        rubric:
          - criterion: Core individual rights named and accurately described
            points: 20
            hint: Does the answer name at least five rights and give an accurate description of what each entitles the individual to?
            question: >
              Name at least five individual rights granted by GDPR and briefly describe what
              each right entitles the data subject to do or receive. Include the right of
              access, the right to erasure, and the right to data portability in your answer.
          - criterion: Subject Access Request process correctly described
            points: 20
            hint: Does the answer cover the one-month deadline, identity verification, what must be provided, the right to extend, and the prohibition on charging a fee in most cases?
            question: >
              An individual emails your organisation on a Monday requesting "all the personal
              data you hold about me." Walk through the steps your organisation must take from
              receipt of the request to providing the response. What is the deadline? What
              information must be provided? When can the deadline be extended, and what must
              you do if you extend it?
          - criterion: Right to erasure and its limits correctly explained
            points: 20
            hint: Does the answer explain that the right to erasure is not absolute, name at least two legitimate grounds for refusing it (e.g. legal obligation, public interest, legal claims), and apply this to a scenario?
            question: >
              A former employee submits a request for erasure, asking you to delete all
              personal data the organisation holds about them. Are you required to comply?
              Describe two circumstances in which the right to erasure does not apply.
              What should you do if you can erase some data but not all of it?
          - criterion: Right to object distinguished from right to erasure
            points: 20
            hint: Does the answer correctly explain that the right to object applies primarily to processing based on legitimate interests or direct marketing, and describe the outcome of a successful objection?
            question: >
              What is the right to object, and when does it apply? How does it differ from
              the right to erasure? A customer says "I object to you using my data for
              profiling." What must your organisation do, and under what circumstances
              could you refuse the objection?
          - criterion: Appropriate response to a manifestly unfounded or excessive request described
            points: 20
            hint: Does the answer correctly state that organisations may charge a reasonable fee or refuse to respond to manifestly unfounded or excessive requests, but must be able to demonstrate this conclusion?
            question: >
              An individual has submitted six Subject Access Requests over the past three months,
              each requesting the same information with minor variations. What does GDPR allow
              you to do with requests that are manifestly unfounded or excessive? What must
              you be able to demonstrate to justify this response, and what should you
              communicate to the individual?

      - slug: gdpr-data-breaches
        number: 4
        title: "Data Breaches"
        tagline: "72 hours. Know what to do before the clock starts."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          A personal data breach is any breach of security that leads to the accidental or unlawful destruction, loss, alteration, unauthorised disclosure of, or access to personal data. This is broader than most people initially assume: it includes not just malicious external attacks, but accidental incidents — a misdirected email, a lost unencrypted USB drive, a file shared with the wrong person — as well as internal incidents such as an employee accessing data they are not authorised to see, or a system failure that corrupts personal data. The legal obligations triggered by a breach depend on the risk level: not every breach requires notification, but every breach requires documentation.

          When a breach is discovered, the controller must assess its likely risk to individuals' rights and freedoms. If the breach is unlikely to result in any risk, it should be documented internally but no notification is required. If the breach is likely to result in a risk, it must be reported to the relevant supervisory authority (in the UK, the ICO) within 72 hours of becoming aware — not within 72 hours of the breach itself occurring, but from when the organisation becomes aware. Partial notifications are acceptable if not all information is available within 72 hours, provided the outstanding information is submitted without further undue delay. If the breach is likely to result in a high risk to individuals — their rights, finances, health, safety, or reputation — then the affected individuals must also be notified directly, without undue delay.

          The content of a supervisory authority notification must include: a description of the nature of the breach and the categories and approximate number of individuals and records affected; the contact details of the data protection officer or other contact point; the likely consequences of the breach; and the measures taken or proposed to address the breach and mitigate its effects. Regardless of whether the breach meets the notification threshold, it must be documented in an internal breach register. This register serves two purposes: it provides evidence of the organisation's awareness and response process, and it enables the supervisory authority to assess whether the organisation is systematically identifying and managing breaches correctly.
        challenge: |
          A data breach can happen to any organisation. The difference between
          a manageable incident and a regulatory disaster is often how quickly
          and correctly you respond.

          Answer the five questions below as if you might be the person who
          receives the breach report at 4pm on a Friday.
        instructions: |
          Key areas this lesson covers:
          — GDPR's definition of a personal data breach (Article 4(12))
          — The 72-hour notification obligation to the supervisory authority (Article 33)
          — When notification to affected individuals is also required (Article 34)
          — What must be documented in every case (Article 33(5))
          — The ICO (or relevant national authority) reporting process
          — Common breach scenarios: ransomware, misdirected email, lost devices,
            insider access, accidental publication
        rubric:
          - criterion: Legal definition of a personal data breach correctly stated
            points: 20
            hint: Does the answer correctly reflect the Article 4(12) definition — a breach of security leading to accidental or unlawful destruction, loss, alteration, unauthorised disclosure of, or access to personal data?
            question: >
              State the GDPR definition of a personal data breach. A staff member
              accidentally emails a customer's invoice to the wrong customer. Is this
              a personal data breach? What about a ransomware attack that encrypts
              data but where there is no evidence of exfiltration? Justify both answers.
          - criterion: 72-hour notification rule correctly explained
            points: 20
            hint: Does the answer correctly state the 72-hour window, explain that it runs from when the controller becomes "aware," describe what must be reported, and note that incomplete notifications can be submitted with further information to follow?
            question: >
              When must a personal data breach be notified to the supervisory authority?
              What triggers the 72-hour clock? What information must the notification contain?
              If you do not have all the information within 72 hours, what are you permitted
              to do? When is notification to the supervisory authority not required?
          - criterion: Obligation to notify affected individuals correctly described
            points: 20
            hint: Does the answer correctly state that individual notification is required when the breach is likely to result in a high risk to individuals' rights and freedoms, and describe what the notification must contain?
            question: >
              In what circumstances must an organisation notify the individuals affected
              by a data breach — not just the supervisory authority? What must that
              notification contain? A database containing 200 employees' names and
              work email addresses was briefly accessible to an external party due to
              a misconfiguration, now fixed. Is individual notification likely to be required?
              Justify your answer.
          - criterion: Documentation requirements correctly described
            points: 20
            hint: Does the answer correctly state that all breaches must be documented in an internal breach register regardless of whether they are notified, and describe what the record must contain?
            question: >
              GDPR requires organisations to document all personal data breaches — not
              only those that are notified to the authority. What must the documentation
              include? Why must even minor breaches that do not meet the notification
              threshold be recorded? What purpose does the breach register serve during
              a regulatory inspection?
          - criterion: Breach response process applied to a realistic scenario
            points: 20
            hint: Does the answer correctly identify the breach type, assess notification obligations, describe the immediate containment and investigation steps, and address documentation?
            question: >
              At 3pm on a Thursday, an employee reports that they have left a USB drive
              containing unencrypted records of 500 customers (names, addresses, purchase
              history) on a train two days ago. The drive has not been recovered. Walk
              through the steps you would take from this moment. What decisions must be
              made, and by when? Who needs to be informed, and what should you document?

      - slug: gdpr-privacy-by-design
        number: 5
        title: "Privacy by Design"
        tagline: "Build privacy in from the start. Retrofit is always harder."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Privacy by design is the principle that data protection should be embedded into systems, processes, and products from the outset — not added as an afterthought once a system is built and deployed. Article 25 of GDPR makes this a legal obligation: controllers must implement data protection by design and by default, taking into account the state of the art, the cost of implementation, the nature and purposes of processing, and the risks to individuals. "By default" means that, without any intervention by the data subject, only personal data that is necessary for each specific purpose is processed — the most privacy-protective settings should be the default, not an opt-in.

          The practical implication is that privacy considerations must be part of the design process for any new system, application, or process that handles personal data. This means: limiting data collection to what is actually needed (data minimisation at the architecture level); applying pseudonymisation or encryption where appropriate from the beginning; designing access controls that reflect least-privilege principles; building retention and deletion mechanisms into the system rather than leaving them as manual processes; and considering what data would be exposed in the event of a breach and designing to limit that exposure. Retrofitting privacy controls after a system is built is typically more expensive, less effective, and harder to verify than building them in from the start.

          Data Protection Impact Assessments (DPIAs) are required under Article 35 whenever processing is likely to result in a high risk to individuals — particularly for large-scale processing of special category data, systematic and extensive profiling, or large-scale monitoring of publicly accessible areas. A DPIA is not simply a form to be completed: it is a structured process of identifying the purpose and necessity of the processing, assessing the risks, and identifying measures to mitigate them. Where a DPIA concludes that risks cannot be adequately mitigated, the organisation must consult the supervisory authority before proceeding. The Data Protection Officer (DPO) — mandatory for public authorities, for organisations processing special category data at scale, and for those engaged in large-scale systematic monitoring — must be consulted in the DPIA process and must be independent, with direct access to senior management and protection from retaliation for performing their tasks.
        challenge: |
          Article 25 of GDPR requires data protection by design and by default.
          This is not a checkbox — it is a fundamental shift in how organisations
          are expected to approach systems, processes, and products that handle
          personal data.

          Answer the five questions below with practical reasoning. The grader
          is looking for applied understanding, not a recitation of principles.
        instructions: |
          Key areas this lesson covers:
          — Data Protection by Design (DPbD): embedding privacy into processes and
            systems from the outset, not as an afterthought
          — Data Protection by Default: only collecting what is necessary,
            only processing what is needed for the specific purpose
          — Data Protection Impact Assessments (DPIAs): when they are mandatory,
            what they must contain, and who conducts them
          — Practical techniques: data minimisation, purpose binding, access controls,
            pseudonymisation at the architecture level, retention automation
          — The role of the Data Protection Officer (DPO)
        rubric:
          - criterion: Privacy by Design concept accurately explained
            points: 20
            hint: Does the answer correctly explain that Article 25 requires privacy to be embedded at the design stage of any system or process that handles personal data — not added retrospectively — and describe what this looks like in practice?
            question: >
              Explain what "privacy by design" means under Article 25 of GDPR. Why does
              GDPR require it rather than allowing organisations to add privacy controls
              after a system is built? Give two concrete examples of what embedding privacy
              at the design stage looks like in a real system or process.
          - criterion: Privacy by Default correctly distinguished from Privacy by Design
            points: 20
            hint: Does the answer correctly explain that "by default" means the most privacy-protective settings are the default out of the box — not opt-in — and give a practical example?
            question: >
              What does "data protection by default" mean, and how does it differ from
              "data protection by design"? A new app allows users to make their profile
              public by default, with the option to set it to private. Does this comply
              with the "by default" requirement? What would need to change?
          - criterion: DPIA triggers and purpose correctly described
            points: 20
            hint: Does the answer correctly state that DPIAs are mandatory for processing likely to result in high risk, name at least three trigger scenarios from the ICO/EDPB guidance (e.g. large-scale profiling, systematic monitoring, sensitive data), and describe the key elements a DPIA must contain?
            question: >
              What is a Data Protection Impact Assessment (DPIA), and when is one mandatory
              under GDPR? Name three types of processing that are likely to require a DPIA.
              What must a DPIA contain? What should an organisation do if a DPIA concludes
              that a high risk cannot be mitigated?
          - criterion: Practical Privacy by Design technique applied to a scenario
            points: 20
            hint: Does the answer identify specific, technically meaningful privacy controls appropriate to the scenario — not just "encrypt the data" — and explain how they address the privacy risk?
            question: >
              A development team is building an internal analytics dashboard that will show
              managers how long each named employee spends on different tasks, derived from
              keyboard and mouse activity logs. Identify the privacy risks in this system.
              Describe at least three specific Privacy by Design measures the team should
              apply at the architecture or design stage to reduce the privacy impact.
          - criterion: Role of the DPO correctly described
            points: 20
            hint: Does the answer correctly state when a DPO is mandatory, describe their key responsibilities (monitoring compliance, advising on DPIAs, cooperating with the authority), and note that the DPO must be independent and cannot be penalised for performing their tasks?
            question: >
              When is an organisation required to appoint a Data Protection Officer under
              GDPR? What are the DPO's core responsibilities? A company's legal counsel
              suggests that the Head of IT should double as the DPO because they are
              "technically knowledgeable." What is the compliance risk with this arrangement,
              and what does GDPR require regarding the DPO's position and independence?

  # ============================================================
  # COURSE 8 — HIPAA Awareness
  # ============================================================
  - slug: hipaa-awareness
    title: "HIPAA Awareness"
    tagline: "Patient data isn't just private. It's protected by law."
    description: >
      Five lessons covering HIPAA's core requirements for anyone who handles
      protected health information. Written answers, real scenarios, graded on
      accuracy and practical reasoning.
    icon: "🏥"
    tier: 1
    difficulty: beginner
    lesson_type: knowledge
    lessons:

      - slug: hipaa-what-is-hipaa
        number: 1
        title: "What is HIPAA?"
        tagline: "Covered entities, business associates, and what PHI actually means."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          The Health Insurance Portability and Accountability Act of 1996 (HIPAA) is a US federal law that establishes national standards to protect individuals' medical records and other personally identifiable health information. It applies to "covered entities" — health plans (insurance companies, employer-sponsored health plans, Medicare, Medicaid), healthcare clearinghouses (organisations that process health information between non-standard and standard formats), and healthcare providers (hospitals, clinics, physicians, pharmacies, nursing homes) that transmit health information electronically in connection with covered transactions. HIPAA also applies to "business associates" — any organisation that performs functions or activities on behalf of a covered entity that involve creating, receiving, maintaining, or transmitting protected health information (PHI). Cloud storage providers, billing companies, EHR vendors, and legal firms handling patient records are all examples of business associates.

          HIPAA has three main rules. The Privacy Rule (45 CFR Part 164, Subpart E) establishes standards for how PHI may be used and disclosed, and gives patients rights over their own health information. The Security Rule (45 CFR Part 164, Subpart C) applies specifically to electronic PHI (ePHI) and requires covered entities and business associates to implement administrative, physical, and technical safeguards to ensure its confidentiality, integrity, and availability. The Breach Notification Rule (45 CFR Part 164, Subpart D) requires covered entities to notify affected individuals, the HHS, and in some cases the media when a breach of unsecured PHI occurs.

          Protected Health Information (PHI) is individually identifiable health information that is held or transmitted by a covered entity or business associate. It includes any information that relates to an individual's past, present, or future physical or mental health condition, the provision of healthcare to them, or the payment for that healthcare — and which identifies or could identify the individual. HIPAA defines 18 identifiers whose presence in a dataset makes it PHI: name, geographic data smaller than state, dates (other than year) related to the individual, phone numbers, fax numbers, email addresses, Social Security numbers, medical record numbers, health plan beneficiary numbers, account numbers, certificate/licence numbers, vehicle identifiers, device identifiers, URLs, IP addresses, biometric identifiers, full-face photographs, and any other unique identifying number or code.
        challenge: |
          HIPAA is widely referenced but frequently misunderstood. Before you
          can apply any of its rules, you need to know who it applies to,
          what information it protects, and how the law is structured.

          Answer the five questions below precisely. Vague or generic answers
          will not score well.
        instructions: |
          Key areas this lesson covers:
          — The structure of HIPAA: Privacy Rule, Security Rule, Breach Notification Rule
          — Covered entities: health plans, healthcare clearinghouses, healthcare providers
          — Business associates: vendors and contractors who handle PHI on behalf of covered entities
          — Protected Health Information (PHI): what qualifies, the 18 HIPAA identifiers
          — Electronic PHI (ePHI) and why it attracts additional requirements
        rubric:
          - criterion: HIPAA's structure and purpose correctly described
            points: 20
            hint: Does the answer correctly identify HIPAA's three main rules and explain the overall purpose of the law — protecting patient health information while allowing necessary disclosures?
            question: >
              Describe the purpose of HIPAA and name its three main rules. What does each
              rule govern? Why was HIPAA enacted — what problem was it designed to solve?
          - criterion: Covered entities correctly identified and distinguished
            points: 20
            hint: Does the answer correctly name and distinguish the three types of covered entity — health plans, healthcare clearinghouses, and healthcare providers — with an example of each?
            question: >
              What is a "covered entity" under HIPAA? Name the three categories of covered
              entity and give one real-world example of each. Is a self-insured employer who
              sponsors a health plan a covered entity? Explain your reasoning.
          - criterion: Business associate definition and obligations correctly explained
            points: 20
            hint: Does the answer correctly explain that a business associate is a person or entity that performs functions involving PHI on behalf of a covered entity, that a BAA is required, and that business associates are directly liable under HIPAA?
            question: >
              What is a "business associate" under HIPAA? Give two examples of organisations
              that would qualify as business associates. What is a Business Associate Agreement
              (BAA), and why is it legally required? What happens if a covered entity shares
              PHI with a vendor without a BAA in place?
          - criterion: PHI definition and the 18 identifiers correctly described
            points: 20
            hint: Does the answer correctly explain that PHI is individually identifiable health information held or transmitted by a covered entity, name at least six of the 18 identifiers, and explain why the combination of information matters?
            question: >
              What is Protected Health Information (PHI)? What two conditions must be met for
              health information to qualify as PHI? Name at least six of the 18 HIPAA identifiers.
              A hospital dataset contains diagnosis codes and patient ZIP codes but no names.
              Could this still be PHI? Explain your answer.
          - criterion: ePHI and its additional requirements correctly addressed
            points: 20
            hint: Does the answer correctly explain that ePHI is PHI in electronic form and that the Security Rule adds specific administrative, physical, and technical safeguard requirements beyond the Privacy Rule?
            question: >
              What is ePHI, and how does it differ from PHI? What additional HIPAA rule
              applies specifically to ePHI? Name one administrative, one physical, and one
              technical safeguard that the Security Rule requires for ePHI. Why does
              electronic health information attract additional regulatory requirements?

      - slug: hipaa-patient-rights
        number: 2
        title: "Patient Rights"
        tagline: "Patients have rights over their own health information. Know them."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          The HIPAA Privacy Rule grants patients (data subjects) specific, enforceable rights over their protected health information. These rights are not merely ethical commitments — they are legal entitlements backed by the enforcement authority of the HHS Office for Civil Rights (OCR). Covered entities must have processes, designated contacts, and trained staff in place to respond to rights requests correctly and within the prescribed timeframes. Failure to honour patient rights is a HIPAA violation subject to civil monetary penalties.

          The most frequently exercised right is the right of access under 45 CFR §164.524 — commonly called a "records request." Patients have the right to inspect and obtain a copy of their PHI maintained in a designated record set (typically medical records and billing records). The covered entity must provide access within 30 calendar days of receiving the request, extendable by a further 30 days with written notice to the patient. The information must be provided in the format requested by the patient if readily producible in that format. Fees may be charged only for the reasonable costs of copying, postage, and preparation — not as a barrier to access. The right to request amendment (§164.526) allows patients to request correction of inaccurate or incomplete PHI; the covered entity has 60 days to act, may deny the request on specified grounds, and must document any denial and allow the patient to submit a statement of disagreement.

          Patients also have the right to an accounting of disclosures (§164.528) — a log of certain disclosures the covered entity has made of their PHI without their authorisation, covering the prior six years. This does not include disclosures for treatment, payment, or healthcare operations, nor disclosures the patient authorised. The Notice of Privacy Practices (NPP) must be provided to patients at their first service encounter and describes how the covered entity uses and discloses PHI, patient rights, and how to file a complaint. Patients have the right to request restrictions on uses and disclosures — the covered entity is generally not required to agree, with one important exception: if the patient pays out of pocket in full for a specific service, they have an absolute right to request that information about that service not be disclosed to their health plan, and the covered entity must agree.
        challenge: |
          HIPAA's Privacy Rule grants patients specific rights over their protected
          health information. These rights create direct obligations for covered
          entities — and staff who handle patient information must understand both
          what patients are entitled to and how to respond correctly.

          Answer the five questions below with the precision expected of someone
          who could receive a patient rights request at work.
        instructions: |
          Key patient rights under the Privacy Rule:
          — Right to access PHI (45 CFR §164.524): receive copies of records, 30-day deadline
          — Right to request amendment (45 CFR §164.526): correct inaccurate or incomplete records
          — Right to an accounting of disclosures (45 CFR §164.528): a log of certain disclosures
          — Right to request restrictions on use and disclosure
          — Right to request confidential communications
          — Right to receive a Notice of Privacy Practices (NPP)
        rubric:
          - criterion: Right of access requirements correctly described
            points: 20
            hint: Does the answer correctly state the 30-day response deadline (extendable by 30 days with notice), the requirement to provide the information in the format requested where possible, and the limit on fees?
            question: >
              A patient submits a written request for a complete copy of their medical record.
              What are the covered entity's obligations under the HIPAA right of access?
              What is the deadline for responding? In what format must the records be provided?
              Can the covered entity charge a fee? What can the covered entity do if it cannot
              respond within the standard timeframe?
          - criterion: Right to amendment process correctly explained
            points: 20
            hint: Does the answer correctly explain that the covered entity may deny an amendment request under specific grounds (e.g. the record was not created by the entity, the record is accurate), the 60-day deadline, and what the covered entity must do if it denies the request?
            question: >
              A patient believes their medical record contains an incorrect diagnosis and submits
              a written request to have it amended. Describe the process the covered entity must
              follow. What is the deadline for responding? Under what circumstances can a covered
              entity lawfully deny an amendment request? What must the covered entity do when it
              denies a request?
          - criterion: Accounting of disclosures correctly described
            points: 20
            hint: Does the answer correctly explain that the accounting covers disclosures made without authorisation, the six-year lookback period, and that disclosures for treatment, payment, and operations are excluded from the accounting?
            question: >
              What is an "accounting of disclosures" under HIPAA and what right does it give
              patients? What types of disclosures must be included in the accounting, and which
              are excluded? How far back must the accounting go? A patient requests an accounting
              — what information must each entry in the accounting contain?
          - criterion: Notice of Privacy Practices requirements correctly addressed
            points: 20
            hint: Does the answer correctly explain that the NPP must describe permitted uses and disclosures, patient rights, the covered entity's duties, and how to file a complaint — and that it must be provided at first service?
            question: >
              What is a Notice of Privacy Practices (NPP) and when must it be provided to
              patients? What must the NPP contain? A patient says they were never given an NPP
              when they first visited the clinic three years ago. What is the compliance
              implication for the covered entity?
          - criterion: Right to request restrictions applied to a realistic scenario
            points: 20
            hint: Does the answer correctly explain that covered entities are generally not required to agree to restrictions except in one specific case — when the patient pays out of pocket in full and asks the information not to be disclosed to their health plan — and apply this to the scenario?
            question: >
              A patient tells a clinic they do not want any information about a specific
              treatment disclosed to their health insurance plan, and they will pay for the
              treatment in full out of pocket. Is the clinic required to agree to this
              restriction? What does HIPAA require in this specific situation? Under what
              other circumstances may a patient request restrictions, and is the covered
              entity generally obligated to accept them?

      - slug: hipaa-minimum-necessary
        number: 3
        title: "Minimum Necessary Rule"
        tagline: "Access only what you need. Every time."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          The minimum necessary standard under 45 CFR §164.502(b) requires that covered entities and business associates make reasonable efforts to limit the use, disclosure, and request of PHI to the minimum necessary to accomplish the intended purpose. The principle exists because PHI is sensitive — unnecessary access to health information violates patient privacy even when no further harm results — and because limiting access reduces the attack surface for both accidental and malicious disclosure. The standard applies to uses of PHI within the organisation, disclosures to third parties, and requests for PHI from other organisations.

          There are important exceptions. The minimum necessary standard does not apply to: disclosures to or requests by a healthcare provider for treatment purposes (a physician needs full access to the relevant record, not a minimum necessary subset); disclosures to the patient themselves; disclosures made pursuant to a valid patient authorisation; disclosures required by law; and disclosures to HHS for compliance or enforcement purposes. For all other uses and disclosures, covered entities must establish policies and procedures that identify the persons or classes of persons who need access to PHI to do their jobs, and limit access accordingly. Role-based access controls in electronic health record systems — where a billing clerk can see billing records but not clinical notes, and a nurse can see the records for patients in their unit but not those on another floor — are the practical implementation of the minimum necessary standard.

          "Curiosity browsing" — accessing a patient's records without a legitimate clinical, administrative, or operational need — is one of the most common HIPAA violations and one of the most commonly misunderstood. It does not matter that the information was not shared with anyone else. It does not matter that the patient is a colleague, a family member, or a celebrity whose admission has been widely reported. Accessing a record without a work-related need is an impermissible use of PHI, and covered entities are required to have audit log capabilities for ePHI precisely to detect this. Workforce members who engage in curiosity browsing risk termination and may be referred to HHS; covered entities that fail to detect and address it face regulatory action.
        challenge: |
          The minimum necessary standard is one of the most frequently violated
          HIPAA principles — not because people intend to breach it, but because
          accessing more information than needed feels harmless, efficient, or
          simply habitual.

          It is not harmless. Answer the five questions below with that in mind.
        instructions: |
          Key areas this lesson covers:
          — The minimum necessary standard under 45 CFR §164.502(b)
          — When it applies: uses, disclosures, and requests for PHI
          — When it does not apply: disclosures to the patient themselves,
            disclosures authorised by the patient, disclosures to HHS,
            disclosures required by law, and treatment disclosures between providers
          — Role-based access controls as an implementation mechanism
          — "Curiosity browsing" and its regulatory and employment consequences
          — Reasonable reliance on requestors' representations
        rubric:
          - criterion: Minimum necessary standard accurately stated and explained
            points: 20
            hint: Does the answer correctly state that covered entities must make reasonable efforts to limit PHI to the minimum necessary to accomplish the intended purpose, and explain why this standard exists?
            question: >
              State the HIPAA minimum necessary standard in your own words. What does it
              require of covered entities when they use or disclose PHI? Why does HIPAA
              impose this requirement — what risk does it address? Give one example of a
              use of PHI that would satisfy the standard and one that would not.
          - criterion: Exceptions to the minimum necessary rule correctly identified
            points: 20
            hint: Does the answer correctly name at least four of the recognised exceptions — disclosures to the patient, disclosures authorised by the patient, treatment disclosures between providers, disclosures required by law, and disclosures to HHS?
            question: >
              The minimum necessary standard does not apply in every situation. Name at
              least four circumstances in which a covered entity is not required to apply
              the minimum necessary standard. Why is the exception for treatment disclosures
              between providers important in practice?
          - criterion: Role-based access controls correctly linked to minimum necessary compliance
            points: 20
            hint: Does the answer correctly explain that workforce access to PHI should be limited by role, that access controls are a practical implementation of the minimum necessary standard, and describe what a covered entity must do to implement this?
            question: >
              How should a covered entity structure workforce access to PHI in order to
              comply with the minimum necessary standard? A hospital gives all administrative
              staff access to complete patient records, including clinical notes, because
              "it's simpler." What is the compliance problem, and what should the hospital
              do instead? What safeguards does the Security Rule require for access to ePHI?
          - criterion: '"Curiosity browsing" consequences correctly described'
            points: 20
            hint: Does the answer correctly explain that accessing a patient's record without a work-related need — even if the patient is a celebrity, colleague, or family member — violates HIPAA and can result in termination and referral to HHS?
            question: >
              A hospital employee looks up the medical records of a local celebrity who was
              admitted as a patient, out of personal curiosity. They do not share the
              information with anyone. Has a HIPAA violation occurred? What are the potential
              consequences for the employee and for the hospital? Why does the minimum
              necessary standard prohibit this even if no external disclosure is made?
          - criterion: Minimum necessary applied to a disclosure scenario
            points: 20
            hint: Does the answer correctly assess what information is the minimum necessary for the stated purpose, identify what should be withheld, and explain the reasoning?
            question: >
              A law firm requests the complete medical records of a patient in connection
              with a personal injury lawsuit. The patient has signed an authorisation.
              A workers' compensation insurer requests all medical records for a claimant
              to process a claim — no patient authorisation has been provided.
              For each request: does the minimum necessary standard apply, what
              information should be disclosed, and what should the covered entity do
              before releasing records?

      - slug: hipaa-breach-notification
        number: 4
        title: "Breach Notification"
        tagline: "Know what a breach is before you're dealing with one."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          The HIPAA Breach Notification Rule (45 CFR Part 164, Subpart D) requires covered entities to notify affected individuals, the Secretary of HHS, and in some cases the media when a breach of unsecured PHI occurs. A breach is defined as an impermissible use or disclosure of PHI that compromises the security or privacy of the information. When an impermissible use or disclosure occurs, HIPAA establishes a presumption that it is a breach — meaning the covered entity bears the burden of demonstrating, through a documented risk assessment, that there is a low probability that the PHI has been compromised.

          The four-factor risk assessment evaluates: the nature and extent of the PHI involved (types of identifiers, likelihood of re-identification); who accessed or could have accessed the PHI (an internal employee who saw information by mistake is different from an external attacker); whether the PHI was actually acquired or viewed (a misdirected fax to a wrong physician's office that was returned unread is different from an email to a journalist); and the extent to which the risk has been mitigated (a lost laptop that was encrypted to NIST standards is not a breach, because the data was protected). The covered entity must document this assessment regardless of its conclusion. If the assessment concludes the probability of compromise is low, no notification is required but the incident must still be recorded.

          When notification is required, individuals must be notified without unreasonable delay and in no case later than 60 calendar days after discovery of the breach. The notification must include: a brief description of the breach; the types of PHI involved; steps individuals should take to protect themselves; what the covered entity is doing to investigate and mitigate; and contact information. The HHS must be notified by the same 60-day deadline; for breaches affecting fewer than 500 residents of a state, covered entities may submit an annual log rather than individual notifications. When a breach affects 500 or more residents of a state or jurisdiction, the media must also be notified. Business associates must notify the covered entity without unreasonable delay and within 60 days of discovering a breach affecting the covered entity's PHI.
        challenge: |
          A HIPAA breach triggers legal obligations with hard deadlines. The
          difference between a managed incident and a regulatory enforcement
          action often comes down to whether the organisation knew the rules
          and acted on them quickly.

          Answer the five questions below as someone who may be involved in
          the initial response to a breach report.
        instructions: |
          Key areas this lesson covers:
          — HIPAA's definition of a breach: impermissible use or disclosure of PHI
            that compromises security or privacy (45 CFR §164.402)
          — The four-part risk assessment to determine if a breach has occurred
          — Notification to individuals: 60-day deadline from discovery
          — Notification to HHS: same 60-day deadline (or annual report for small breaches)
          — Notification to media: required when a breach affects 500+ residents of a state
          — Business associate breach notification obligations to covered entities
          — Civil monetary penalties: tiered by culpability, up to $1.9M per category per year
        rubric:
          - criterion: HIPAA breach definition and the risk assessment correctly explained
            points: 20
            hint: Does the answer correctly state that a breach is an impermissible use or disclosure presumed to compromise PHI, describe the four-factor risk assessment used to rebut that presumption, and explain who bears the burden of proof?
            question: >
              Define a HIPAA breach. When an impermissible use or disclosure of PHI occurs,
              what is the default presumption under the Breach Notification Rule? Describe
              the four-factor risk assessment that a covered entity must conduct to determine
              whether a breach has occurred. Who bears the burden of demonstrating that there
              is a low probability that PHI has been compromised?
          - criterion: Notification timelines and recipients correctly stated
            points: 20
            hint: Does the answer correctly state the 60-day deadline from discovery for individual notification, the HHS reporting requirement, the media notification trigger (500+ in a state), and the business associate's obligation to notify the covered entity without unreasonable delay and within 60 days?
            question: >
              A covered entity discovers a breach on a Monday. What are its notification
              obligations, to whom, and by when? At what point does the media also need
              to be notified? A business associate discovers a breach affecting a covered
              entity's PHI — what must the business associate do, and by when?
          - criterion: Breach vs non-breach scenarios correctly distinguished
            points: 20
            hint: Does the answer correctly classify each scenario — explaining that the encrypted laptop is not a breach due to the safe harbour, the misdirected fax requires a risk assessment, and the workforce snooping is a breach regardless of internal containment?
            question: >
              Classify each of the following as a HIPAA breach or not, and explain your reasoning:
              (a) A laptop containing ePHI is stolen, but the ePHI was encrypted to NIST standards.
              (b) A fax containing a patient's lab results is sent to the wrong physician's office by mistake.
              (c) A receptionist accesses the medical records of her neighbour out of curiosity but does not share them with anyone.
          - criterion: Civil monetary penalties and enforcement correctly described
            points: 20
            hint: Does the answer correctly describe the four penalty tiers based on culpability (did not know; reasonable cause; wilful neglect — corrected; wilful neglect — not corrected), explain who enforces HIPAA, and mention that states' attorneys general can also bring actions?
            question: >
              Describe HIPAA's civil monetary penalty structure. How does the level of culpability
              affect the penalty amount? Who is responsible for enforcing HIPAA at the federal level?
              Can state attorneys general take action under HIPAA? What is the significance of the
              "wilful neglect" tier in practice?
          - criterion: Breach response steps applied to a realistic scenario
            points: 20
            hint: Does the answer correctly identify the breach, describe the risk assessment, apply the correct notification timelines and recipients, and address documentation?
            question: >
              On a Tuesday morning a clinic administrator discovers that a file containing
              the names, dates of birth, and appointment histories of 620 patients was
              emailed to the wrong external recipient last Thursday. The recipient has
              confirmed they deleted the email without reading it. Walk through every step
              the clinic must take from this point. What notifications are required, to whom,
              and by when? What must be documented?

      - slug: hipaa-daily-work
        number: 5
        title: "HIPAA in Daily Work"
        tagline: "The rules that apply to you, right now, in your actual job."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Most HIPAA violations in practice are not caused by sophisticated cyberattacks — they are caused by workforce members who did not understand the rules, underestimated the consequences of routine shortcuts, or assumed that no harm was done because information was not deliberately shared. The day-to-day application of HIPAA in healthcare and administrative settings requires ongoing attention to how, where, and with whom information is handled — in conversations, in physical documents, on screens, and in electronic communications.

          Common workplace HIPAA violations include: discussing a patient's condition or treatment in a hallway, elevator, or other public area where the conversation can be overheard by people with no need to know; leaving patient records or documents visible on desks, on printer trays, or on unlocked computer screens; sending PHI via unencrypted personal email or text message rather than through authorised communication channels; disposing of documents containing PHI in regular recycling bins rather than shredding (or placing them in secure shredding containers); accessing the records of a friend, family member, colleague, or celebrity patient out of curiosity rather than clinical or operational need; and failing to log out of EHR systems when leaving a workstation unattended. Each of these is a HIPAA violation regardless of whether any further harm results.

          Disclosures without patient authorisation are permitted for three main purposes — treatment, payment, and healthcare operations (collectively "TPO") — and the minimum necessary standard applies to payment and operations disclosures but not to treatment disclosures between providers. Social media warrants particular care: even seemingly vague descriptions of a patient or their situation can constitute a HIPAA violation if a reasonable person could identify the individual from the context. When a workforce member witnesses a suspected violation, they are expected to report it — to their supervisor, the Privacy Officer, or through a designated reporting mechanism. Workforce members who report in good faith are protected from retaliation, and covered entities are required to document and investigate reported concerns, apply the sanctions policy to confirmed violations, and maintain records of the outcome.
        challenge: |
          Most HIPAA violations are not caused by malicious actors. They are caused
          by staff who did not understand the rules, underestimated the risk, or
          made a habit of shortcuts that seemed harmless.

          Answer the five questions below with specific, practical reasoning.
          Generalisations will not score well.
        instructions: |
          Key areas this lesson covers:
          — Common workforce violations: improper access, misdirected communications,
            disposal of PHI, social media, conversations in public areas
          — Permitted disclosures without patient authorisation: treatment, payment,
            operations (TPO), and limited other circumstances
          — The role of the workforce in HIPAA compliance: training obligations,
            sanctions policy, reporting duties
          — Physical safeguards in daily work: screen positioning, clean desk,
            locking workstations, proper disposal
          — What to do when you witness or suspect a violation
        rubric:
          - criterion: Common workplace HIPAA violations correctly identified and explained
            points: 20
            hint: Does the answer correctly identify at least four common workforce violations and explain why each constitutes a HIPAA problem — not just that "it's against the rules"?
            question: >
              Describe four common HIPAA violations that occur in everyday healthcare or
              administrative work. For each one, explain specifically why it is a violation —
              which principle or rule it breaches — and what the correct behaviour would be.
              At least one of your examples should involve technology and one should involve
              a physical or verbal disclosure.
          - criterion: Permitted disclosures for treatment, payment, and operations correctly explained
            points: 20
            hint: Does the answer correctly explain that PHI may be disclosed for TPO without patient authorisation, give an accurate example of each, and note that the minimum necessary standard still applies (except for treatment disclosures between providers)?
            question: >
              Under what circumstances may PHI be used or disclosed without a patient's
              written authorisation? Explain the "treatment, payment, and operations" (TPO)
              exception and give one concrete example of each. Does the minimum necessary
              standard apply to TPO disclosures? Are there any limits on what can be disclosed
              under this exception?
          - criterion: Social media and informal communication risks correctly addressed
            points: 20
            hint: Does the answer correctly explain that even de-identified-seeming information can constitute a HIPAA violation if a patient is reasonably identifiable from context, and apply this to the social media scenario?
            question: >
              A nurse posts on her personal social media account: "Exhausting day — just had
              to deal with a patient who came in for something totally embarrassing. You
              wouldn't believe what some people do to themselves." No name, photo, or facility
              is mentioned. Has a HIPAA violation potentially occurred? What factors determine
              whether this is a violation? What should workforce members understand about
              discussing patients informally — in person or online?
          - criterion: Physical and environmental safeguards in daily work correctly described
            points: 20
            hint: Does the answer correctly describe at least three practical physical safeguards — screen positioning or privacy screens, locking workstations, clean desk, proper disposal of paper PHI — and explain the risk each addresses?
            question: >
              Describe at least three physical or environmental safeguards that individual
              workforce members are responsible for in their daily work to protect PHI.
              For each safeguard, explain the specific risk it addresses. A staff member
              routinely prints patient lists and leaves them on their desk overnight, and
              disposes of old printouts in the general recycling bin. Identify the violations
              and describe the correct procedures.
          - criterion: Correct response to a witnessed or suspected violation described
            points: 20
            hint: Does the answer correctly describe the obligation to report, explain that workforce members are protected from retaliation for good-faith reporting, and describe what the covered entity must do in response including documenting the incident and applying its sanctions policy?
            question: >
              You witness a colleague access a patient's record and then forward information
              from it to their personal email address. You are not certain of their reason.
              What should you do? What protections exist for workforce members who report
              suspected violations in good faith? What obligations does the covered entity
              have once a potential violation is reported — including documentation and
              workforce consequences?

  # ============================================================
  # COURSE 9 — Diversity, Equity & Inclusion
  # ============================================================
  - slug: dei-fundamentals
    title: "Diversity, Equity & Inclusion"
    tagline: "Not a checkbox. A practice."
    description: >
      Five lessons covering DEI fundamentals — from definitions and unconscious
      bias to microaggressions, inclusive communication, and allyship. Written
      answers, real scenarios, graded on depth and practical reasoning.
    icon: "🌍"
    tier: 1
    difficulty: beginner
    lesson_type: knowledge
    lessons:

      - slug: dei-definitions
        number: 1
        title: "Definitions"
        tagline: "Diversity, equity, and inclusion are not synonyms."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Diversity, equity, and inclusion are three distinct concepts that are often grouped together and treated as synonyms. They are not — each describes a different dimension of the same goal, and confusing them leads to interventions that address the wrong problem. Diversity is about presence: the degree to which an organisation reflects difference across demographic, cognitive, and experiential dimensions — race, ethnicity, gender, age, disability, sexual orientation, socioeconomic background, neurodivergence, professional background, and more. An organisation can be demographically diverse while still being deeply inequitable and exclusive. Representation is necessary but not sufficient.

          Equity is about fairness: ensuring that policies, processes, and resource allocation account for the different starting points and systemic disadvantages that people bring to the workplace. It is distinct from equality, which gives everyone the same thing regardless of need. Equity asks: given that people start from different places, what do they each need to reach the same outcomes? This might mean targeted mentorship for groups historically excluded from leadership, accessible hiring processes that do not screen out disabled candidates unnecessarily, or parental leave policies that support carers equitably regardless of gender. Equity addresses structural barriers; equality ignores them.

          Inclusion is about experience: whether people can fully participate, contribute, and be heard in their workplace — not just whether they are present. An organisation with high diversity but low inclusion is one where people from minority groups are hired but not promoted, present in meetings but not listened to, represented in headcount but not in decision-making. Belonging goes further: it is the felt sense that you are valued as you are, that you do not need to mask your identity or code-switch to be accepted, and that the organisation would notice if you left. DEI work is only successful when all three dimensions are working together: diversity without equity and inclusion is tokenism; equity without inclusion means systemic changes exist on paper but people still feel excluded; inclusion without diversity means a homogeneous group has a pleasant internal culture that does not reflect the world.
        challenge: |
          The terms diversity, equity, and inclusion are often grouped together
          and treated as interchangeable. They are not. Each describes a different
          dimension of the same goal, and confusing them leads to policies that
          address the wrong problem.

          Answer the five questions below with precision. This is foundational
          knowledge — everything else in this course builds on it.
        instructions: |
          Key areas this lesson covers:
          — Diversity: the presence of difference — demographic, cognitive, experiential
          — Equity: fair treatment that accounts for systemic disadvantage; distinct from equality
          — Inclusion: creating conditions where people can fully participate and contribute
          — Belonging: the felt sense that one is valued, not just present
          — Why all three are necessary: diversity without inclusion is tokenism;
            inclusion without equity leaves structural barriers in place
        rubric:
          - criterion: Diversity correctly defined and distinguished from representation
            points: 20
            hint: Does the answer correctly explain that diversity refers to the presence of difference across multiple dimensions — not just demographic headcount — and distinguish diversity from mere representation?
            question: >
              Define diversity in an organisational context. What dimensions of diversity
              exist beyond the most visible ones? Why is having a diverse workforce not
              the same as having an inclusive one? Give an example of an organisation that
              could be demographically diverse but still fail on inclusion.
          - criterion: Equity correctly distinguished from equality
            points: 20
            hint: Does the answer correctly explain that equality gives everyone the same thing while equity gives people what they need to reach the same outcome, and apply this distinction to a realistic workplace scenario?
            question: >
              Explain the difference between equality and equity. Why does DEI work focus
              on equity rather than equality? Give a concrete workplace example that
              illustrates why treating everyone identically can produce unequal outcomes.
              What systemic factors make equity necessary?
          - criterion: Inclusion correctly defined and distinguished from diversity
            points: 20
            hint: Does the answer correctly explain that inclusion is about whether people can fully participate and contribute — not just whether they are present — and describe what inclusion looks like in practice versus what its absence looks like?
            question: >
              Define inclusion and explain how it differs from diversity. An organisation
              has significantly increased the demographic diversity of its workforce over
              three years, but employee surveys show that minority groups still feel
              excluded from decisions and informal networks. What does this tell us about
              the relationship between diversity and inclusion? What would genuine inclusion
              look like in this organisation?
          - criterion: Belonging correctly described and its relationship to DEI explained
            points: 20
            hint: Does the answer correctly describe belonging as the felt experience of being valued and accepted — as distinct from the structural conditions inclusion creates — and explain why belonging is the intended outcome of DEI work?
            question: >
              What is "belonging" in the context of DEI, and how does it differ from
              inclusion? Why do organisations measure belonging separately from diversity
              and inclusion metrics? Describe two things a manager could do that would
              support a team member's sense of belonging, and two things that might
              undermine it even in an otherwise inclusive environment.
          - criterion: The relationship between all three dimensions reasoned through
            points: 20
            hint: Does the answer correctly explain that diversity, equity, and inclusion are each necessary but not sufficient on their own — and use a coherent scenario to show what happens when one is missing?
            question: >
              Explain why diversity, equity, and inclusion must all be present for DEI
              work to succeed. What happens when an organisation focuses on diversity
              but neglects equity? What happens when it focuses on inclusion but neglects
              diversity? Use a specific scenario to illustrate what a workplace looks like
              when all three are working together effectively.

      - slug: dei-unconscious-bias
        number: 2
        title: "Unconscious Bias"
        tagline: "Everyone has it. The question is what you do about it."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Unconscious bias — also called implicit bias — refers to the attitudes, stereotypes, and associations that affect our judgements and decisions automatically, without conscious awareness or deliberate intention. These biases form through exposure to cultural messages, social structures, and lived experience from early childhood, and they operate through cognitive shortcuts (heuristics) that allow us to process information quickly. The cognitive mechanism is not pathological — it is how all human brains work. The problem is that when these shortcuts operate on decisions involving people, they systematically favour some groups over others in ways that contradict our stated values and are invisible to us in the moment. Research using the Implicit Association Test (IAT) consistently demonstrates that well-intentioned people — including those who explicitly endorse egalitarian values — hold implicit biases that affect their behaviour.

          Common bias types include: affinity bias (favouring people who are similar to ourselves in background, interests, or communication style — the "culture fit" instinct that often perpetuates homogeneity); confirmation bias (seeking information that confirms existing beliefs about a person or group and discounting contradictory evidence); the halo and horn effects (one positive trait causing us to rate a person positively across all dimensions, or one negative trait causing the reverse); attribution bias (attributing a man's success to his competence and a woman's to luck or circumstance, while attributing failure in the opposite direction); and stereotyping (applying group-level generalisations to individuals). In hiring, these biases manifest at every stage: in how job descriptions are written, in whose CVs are shortlisted, in how interviews are conducted and assessed, and in how salary offers are made.

          The reason bias awareness training alone does not reliably change outcomes is that awareness of a bias does not disable it — the automatic processes that produce biased judgements operate below the level of conscious control. What does reduce bias in decisions is structure: standardised interview questions asked of all candidates; criteria established and written down before reviewing applications; blind review of CVs where names, addresses, and university names are removed; diverse interview panels; calibration discussions that surface and examine discrepant assessments; and audit of outcomes across demographic groups. Structural interventions change the decision-making environment so that bias has less opportunity to operate, rather than relying on individuals to consciously override automatic processes in real time.
        challenge: |
          Unconscious bias affects every decision that involves human judgement —
          hiring, performance reviews, promotions, who gets heard in a meeting.
          Recognising it is necessary but not sufficient. The goal is to interrupt it.

          Answer the five questions below with the specificity of someone who will
          actually apply this at work.
        instructions: |
          Key areas this lesson covers:
          — What unconscious (implicit) bias is and how it forms
          — Common types: affinity bias, confirmation bias, halo/horn effect,
            attribution bias, the similar-to-me effect, and stereotyping
          — Where bias enters workplace decisions: hiring, performance, sponsorship
          — Interrupt strategies: structured processes, criteria-first evaluation,
            blind review, diverse panels, slowing down
          — The limits of bias training alone — why awareness is not enough
        rubric:
          - criterion: Unconscious bias correctly defined and distinguished from explicit bias
            points: 20
            hint: Does the answer correctly explain that unconscious bias operates below conscious awareness, is not the same as deliberate prejudice, and is shaped by social conditioning and cognitive shortcuts — and that well-intentioned people are not exempt?
            question: >
              Define unconscious bias. How does it differ from explicit or deliberate bias?
              Why are high-performing, well-intentioned people not exempt from unconscious
              bias? What cognitive mechanism underlies most forms of unconscious bias, and
              why did that mechanism develop?
          - criterion: At least four bias types correctly named and explained
            points: 20
            hint: Does the answer name at least four specific bias types — such as affinity bias, confirmation bias, halo/horn effect, attribution bias, the similar-to-me effect, or in-group/out-group bias — and accurately describe how each operates?
            question: >
              Name and explain at least four types of unconscious bias that commonly
              affect workplace decisions. For each type, describe a realistic scenario
              in which it could influence a hiring, performance, or promotion decision
              without the decision-maker being aware of it.
          - criterion: Impact of bias on workplace decisions correctly described
            points: 20
            hint: Does the answer correctly explain how bias affects specific decision points — job description language, resume screening, interview evaluation, performance rating calibration, sponsorship — and describe the cumulative effect over time?
            question: >
              At which specific points in the employee lifecycle is unconscious bias
              most likely to affect outcomes? Describe how bias can enter a hiring
              process from job posting through to offer. Why is the cumulative effect
              of small biased decisions more damaging than any single decision?
          - criterion: Interrupt strategies correctly described and applied
            points: 20
            hint: Does the answer correctly describe at least three structural interrupt strategies — criteria-first evaluation, structured interviews, blind review, diverse panels, slowing deliberate decision-making — and explain why structural approaches are more effective than individual awareness alone?
            question: >
              What is meant by "interrupting" unconscious bias, and why is personal
              awareness alone insufficient to do so? Describe at least three structural
              or process-level interventions that reduce the influence of bias on
              decisions. Why are structured processes more effective than relying on
              individuals to "try harder" to be fair?
          - criterion: Limits of bias training honestly assessed
            points: 20
            hint: Does the answer correctly note that bias awareness training alone has limited evidence of changing behaviour or outcomes, and describe what must accompany training for it to have impact — including accountability, structural change, and ongoing practice?
            question: >
              Research on unconscious bias training shows mixed results. What does the
              evidence say about what bias training alone can and cannot achieve?
              What must organisations do alongside awareness training for bias
              reduction to affect actual outcomes? Why is a single training session
              insufficient, and what does sustained change require?

      - slug: dei-microaggressions
        number: 3
        title: "Microaggressions"
        tagline: "Intent doesn't determine impact."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Microaggressions are brief, everyday exchanges — verbal, behavioural, or environmental — that communicate negative, demeaning, or invalidating messages to members of marginalised groups, often without conscious intent. The concept was introduced by psychiatrist Chester Pierce in the 1970s and further developed by psychologist Derald Wing Sue. Three forms are typically distinguished: microinsults, which communicate rudeness or insensitivity based on group membership (commenting on a Black colleague's "articulate" speech in a way that implies surprise); microinvalidations, which exclude or negate the experiences of marginalised groups (telling a person of colour that you "don't see colour," or asking a British-born Asian colleague where they are "really" from); and microassaults, which are more conscious and deliberate acts of discrimination that an individual might still claim were "just a joke."

          The intent of the person delivering a microaggression is legally and practically separate from its impact on the recipient. Good intentions do not prevent harm. When someone points out that a comment was a microaggression, the most common unhelpful responses are: denial ("I didn't mean it like that"), centering the deliverer's feelings ("I feel terrible that you took it that way"), or dismissal ("you're being oversensitive"). All of these shift the focus away from the impact and onto the deliverer's discomfort with being told they caused harm. The effective response is to listen to the impact described, acknowledge it, thank the person for the feedback, and consider how to behave differently — without requiring the recipient to perform emotional labour to manage the deliverer's reaction.

          The cumulative effect of microaggressions is well-documented and is the reason researchers use the phrase "death by a thousand cuts" to describe the experience. A single interaction that makes you question whether you belong, whether your presence is welcome, or whether your identity is seen as lesser might be manageable in isolation. Repeated daily across months and years — often with no single incident egregious enough to formally complain about — the effect on cognitive load, psychological wellbeing, job engagement, and career trajectory is significant. This cumulative effect is why the response "it was just a comment" misses the point: the comment is not being assessed in isolation, but as one instance of a pattern that the recipient has experienced repeatedly.
        challenge: |
          Microaggressions cause real harm — not despite being small, but partly
          because of it. The cumulative effect of everyday slights is well-documented.
          Understanding them requires separating intent from impact and learning how
          to respond whether you are a target, a bystander, or the person who caused one.

          Answer the five questions below honestly and specifically.
        instructions: |
          Key areas this lesson covers:
          — Definition: brief, everyday exchanges that communicate negative or demeaning
            messages to members of marginalised groups, often unintentionally
          — Three forms: microinsults, microinvalidations, microassaults
          — The intent vs impact distinction: good intentions do not neutralise harm
          — Cumulative effect: why frequency and pattern matter more than any single instance
          — How to respond as a target: naming it, deciding whether to engage
          — How to respond as a bystander or ally
          — How to respond when you have caused one: receiving feedback without defensiveness
        rubric:
          - criterion: Microaggression correctly defined with the three forms distinguished
            points: 20
            hint: Does the answer correctly define microaggression and distinguish microinsults (communications that convey rudeness), microinvalidations (communications that exclude or negate experiences), and microassaults (conscious, deliberate discriminatory actions) with an example of each?
            question: >
              Define microaggression and explain the three forms: microinsult,
              microinvalidation, and microassault. Give one example of each form
              in a workplace context. What distinguishes microaggressions from
              overt discrimination, and why does that distinction matter for
              how they are experienced and addressed?
          - criterion: Intent vs impact distinction correctly explained and applied
            points: 20
            hint: Does the answer correctly explain that the impact of a microaggression is real regardless of the speaker's intent, that focusing on intent can silence the target, and apply this to a realistic scenario where the speaker meant no harm?
            question: >
              A colleague tells a South Asian team member "Your English is so impressive"
              — genuinely meaning it as a compliment. The team member finds it offensive.
              Explain the intent vs impact distinction as it applies here. Why does the
              speaker's good intention not determine whether harm occurred? How should
              the interaction be understood, and what should the colleague do when the
              impact is pointed out?
          - criterion: Cumulative effect of microaggressions correctly described
            points: 20
            hint: Does the answer correctly explain that the harm of microaggressions lies largely in their cumulative and repetitive nature — the "death by a thousand cuts" — and describe the documented psychological, cognitive, and professional effects of chronic exposure?
            question: >
              Why do researchers describe the harm of microaggressions as cumulative?
              A single comment might seem trivial — why does repeated exposure to
              microaggressions cause disproportionate harm? Describe at least two
              documented effects of chronic exposure to microaggressions on the
              target's wellbeing, cognitive load, or professional engagement.
          - criterion: Response options for targets and bystanders correctly described
            points: 20
            hint: Does the answer correctly describe that targets have multiple valid response options (including choosing not to engage), describe at least two bystander response approaches, and avoid prescribing a single "correct" response for targets?
            question: >
              What response options does someone have when they are the target of a
              microaggression at work? Why is it important to recognise that targets
              have a range of valid choices rather than one correct response?
              As a bystander who witnesses a microaggression directed at a colleague,
              what are two specific ways you could respond in the moment or afterwards?
          - criterion: Receiving feedback about causing a microaggression correctly addressed
            points: 20
            hint: Does the answer correctly describe that the appropriate response to being told you caused a microaggression is to listen, acknowledge the impact, avoid defensiveness, and not centre your own feelings — and explain what not to do?
            question: >
              A colleague tells you that something you said last week was a microaggression
              and explains why it affected them. You did not intend any offence.
              Describe specifically how you should respond. What are the most common
              unhelpful responses people give in this situation, and why do they
              compound the harm? What does receiving this feedback well look like
              in practice?

      - slug: dei-inclusive-communication
        number: 4
        title: "Inclusive Communication"
        tagline: "Language shapes who feels welcome and who doesn't."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Inclusive communication is the practice of making deliberate choices — in language, listening, and the conditions you create — that enable more people to participate fully and feel genuinely heard. It is not primarily about avoiding specific words, though language choices do matter; it is about the underlying orientation of treating every person as someone whose perspective is worth engaging with seriously, and whose presence in the conversation is valued rather than tolerated. Inclusive language avoids terms that carry a history of exclusion or that embed assumptions about who is "normal." Gendered defaults (using "he" when the gender of the subject is unknown; "guys" as a universal term for a mixed group), ability-based metaphors used as negatives ("turning a blind eye," "falling on deaf ears"), and terms that reflect historical dehumanisation are examples of language choices that can signal exclusion to those they affect.

          Person-first language (a person with a disability) and identity-first language (a disabled person) reflect different relationships between identity and selfhood. Person-first language was developed to counter dehumanising language that reduced people to their diagnoses. Identity-first language has been increasingly preferred by some disability communities — particularly Autistic and Deaf communities — who regard their characteristic as an integral part of their identity rather than something separate from the "person." Neither is universally correct: individual preference should be followed whenever possible. When in doubt, ask respectfully. The same applies to pronouns: if you do not know a colleague's pronouns, use their name rather than assuming, and offer your own pronouns when introducing yourself in contexts where it is relevant.

          Psychological safety — the shared belief that one can speak up, ask questions, make mistakes, or disagree without fear of punishment or humiliation — is the foundation of genuinely inclusive team environments. It was identified by Amy Edmondson's research and subsequently confirmed by Google's Project Aristotle as the strongest predictor of team effectiveness. Psychological safety is primarily created and destroyed by leaders: how a manager responds to the first person who raises a concern, admits a mistake, or disagrees with the room sets the norm for everyone else. Listening actively — fully attending to what someone is saying, suspending judgement, asking clarifying questions rather than jumping to rebuttal, and acknowledging contributions before responding — is both a demonstration of respect and a practical tool for eliciting better information and decisions from a group.
        challenge: |
          Inclusive communication is not about policing language or performing
          sensitivity. It is about making deliberate choices — in the words you
          use, the way you listen, and the conditions you create — that allow
          more people to contribute fully.

          Answer the five questions below with practical specificity.
        instructions: |
          Key areas this lesson covers:
          — Inclusive language: why word choice signals belonging or exclusion
          — Person-first vs identity-first language and when each is appropriate
          — Gendered language, idioms, and culturally-specific expressions
          — Active listening: what it looks like and what gets in the way
          — Psychological safety: what it is, how it is built, what destroys it
          — Meeting behaviours: equitable participation, credit attribution,
            interruption patterns
        rubric:
          - criterion: Inclusive language principles correctly explained
            points: 20
            hint: Does the answer correctly explain that inclusive language avoids assumptions about identity, avoids terms with exclusionary history or connotation, and signals that diverse people belong — and give at least two specific examples of language choices and their rationale?
            question: >
              What is inclusive language and why does word choice matter for belonging?
              Give two specific examples of language that may seem neutral but carries
              exclusionary assumptions or connotations, and explain what a more inclusive
              alternative would be and why. How should you respond when you are uncertain
              which term or pronoun a person prefers?
          - criterion: Person-first vs identity-first language distinction correctly drawn
            points: 20
            hint: Does the answer correctly explain that person-first language ("person with a disability") centres the individual, while identity-first language ("disabled person") is preferred by some communities who view their identity as integral — and that individual preference should be followed rather than applying one rule universally?
            question: >
              Explain the difference between person-first and identity-first language.
              Give an example of each. Which is correct? How should you determine which
              to use when communicating about or with a specific individual? What does
              the variation in community preferences tell us about the limits of universal
              language rules?
          - criterion: Active listening correctly described and distinguished from passive hearing
            points: 20
            hint: Does the answer correctly describe active listening as an intentional practice — involving full attention, suspension of judgement, acknowledgement before response, and asking rather than assuming — and describe at least two barriers to it in workplace contexts?
            question: >
              Describe what active listening looks like in practice. How does it differ
              from simply waiting for your turn to speak? What are two common barriers
              to active listening in a workplace setting — particularly in meetings or
              high-pressure conversations? Why is active listening especially important
              in cross-cultural or cross-identity communication?
          - criterion: Psychological safety correctly defined and its conditions described
            points: 20
            hint: Does the answer correctly define psychological safety as the shared belief that one can speak up, ask questions, and make mistakes without punishment — attribute it to Amy Edmondson's research if known — and describe at least three things a manager or team can do to build it and two things that undermine it?
            question: >
              Define psychological safety. Who is most responsible for creating it
              in a team, and how? Describe at least three behaviours or practices
              that build psychological safety, and two that undermine it. Why is
              psychological safety particularly important for team members from
              underrepresented groups?
          - criterion: Meeting dynamics and equitable participation correctly addressed
            points: 20
            hint: Does the answer correctly identify that meetings tend to reproduce existing power dynamics — with some voices dominating, others interrupted, and credit misattributed — and describe at least three specific practices to promote equitable participation?
            question: >
              Meetings are one of the highest-stakes environments for inclusive
              communication. What patterns of inequitable participation commonly
              emerge in meetings — including who speaks, who gets interrupted, and
              whose ideas get attributed to them? Describe at least three specific
              practices a meeting facilitator or participant can use to make
              participation more equitable.

      - slug: dei-allyship
        number: 5
        title: "Allyship in Practice"
        tagline: "Allyship is a verb. It requires action, not just intention."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Allyship is the practice of using whatever privilege, position, or resources you hold to support people from groups that have less access to power or opportunity than your own. It is active, not passive — it requires deliberate choices about when to speak, when to yield, and how to use your position in ways that benefit others rather than primarily yourself. The distinction between active and performative allyship matters: performative allyship signals solidarity when it is socially low-cost (sharing a post, wearing a symbol, making a statement at an all-hands meeting) but is absent when it involves real risk — speaking up in a meeting when a colleague is dismissed, declining to attend an event that has an exclusionary guest list, or providing a reference for someone whose ideas your team has been ignoring. Performative allyship can cause harm by giving the impression of support that does not exist when it counts.

          Understanding privilege is a prerequisite for effective allyship, not because it requires guilt or self-flagellation, but because you cannot leverage an advantage you have not recognised. Privilege in this context means having characteristics that are treated as the default or norm in a given context — being white in a predominantly white institution, being male in a male-dominated industry, being non-disabled in environments designed for non-disabled people — in ways that remove friction from your experience that others face. The practical relevance of this for allyship is that your relative safety and credibility in a given environment may allow you to take risks or make statements that would carry much greater cost for a colleague from a marginalised group — and therefore that you have the option and arguably the responsibility to act in circumstances where they cannot.

          Amplifying voices means actively directing attention and credit to the contributions of colleagues from underrepresented groups: restating an idea with attribution when it was ignored the first time it was raised; citing colleagues in presentations and documents; creating opportunities for them to present their own work rather than having it absorbed into someone else's narrative. Sponsorship — actively advocating for someone's advancement in conversations where they are not present, using your own reputational capital — has substantially greater career impact than mentorship and is more available to people with positional power than is often recognised. Sustainable allyship requires not centering your own experience, accepting correction without defensiveness when your allyship falls short, and pacing the emotional and social labour involved to avoid burnout.
        challenge: |
          Allyship is frequently claimed and rarely practiced. Being an ally means
          using whatever privilege or position you hold to support people who have
          less — consistently, and in ways that serve them rather than your own
          sense of virtue.

          Answer the five questions below with the honesty the topic demands.
        instructions: |
          Key areas this lesson covers:
          — What allyship is and what it is not: performative vs active allyship
          — The role of privilege in allyship: you cannot ally from a position
            of ignorance about your own advantages
          — Speaking up: when and how to intervene in bias or exclusion
          — Amplifying voices: credit attribution, sponsorship, creating space
          — Sustainable advocacy: avoiding burnout, not making it about yourself,
            listening to those you are trying to support
          — Being accountable: receiving correction without defensiveness
        rubric:
          - criterion: Allyship correctly defined and distinguished from performative allyship
            points: 20
            hint: Does the answer correctly define allyship as consistent action in support of marginalised groups — using one's own position or privilege to create change — and contrast this with performative allyship, which signals values without risk or cost?
            question: >
              Define allyship in the DEI context. What distinguishes active allyship
              from performative allyship? Give two examples of behaviour that might
              appear to be allyship but is primarily self-serving or performative.
              Why does performative allyship sometimes cause harm to the people it
              claims to support?
          - criterion: The role of privilege in allyship correctly explained
            points: 20
            hint: Does the answer correctly explain that allyship requires understanding one's own privilege — not to induce guilt but to understand what advantages can be leveraged — and that allies act from a position of relative safety that allows them to take risks that targets of discrimination cannot always afford?
            question: >
              Why does effective allyship require an understanding of your own privilege?
              What does "privilege" mean in this context — and what does it not mean?
              How does an ally's relative position of safety or advantage enable them
              to take actions that the person they are supporting may not be able to
              take without greater personal cost?
          - criterion: Speaking up in the moment correctly described
            points: 20
            hint: Does the answer correctly describe at least two specific intervention techniques for different situations — such as naming what happened, asking a clarifying question, checking in with the target afterwards, or returning to the moment later — and acknowledge that the appropriate response depends on context and what the target wants?
            question: >
              In a team meeting, a colleague's idea is dismissed without discussion.
              Five minutes later, the same idea is raised by a more senior colleague
              and receives immediate enthusiasm. You notice this. Describe at least
              two specific things you could do — in the moment or immediately afterwards.
              What factors should influence how you respond? Why is checking in with
              the affected person rather than acting unilaterally often important?
          - criterion: Amplifying voices and sponsorship correctly described
            points: 20
            hint: Does the answer correctly explain amplification as actively directing attention and credit to underrepresented voices — citing, repeating with attribution, creating speaking opportunities — and distinguish sponsorship from mentorship?
            question: >
              What does it mean to "amplify" someone's voice, and how is this different
              from simply being supportive? Give two specific examples of amplification
              in a workplace setting. How does sponsorship differ from mentorship, and
              why does sponsorship have a greater impact on career outcomes for people
              from underrepresented groups?
          - criterion: Sustainable allyship and accountability correctly addressed
            points: 20
            hint: Does the answer correctly describe that sustainable allyship requires not centring your own feelings, listening to feedback from those you support, accepting correction without defensiveness, and pacing yourself — and address what to do when your allyship falls short?
            question: >
              A colleague from an underrepresented group tells you that an action you
              took while trying to support them was unhelpful and made things worse for
              them. How should you respond? What are the signs that allyship is becoming
              performative or self-centred rather than genuinely supportive? How do allies
              sustain meaningful advocacy over time without burning out or making their
              own experience the focus?

  # ============================================================
  # COURSE 10 — AI-Assisted Professional Writing
  # ============================================================
  - slug: ai-professional-writing
    title: "AI-Assisted Professional Writing"
    tagline: "The document isn't the hard part. The prompt is."
    description: >
      Five prompt-type lessons covering real professional documents — SOAP notes,
      user stories, performance reviews, incident reports, and executive summaries.
      You write the prompt. The AI writes the document. Ollama grades both.
    icon: "✍️"
    tier: 2
    difficulty: intermediate
    lesson_type: prompt
    lessons:

      - slug: aiw-soap-notes
        number: 1
        title: "Clinical SOAP Notes"
        tagline: "Structure is the whole point."
        difficulty: intermediate
        lesson_type: prompt
        challenge: |
          A physician has just seen a patient and dictated the following unstructured
          conversation notes:

          "Patient is a 47-year-old male, came in today complaining of chest tightness
          that started three days ago. Says it comes and goes, worse when climbing stairs.
          Denies shortness of breath at rest. Has a history of hypertension, currently
          on lisinopril 10mg. No known allergies. On exam, BP was 148/92, HR 78 regular,
          lungs clear, no peripheral oedema. I'm thinking we should rule out angina —
          ordering an ECG and stress test. Also increasing lisinopril to 20mg and told
          him to avoid strenuous activity until we have results."

          Write a prompt that instructs the AI to convert these notes into a properly
          structured SOAP note (Subjective, Objective, Assessment, Plan).
          The output should be ready to drop into a clinical record.
        instructions: |
          A SOAP note is the standard format for clinical documentation:
          — Subjective: what the patient reports (symptoms, history, complaints)
          — Objective: measurable findings (vitals, exam results, observations)
          — Assessment: the clinician's interpretation (diagnosis, differential)
          — Plan: what happens next (investigations, medications, follow-up)

          Your prompt must tell the AI:
          — The exact format expected (all four SOAP sections, labelled)
          — The clinical audience (this is a medical record, not a patient letter)
          — The tone and level of clinical precision required
          — What to do with information that belongs in more than one section

          A bad prompt produces a wall of text with no structure. A good prompt
          produces a document that could go straight into an EHR.
        rubric:
          - criterion: Prompt explicitly specifies all four SOAP sections
            points: 20
            hint: Did your prompt name Subjective, Objective, Assessment, and Plan as required output sections?
            question: >
              Paste the part of your prompt that specifies the required output format.
              Did you name all four SOAP sections explicitly, or did you leave it to the AI to infer the structure?
          - criterion: Subjective section is accurate and complete in the output
            points: 20
            hint: Does the output's Subjective section capture the patient's reported symptoms, history, and relevant context from the transcript?
            question: >
              Quote the Subjective section from the AI's output. Does it include the chief complaint,
              symptom duration, aggravating factors, and relevant history (hypertension, lisinopril)?
              What, if anything, is missing or misplaced?
          - criterion: Objective section contains only measurable findings
            points: 20
            hint: Does the output correctly separate objective data (BP 148/92, HR 78, exam findings) from the patient's subjective reports?
            question: >
              Quote the Objective section from the AI's output. Does it correctly contain only
              the measurable data — vitals, physical exam — without including patient-reported symptoms?
              Did your prompt help the AI make this distinction?
          - criterion: Assessment and Plan are clinically accurate and complete
            points: 20
            hint: Does the Assessment reflect the physician's clinical reasoning (ruling out angina)? Does the Plan include all three actions — ECG, stress test, lisinopril increase, activity restriction?
            question: >
              Quote the Assessment and Plan sections. Does the Assessment reflect the differential
              (possible angina)? Does the Plan capture all four actions the physician described?
              Is anything missing or inaccurate?
          - criterion: Output is formatted for clinical use, not general reading
            points: 20
            hint: Is the output clean, section-labelled, and written in clinical shorthand where appropriate — not conversational prose?
            question: >
              Would this SOAP note be appropriate to paste directly into an electronic health record?
              What elements of the formatting or language make it clinical-grade — or fall short?
              What in your prompt drove this outcome?
        max_tokens: 600

      - slug: aiw-user-stories
        number: 2
        title: "User Stories"
        tagline: "The format exists for a reason. Use it."
        difficulty: intermediate
        lesson_type: prompt
        challenge: |
          A product manager has described a new feature in a planning document:

          "We want users to be able to save searches in the job board so they don't
          have to re-enter filters every time they visit. They should be able to name
          the search, set it to run automatically every day, and get an email digest
          if any new jobs match. They should also be able to delete saved searches
          they no longer want, and we need to make sure users can't save more than
          10 searches or the database gets messy."

          Write a prompt that instructs the AI to convert this feature description
          into well-formed user stories with acceptance criteria. The output should
          be ready for a sprint backlog.
        instructions: |
          A user story follows the format:
          "As a [type of user], I want [some goal] so that [some reason]."

          Acceptance criteria use Given/When/Then or a bullet checklist format,
          and describe exactly when the story is done — including edge cases.

          Your prompt should tell the AI:
          — The required user story format ("As a... I want... So that...")
          — That acceptance criteria are required for each story
          — How granular to break the feature (one story per distinct behaviour)
          — That edge cases must be covered (the 10-search limit, email digest logic)
          — The audience (developers and QA, not stakeholders)

          The feature description above contains at least five distinct user stories.
          A good prompt produces all of them.
        rubric:
          - criterion: Prompt specifies the required user story format
            points: 20
            hint: Did your prompt explicitly require the "As a... I want... So that..." structure?
            question: >
              Paste the part of your prompt that defines the required user story format.
              Did you specify the three-part structure, or did you leave format to the AI?
          - criterion: Output covers all five distinct behaviours in the feature description
            points: 20
            hint: "The five behaviours are: saving a search, naming it, scheduling a daily digest, receiving email alerts, deleting a search, and enforcing the 10-search limit."
            question: >
              List the user stories in the output. Are all five distinct behaviours covered
              as separate stories? Which, if any, are missing or incorrectly merged?
          - criterion: Acceptance criteria are testable and specific
            points: 20
            hint: Could a QA engineer write a test case from each acceptance criterion without asking any clarifying questions?
            question: >
              Quote the acceptance criteria for the "save a search" story. Are they specific
              enough to write a test against — or are they vague? Give one example of a
              well-formed criterion and one that needs improvement.
          - criterion: Edge cases are covered in the acceptance criteria
            points: 20
            hint: Does the output include criteria covering the 10-search limit, what happens when a user tries to exceed it, and the email digest behaviour when no new jobs match?
            question: >
              Quote the acceptance criterion that handles the 10-search limit.
              Does the output also cover what happens when no new jobs match the daily digest?
              Did your prompt ask for edge cases explicitly?
          - criterion: Stories are written for developers and QA, not stakeholders
            points: 20
            hint: Are the stories concise, technical where needed, and free of marketing language?
            question: >
              Would these stories be usable as-is in a sprint backlog without rewriting?
              Quote a line that shows the tone is right for a technical audience — or one
              that reveals it was written for the wrong reader.
        max_tokens: 700

      - slug: aiw-performance-reviews
        number: 3
        title: "Performance Reviews"
        tagline: "Specific, fair, and actually useful."
        difficulty: intermediate
        lesson_type: prompt
        challenge: |
          A manager has provided the following bullet points about a direct report
          ahead of their annual review:

          "— Shipped the new reporting dashboard two weeks early
           — Had some tension with the design team in Q2, seemed to get resolved
           — Very reliable, never misses deadlines
           — Struggled with the legacy API migration, needed a lot of support
           — Customers love her — three separate clients mentioned her by name
              in satisfaction surveys
           — Sometimes doesn't speak up in meetings, tends to wait to be asked
           — Took the initiative to document the entire onboarding process,
              nobody asked her to"

          Write a prompt that instructs the AI to draft a balanced, professional
          performance review based on these bullet points.
          The review should be appropriate to share directly with the employee.
        instructions: |
          A good performance review is:
          — Specific: tied to observable events and outcomes, not personality
          — Balanced: addresses both strengths and development areas without being
            either a pure celebration or a list of complaints
          — Actionable: development areas come with a direction, not just a label
          — Fair: distinguishes between effort, outcome, and context — struggling
            with a hard technical task is not the same as underperforming

          Your prompt must tell the AI:
          — The intended audience (the employee will read this)
          — The required tone (professional, direct, not harsh)
          — How to handle the negatives — specific and constructive, not vague
          — That "balanced" means structurally balanced, not wishy-washy
          — Whether to use the first or third person
        rubric:
          - criterion: Prompt specifies audience and tone correctly
            points: 20
            hint: Did your prompt make clear this review will be shared with the employee, and specify the required professional tone?
            question: >
              Paste the part of your prompt that addresses audience and tone.
              Did you tell the AI who will read this and what register is required?
              How did this shape the output?
          - criterion: Strengths are specific and tied to evidence from the bullets
            points: 20
            hint: Does the review cite the early dashboard delivery, the customer survey mentions, and the self-initiated documentation — with enough specificity that the employee knows exactly what is being recognised?
            question: >
              Quote the section of the review that addresses the employee's strengths.
              Are they tied to specific evidence from the bullet points, or are they generic praise?
              Which bullet points are reflected and which, if any, are missing?
          - criterion: Development areas are fair, specific, and constructive
            points: 20
            hint: Does the review address the meeting participation and the legacy API struggles without being punitive? Does it distinguish between the interpersonal tension (which was resolved) and the technical challenge?
            question: >
              Quote how the review handles the legacy API migration and the meeting participation.
              Is the framing fair — does it acknowledge context? Are there suggestions for
              development, or just a label? Did your prompt shape how negatives were handled?
          - criterion: Interpersonal tension is handled with appropriate nuance
            points: 20
            hint: The bullet says tension with the design team "seemed to get resolved." A good prompt and output handles this carefully — acknowledging it occurred without overstating it as an ongoing problem.
            question: >
              How did the output handle the Q2 design team tension? Did it mention it at all?
              If so, how was it framed — as a current concern, a resolved incident, or something else?
              Was this handled correctly given the phrasing of the original bullet?
          - criterion: Review is balanced in structure, not just sentiment
            points: 20
            hint: Does the review spend roughly proportionate space on strengths and development areas? Does it avoid the pattern of three paragraphs of praise followed by one sentence of vague criticism?
            question: >
              Describe the overall structure of the review. How much space is given to strengths
              versus development areas? Does it feel genuinely balanced, or does one side dominate?
              What in your prompt did or didn't control for this?
        max_tokens: 700

      - slug: aiw-incident-reports
        number: 4
        title: "Incident Reports"
        tagline: "Root cause first. Blame last."
        difficulty: intermediate
        lesson_type: prompt
        challenge: |
          A DevOps engineer has produced the following timeline after a production outage:

          "14:32 — Deployment of v2.4.1 started (automated pipeline)
           14:38 — Deployment completed successfully, health checks passed
           14:41 — First error alerts: database connection timeouts on checkout service
           14:43 — PagerDuty escalation, on-call engineer (Priya) paged
           14:47 — Priya identifies spike in database connections, suspects connection pool exhaustion
           14:52 — Decision to roll back to v2.4.0
           14:55 — Rollback initiated
           15:01 — Rollback complete, services recovering
           15:08 — All services nominal
           Total downtime: 27 minutes
           Affected: checkout service, order confirmation emails
           Root cause (confirmed): v2.4.1 introduced a missing connection pool size
           configuration that defaulted to 5 instead of 50, exhausting the pool under
           normal load within minutes of deployment."

          Write a prompt that instructs the AI to produce a formal incident report
          suitable for internal distribution to engineering leadership and the
          operations team.
        instructions: |
          A good incident report has clear sections:
          — Incident summary: what happened, when, impact
          — Timeline: chronological, precise, attributed where relevant
          — Root cause analysis: the actual technical reason, not just symptoms
          — Contributing factors: what made detection or response harder or easier
          — Resolution: what fixed it and when
          — Action items: concrete next steps with owners and deadlines

          Your prompt must tell the AI:
          — The required section structure
          — The audience (engineering leadership and ops — technically literate)
          — That root cause analysis must go beyond symptoms to the actual cause
          — The tone: factual, blameless, forward-looking
          — That action items must be specific and actionable, not vague
        rubric:
          - criterion: Prompt specifies the required section structure
            points: 20
            hint: Did your prompt name the required sections — summary, timeline, root cause, contributing factors, resolution, action items — rather than leaving structure to the AI?
            question: >
              Paste the part of your prompt that defines the report structure.
              Which sections did you specify? Are there any standard sections missing?
          - criterion: Timeline in the output is accurate, chronological, and attributed
            points: 20
            hint: Does the output timeline match the provided data — correct timestamps, correct sequence, and attribution where relevant (e.g. Priya's involvement)?
            question: >
              Quote the timeline section from the output. Are all timestamps correct?
              Is the sequence accurate? Is Priya's role attributed correctly?
              Is anything missing or wrong?
          - criterion: Root cause analysis identifies the actual cause, not just the symptom
            points: 20
            hint: The symptom was connection pool exhaustion. The root cause was the missing configuration that defaulted to 5 instead of 50. A good report distinguishes these.
            question: >
              Quote the root cause section. Does it identify the missing connection pool
              configuration as the cause — not just the exhaustion as the symptom?
              How clearly does the output explain why this wasn't caught before deployment?
          - criterion: Action items are specific and actionable
            points: 20
            hint: Generic action items ("improve monitoring", "review deployment process") are not acceptable. Good action items have a specific outcome, an owner, and a timeframe.
            question: >
              Quote two action items from the output. Are they specific enough that an
              engineer could act on them without a follow-up meeting? Do they have implied
              or stated owners and timeframes? Did your prompt ask for this level of specificity?
          - criterion: Tone is blameless and forward-looking
            points: 20
            hint: A blameless post-mortem attributes events to systems and processes, not individuals. Priya responded quickly and well — the report should reflect this without singling her out either positively or negatively in a way that feels evaluative.
            question: >
              How does the output handle the human elements of the incident — Priya's response,
              the deployment decision? Is the tone blameless, or does it implicitly assign fault?
              What in your prompt drove this tone?
        max_tokens: 700

      - slug: aiw-executive-summaries
        number: 5
        title: "Executive Summaries"
        tagline: "One page. The whole picture."
        difficulty: intermediate
        lesson_type: prompt
        challenge: |
          The following is an excerpt from a 12-page internal research report on
          AI adoption in the company's customer service team:

          "Over the past six months, the customer service team has piloted an AI
          assistant (Claude) to help agents respond to tier-1 support queries.
          The pilot covered 847 tickets across four product lines.

          Key findings: Average handling time decreased from 8.3 minutes to 5.1
          minutes per ticket (39% reduction). Customer satisfaction scores (CSAT)
          remained stable at 4.2/5.0 throughout the pilot (pre-pilot baseline: 4.1).
          Agent-reported confidence increased — 73% of agents reported feeling 'more
          confident' handling complex queries after 8 weeks.

          Risks identified: Over-reliance on AI suggestions was observed in 12% of
          sampled tickets, where agents accepted AI output without verification,
          leading to 3 confirmed errors in technical specifications. Data retention
          of customer conversation content by the AI provider is governed by the
          current MSA and has not been reviewed since 2021.

          Costs: Tooling cost is $2,400/month. Estimated time saved across the team
          is approximately 340 hours/month at a blended rate of $45/hour, representing
          a monthly value of approximately $15,300.

          Recommendation: Expand the pilot to the full customer service team (180 agents)
          with mandatory AI output verification training before go-live."

          Write a prompt that instructs the AI to produce a one-page executive summary
          of this report suitable for the VP of Operations.
        instructions: |
          An executive summary is not a shorter version of the full document.
          It is the answer to the question: "What do I need to know to make a decision?"

          It should:
          — Lead with the conclusion or recommendation, not the background
          — Include the numbers that matter, with context
          — Flag the risks without burying them
          — Be usable by someone who will never read the full report

          Your prompt must tell the AI:
          — The intended reader and their decision-making context
          — The required length constraint ("one page" or an approximate word count)
          — That it must lead with the recommendation, not the methodology
          — That both the financial case and the risks must be present
          — The tone: professional, direct, no hedging
        rubric:
          - criterion: Prompt defines the reader and decision context
            points: 20
            hint: Did your prompt tell the AI who will read this (VP of Operations), what decision they face (whether to expand the pilot), and what they need to make that decision?
            question: >
              Paste the part of your prompt that defines the reader and their context.
              Did you specify the VP of Operations as the audience and frame the summary
              around a decision? How did this shape the output's focus?
          - criterion: Output leads with the recommendation, not the background
            points: 20
            hint: The first paragraph should state the recommendation to expand — not start with "over the past six months, the team has been piloting..."
            question: >
              Quote the opening paragraph of the output. Does it lead with the recommendation
              to expand the pilot, or does it begin with background and methodology?
              Did your prompt instruct the AI to lead with the conclusion?
          - criterion: Key numbers are present and correctly reported
            points: 20
            hint: The summary must include the 39% handling time reduction, the stable CSAT score, the $2,400/month cost, and the $15,300/month value estimate — with enough context to be meaningful.
            question: >
              Which key numbers appear in the summary? Quote at least two.
              Are they reported with sufficient context — or just as raw figures?
              Is the ROI case ($15,300 value vs $2,400 cost) clearly presented?
          - criterion: Risks are present and not buried
            points: 20
            hint: The over-reliance issue (12% of tickets, 3 confirmed errors) and the unreviewed MSA data retention clause must appear in the summary — not as footnotes or afterthoughts.
            question: >
              Where do the risks appear in the output, and how much space do they receive?
              Are the over-reliance finding and the data retention issue both present?
              Are they framed as risks that require action, or dismissed with a line?
          - criterion: Output respects the one-page constraint in length and density
            points: 20
            hint: A one-page executive summary should be approximately 250–350 words — dense but readable, with no padding or redundant phrasing.
            question: >
              Approximately how long is the output? Is it within the one-page range?
              Does it feel appropriately dense — or padded? Did your prompt specify
              a word count or length constraint, and did the AI honour it?
        max_tokens: 600

  # ============================================================
  # COURSE 11 — Proofpoint Platform Administration
  # ============================================================
  - slug: proofpoint-administration
    title: "Proofpoint Platform Administration"
    tagline: "Deploy it. Tune it. Defend it."
    description: >
      Five lessons covering what it takes to run Proofpoint in production:
      platform architecture and detection engines, DLP policy development,
      operational workflows and incident response, use case development
      and reporting, and communicating platform value to management.
    icon: "🛡️"
    tier: 2
    lessons:

      - slug: proofpoint-platform-overview
        number: 1
        title: "Proofpoint Platform Overview"
        tagline: "Architecture, key capabilities, and the detection engines that matter."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Proofpoint is an enterprise security and compliance platform built around email security, data loss prevention (DLP), and threat intelligence. Its architecture is cloud-native but supports hybrid deployments — a Proofpoint Protection Server (PPS) can sit on-premises as a mail transfer agent (MTA), while cloud components handle policy enforcement, archiving, and analytics. Most enterprise deployments route inbound and outbound email through Proofpoint for inspection before delivery, giving the platform visibility into message content, attachments, and sender reputation. The platform integrates with Microsoft 365, Google Workspace, and on-premises Exchange environments.

          Three content detection engines are central to the Proofpoint DLP and information protection story. Optical Character Recognition (OCR) extracts text from images and scanned documents so that policies can match sensitive patterns (credit card numbers, SSNs) in image attachments that would otherwise bypass text-based inspection. Exact Data Matching (EDM) fingerprints structured datasets — typically exported from HR systems, CRMs, or databases — and detects when actual records from those datasets appear in messages or files, enabling high-precision detection of real customer or employee data with near-zero false positives. Index Document Matching (IDM) fingerprints unstructured documents (contracts, IP, design specs) so the platform can detect near-verbatim copies or extracts, even when the document has been reformatted or partially altered.

          Beyond content detection, Proofpoint's threat intelligence capabilities include: Targeted Attack Protection (TAP) for URL rewriting and sandboxed attachment detonation; Email Fraud Defense (EFD) for DMARC visibility and supplier impersonation detection; and the Nexus Threat Graph, which correlates threat signals across the customer base to identify Very Attacked People (VAPs) — a prioritisation concept that helps security teams focus remediation effort on the individuals most frequently targeted by sophisticated attacks. A platform specialist is expected to understand how these components interact and how to configure and tune them in an enterprise environment.
        challenge: |
          Proofpoint interviews test whether you understand the platform at an
          architectural level — not just what the features are called, but how
          they work and why you would choose one over another.

          Answer the five questions below. Explain mechanisms and trade-offs,
          not just definitions.
        instructions: |
          Key areas this lesson covers:
          — Platform architecture: cloud vs hybrid deployment, MTA role of PPS
          — Detection engines: OCR, EDM, IDM — how each works and when to use each
          — TAP: URL rewriting, sandboxing, VAP identification
          — EFD: DMARC, BIMI, supplier risk
          — Nexus Threat Graph and threat intelligence integration
        rubric:
          - criterion: EDM vs IDM distinction explained with accuracy
            points: 20
            hint: Does the answer correctly distinguish structured (EDM) from unstructured (IDM) data detection, and explain when you'd use each?
            question: >
              Explain the difference between Exact Data Matching (EDM) and Index Document Matching (IDM).
              What type of data is each designed to protect, and in what scenario would you choose
              EDM over IDM — or deploy both?
          - criterion: OCR use case and limitations understood
            points: 20
            hint: Does the answer explain why OCR matters for DLP (images bypassing text inspection) and acknowledge its limitations (accuracy, performance)?
            question: >
              Why is OCR detection relevant in an enterprise DLP deployment? Describe a realistic
              scenario where OCR would catch a data leak that a standard text-based policy would miss.
              What are the operational trade-offs of enabling OCR inspection at scale?
          - criterion: TAP architecture explained correctly
            points: 20
            hint: Does the answer cover URL rewriting at delivery time, sandboxed detonation of attachments, and the VAP concept?
            question: >
              Describe how Targeted Attack Protection (TAP) works. What happens to a URL in an
              email when TAP is enabled? What is a Very Attacked Person (VAP), and how does
              identifying VAPs change how a security team operates?
          - criterion: Deployment model options and trade-offs articulated
            points: 20
            hint: Does the answer show understanding of when on-premises PPS vs cloud-only matters, and what hybrid implies for mail routing?
            question: >
              A prospective customer asks whether to deploy Proofpoint as a cloud-only gateway
              or in a hybrid model with on-premises PPS. What questions would you ask to determine
              the right architecture, and what are the key trade-offs between the two approaches?
          - criterion: Platform components connected into a coherent capability description
            points: 20
            hint: Does the answer demonstrate understanding of how the components work together, not just list them in isolation?
            question: >
              A CISO asks you to summarise what Proofpoint does in three minutes. You need to
              cover email security, DLP, and threat intelligence without overwhelming them.
              Write out the key points you would make and the order you would make them.

      - slug: proofpoint-dlp
        number: 2
        title: "Data Loss Prevention"
        tagline: "Policy development, classification, and choosing the right detection engine."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          DLP policy development in Proofpoint starts with data classification — understanding what data you are protecting, where it lives, and how it moves. The typical enterprise data classification model defines tiers: public, internal, confidential, and restricted (or equivalent labels). Before a single policy is written, a platform specialist needs to know which data categories are in scope for regulatory or contractual reasons (PCI-DSS for card data, HIPAA for PHI, GDPR for EU personal data, ITAR for export-controlled technical data), and what business processes legitimately move that data so that enforcement does not disrupt operations.

          Proofpoint DLP policies are built around rules that combine content conditions (pattern matches, EDM hits, IDM fingerprint matches, OCR detections), contextual conditions (sender, recipient, attachment type, message direction), and actions (quarantine, encrypt, block, notify, log-only). A common architecture separates policies by data type: a PCI policy with EDM fingerprints against a card number database and a regex fallback for card patterns; a PHI policy combining HIPAA-specific dictionaries with EDM against patient record exports; and a confidential documents policy using IDM fingerprints against contracts and design files. Each policy should have a defined escalation path: who reviews quarantined messages, at what SLA, and what constitutes an incident requiring formal response.

          Policy tuning is the ongoing operational work. New DLP deployments almost always start in monitor-only mode to establish a baseline of violations without disrupting users, then move through progressive enforcement stages (notify user, notify manager, quarantine for review, block and notify sender) as confidence in policy accuracy grows. The key metrics for tuning are false positive rate (legitimate business emails caught by policy) and false negative rate (actual data leaks missed). High false positive rates destroy analyst trust in the system and lead to rubber-stamping; high false negative rates mean the policy is not protecting what it should. EDM and IDM dramatically reduce false positives compared to regex-only approaches because they match actual data, not just patterns that resemble data.
        challenge: |
          DLP is only as effective as its policies. Proofpoint interviewers want
          to know whether you can design and tune policies in production — not
          just describe what DLP does in theory.

          Answer the five questions below with operational specificity.
        instructions: |
          Key areas this lesson covers:
          — Data classification frameworks and their DLP implications
          — Policy architecture: conditions, actions, escalation paths
          — EDM vs IDM vs regex: choosing the right detection method
          — Monitor-only → enforcement progression
          — False positive and false negative management
        rubric:
          - criterion: Data classification linked to policy design
            points: 20
            hint: Does the answer connect classification tiers to concrete policy decisions, not treat classification as an abstract exercise?
            question: >
              Before writing a single Proofpoint policy, what information do you need to gather
              about the organisation's data landscape? Describe the relationship between data
              classification and policy design — how does knowing your data tiers change
              what policies you build and how you build them?
          - criterion: Policy component structure explained correctly
            points: 20
            hint: Does the answer describe conditions (content + context), actions, and escalation paths as distinct elements of a well-formed policy?
            question: >
              Describe the components of a well-structured Proofpoint DLP policy. What is
              the difference between a content condition and a contextual condition? What
              actions are available, and how do you decide which action to apply at which
              enforcement stage?
          - criterion: Detection method selection justified with reasoning
            points: 20
            hint: Does the answer correctly identify scenarios where EDM, IDM, and regex are each the right choice, and explain why?
            question: >
              You need to write DLP policies to protect three different data types: credit card
              numbers from a live cardholder database, proprietary engineering specifications
              in PDF format, and generic keywords like "confidential" in document headers.
              Which Proofpoint detection method would you use for each, and why?
          - criterion: Monitor-to-enforce progression described with rationale
            points: 20
            hint: Does the answer explain why you start in monitor mode, what you look for during the monitoring period, and what triggers progression to enforcement?
            question: >
              A new DLP policy has just been deployed. Explain the monitor-only → enforcement
              progression you would recommend. What data would you collect during the monitoring
              period? What threshold or signal would tell you the policy is ready to move
              to quarantine or block mode?
          - criterion: False positive management approach articulated
            points: 20
            hint: Does the answer explain the operational impact of false positives, how to measure them, and what to do when the rate is too high?
            question: >
              A policy has been in production for two weeks. Analysts are complaining that 40%
              of quarantined messages are false positives — legitimate business emails caught
              by the policy. What is the operational impact of this, and how would you
              systematically reduce the false positive rate without creating gaps in coverage?

      - slug: proofpoint-operations
        number: 3
        title: "Operationalizing the Platform"
        tagline: "SOPs, triage workflows, and incident remediation in a production environment."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Running Proofpoint in production means translating policy decisions into repeatable operational processes. A platform specialist is expected to own or contribute to the standard operating procedures that govern how the security team interacts with the platform day to day. The core operational workflows are: quarantine review (what gets reviewed, by whom, at what SLA, and how decisions are documented); incident triage (when a policy violation is escalated from a queue item to a formal security incident); and platform health monitoring (verifying that policies are running, detection engines are current, and mail flow is not disrupted).

          Quarantine management is often where DLP implementations quietly fail. If the quarantine queue is not systematically reviewed, it becomes a backlog that analysts ignore, and the DLP programme loses its enforcement effect. Effective quarantine SOPs define: who is responsible for review (typically the DLP analyst or a security operations team, not IT helpdesk); the review SLA (commonly 4 hours for potential data exfiltration, 24 hours for lower-priority violations); the decision criteria for release vs. block vs. escalation; and the documentation requirements (what is recorded in the ticketing system for audit purposes). SOPs should also address false positive handling — when an analyst identifies a systematic false positive, there must be a feedback path to the policy owner to initiate tuning.

          Incident response in a DLP context differs from traditional IR in important ways. The triggering event is typically a policy match, not an alert from an endpoint or network sensor. The investigation phase focuses on determining intent (was this an accidental disclosure or deliberate exfiltration?), scope (how many records, files, or messages were involved?), and regulatory impact (does this trigger GDPR 72-hour notification, HIPAA breach assessment, or PCI breach procedures?). Proofpoint's Smart Search and message audit capabilities are the primary forensic tools: they allow analysts to retrieve message content, headers, and metadata for specific senders, recipients, time ranges, and policy matches — evidence that must be preserved and documented for any subsequent regulatory or legal process.
        challenge: |
          Proofpoint without operational discipline is a policy engine with no
          enforcement effect. Interviewers for specialist roles want to know that
          you can run the platform in production, not just configure it.

          Answer the five questions below with process-level specificity.
        instructions: |
          Key areas this lesson covers:
          — Quarantine review SOPs: SLAs, decision criteria, documentation
          — Incident triage: from queue item to formal incident
          — Smart Search and message audit for investigation
          — Regulatory notification triggers: GDPR, HIPAA, PCI
          — Platform health monitoring and operational metrics
        rubric:
          - criterion: Quarantine SOP structure described with operational detail
            points: 20
            hint: Does the answer define who reviews, at what SLA, using what decision criteria, and how decisions are documented?
            question: >
              Design a quarantine review SOP for a Proofpoint DLP deployment. Specify:
              who is responsible for review, the SLA for different violation severity levels,
              the decision criteria for release vs. block vs. escalation, and what is
              documented in the ticketing system for each decision.
          - criterion: Triage path from policy match to incident correctly described
            points: 20
            hint: Does the answer distinguish routine quarantine review from escalation to a formal incident, with clear criteria for the escalation decision?
            question: >
              A Proofpoint policy match lands in the quarantine queue. Walk through the
              triage process: what information do you look at first, what distinguishes
              a routine review decision from an event that should be escalated to a
              formal security incident, and who gets notified when escalation occurs?
          - criterion: Smart Search capability applied to investigation scenario
            points: 20
            hint: Does the answer demonstrate practical knowledge of what Smart Search can retrieve and how it would be used to scope an investigation?
            question: >
              During an HR investigation, you are asked to retrieve all emails sent by a
              specific employee over the past 90 days that contained attachments larger
              than 1 MB. Describe how you would use Proofpoint's Smart Search or message
              audit capability to scope and execute this request. What would you preserve
              for potential legal review?
          - criterion: Regulatory notification triggers identified correctly
            points: 20
            hint: Does the answer correctly identify the different notification obligations under GDPR, HIPAA, and PCI-DSS and what Proofpoint evidence supports them?
            question: >
              A Proofpoint policy match reveals that an employee emailed a spreadsheet
              containing 3,000 EU customer records (names, emails, account numbers) to
              a personal Gmail address. What regulatory obligations might this trigger,
              and what evidence from Proofpoint would you preserve and document as part
              of the breach assessment?
          - criterion: Platform health monitoring approach described
            points: 20
            hint: Does the answer identify meaningful operational health signals (mail flow, policy match rates, detection engine currency, quarantine backlog) and how to monitor them?
            question: >
              Beyond policy violations, what operational metrics and health signals would
              you monitor on a Proofpoint deployment to know that the platform is functioning
              correctly? What would tell you that something is wrong before users start
              reporting problems?

      - slug: proofpoint-reporting
        number: 4
        title: "Reporting & Use Case Development"
        tagline: "Building reports, developing use cases, and measuring what matters."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Reporting in Proofpoint serves two distinct audiences with different needs. Operational reports are consumed by the security team: quarantine volumes, violation counts by policy and severity, false positive rates, analyst decision distributions, and time-to-resolution metrics. These reports answer the question "is the programme working?" and drive tuning decisions. Executive reports are consumed by CISOs, compliance officers, and legal — they need a risk story, not a dashboard of raw counts. The key translation is from "we had 1,247 DLP policy matches last month" to "we identified and blocked three potential data exfiltration events, reviewed 94% of quarantined messages within SLA, and reduced false positives by 23% following policy tuning in Q2."

          Use case development is the process of translating a business risk or regulatory requirement into a functioning Proofpoint policy, detection workflow, and measurement framework. A mature use case has four components: a risk statement that explains what the use case is designed to prevent or detect; technical specifications that define the policy conditions, detection methods, and actions; operational procedures that specify who does what when the use case fires; and success metrics that allow the use case to be evaluated and tuned over time. For example, a PCI exfiltration use case might have a risk statement of "prevent deliberate or accidental transmission of cardholder data outside the corporate perimeter," technical specs involving EDM fingerprints against the cardholder database with block-and-notify enforcement, operational procedures defining the review and escalation path, and metrics tracking match volumes, confirmed incidents, and false positive rates by quarter.

          The use case lifecycle does not end at deployment. Use cases should be reviewed periodically — at minimum annually, ideally quarterly — against their original risk statement and success metrics. Data volumes change, business processes change, adversary techniques evolve, and regulatory requirements update. A use case that was well-tuned at deployment may become over-inclusive as the business scales (causing false positive creep) or under-inclusive as new data types are introduced (creating coverage gaps). Platform specialists who understand the full use case lifecycle — from risk identification through metric-driven refinement — are significantly more valuable than those who only know how to write policies.
        challenge: |
          Proofpoint interviewers for specialist roles expect you to translate
          platform capabilities into business value — and to build use cases that
          survive contact with a production environment.

          Answer the five questions below with strategic and operational depth.
        instructions: |
          Key areas this lesson covers:
          — Operational vs executive reporting: audiences, metrics, translation
          — Use case structure: risk statement, technical spec, procedures, metrics
          — Use case lifecycle: deployment, review, tuning, retirement
          — Metrics that demonstrate programme value (not just volume counts)
          — Communicating DLP programme health to non-technical stakeholders
        rubric:
          - criterion: Executive vs operational reporting distinction made clearly
            points: 20
            hint: Does the answer correctly distinguish the audience, purpose, and content of operational vs executive reports, and translate raw counts into risk language?
            question: >
              A CISO asks for a monthly DLP programme report. An analyst hands you a
              spreadsheet with raw violation counts by policy. Describe how you would
              transform this data into an executive-level report. What metrics matter
              to a CISO, and how do you translate operational data into a risk narrative?
          - criterion: Use case structure described with all four components
            points: 20
            hint: Does the answer include a risk statement, technical specification, operational procedures, and success metrics — not just policy configuration?
            question: >
              Walk through the structure of a well-formed Proofpoint DLP use case from
              end to end. Use HIPAA PHI protection as your example. What are the four
              components of a mature use case, and what does each contain?
          - criterion: Use case lifecycle and review process understood
            points: 20
            hint: Does the answer address why use cases need periodic review and what signals indicate a use case needs tuning or retirement?
            question: >
              A DLP use case was deployed 18 months ago and is no longer flagging
              violations at the volume it did initially. Could this mean the programme
              is working? Could it mean there is a problem? How would you investigate,
              and what would a periodic use case review process look like?
          - criterion: Metrics selection justified against business value
            points: 20
            hint: Does the answer go beyond volume counts to metrics that demonstrate risk reduction, programme effectiveness, and operational efficiency?
            question: >
              What are the most meaningful metrics for demonstrating the value of a
              Proofpoint DLP programme to business stakeholders? Explain why raw
              violation counts alone are insufficient, and what additional data points
              make the programme value clear.
          - criterion: Stakeholder communication approach described
            points: 20
            hint: Does the answer show awareness that different stakeholders need different framings — and how to communicate programme value without overwhelming non-technical audiences?
            question: >
              You are presenting the DLP programme's quarterly results to a group that
              includes the CISO, the General Counsel, the Head of HR, and the IT Director.
              Each has different concerns and a different level of technical understanding.
              How do you structure the presentation to be relevant and credible to all four?

      - slug: proofpoint-stakeholder-communication
        number: 5
        title: "Stakeholder Communication & Reporting"
        tagline: "Translate platform data into decisions management can act on."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          A platform specialist who can only talk to other security engineers is only half as effective as one who can also communicate with legal, HR, compliance, and senior leadership. The Proofpoint platform generates substantial data — policy match volumes, quarantine decisions, incident timelines, detection engine coverage — but data alone does not drive organisational action. The specialist's role includes translating that data into clear, audience-appropriate communication: operational reports for the security team, risk-focused summaries for the CISO, regulatory evidence packages for legal, and budget justifications for finance. Each audience has a different frame of reference, different concerns, and a different threshold for technical detail.

          The core communication technique for technical-to-non-technical translation is analogy plus consequence: state what the technology does in plain language using a familiar comparison, then immediately connect it to the business risk or regulatory obligation the stakeholder cares about. This is more effective than simplified technical explanations because it does not require the stakeholder to build a mental model of the technology — it only requires them to recognise a risk they already own. When a policy exception is requested, when a data breach must be reported, or when the platform budget is under review, the ability to make the case clearly and without jargon is as operationally important as the technical work itself.

          Presenting platform metrics to management requires selectivity. The most common mistake is reporting volume — "we processed 2.4 million messages and had 847 policy matches last month" — which tells leadership nothing actionable. Meaningful management reporting focuses on: risk reduction (how many confirmed data loss events were prevented or detected); programme health (is the false positive rate trending in the right direction?); coverage gaps (are there data types or channels the platform does not currently protect?); and operational efficiency (what is the analyst workload, and is it sustainable?). The goal of each report is to give management one clear answer to the question they are actually asking: "Is the programme working, and are we spending the right amount on it?"
        challenge: |
          Technical mastery of Proofpoint is necessary but not sufficient.
          The platform only delivers value when the people who fund it,
          govern it, and respond to its findings understand what it is telling them.

          Answer the five questions below with the clarity and specificity
          that a non-technical but senior audience would require.
        instructions: |
          Key areas this lesson covers:
          — Audience-appropriate reporting: security team vs CISO vs legal vs finance
          — Analogy plus consequence: translating technical mechanisms for non-technical stakeholders
          — Metrics that matter to management vs metrics that matter to analysts
          — Policy exception governance: framing risk discussions with business stakeholders
          — Breach communication: accurate, calm, and actionable
        rubric:
          - criterion: Audience differentiation applied to reporting structure
            points: 20
            hint: Does the answer correctly identify that different audiences need different content and framing — not just a simplified version of the same report?
            question: >
              You need to communicate last month's DLP programme results to three audiences:
              the security analyst team, the CISO, and the CFO. What is different about
              each communication — the content, the metrics you lead with, and the level
              of technical detail? Describe what each version contains and why.
          - criterion: Technical concept explained to non-technical audience effectively
            points: 20
            hint: Does the answer use analogy, avoid jargon, and connect the technical mechanism directly to a risk the stakeholder owns?
            question: >
              The General Counsel has asked you to explain how Proofpoint's EDM detection
              works and why it is more reliable than keyword matching for protecting
              customer data. She has no technical background. Write out how you would
              explain this in under two minutes — use an analogy and connect it to
              the legal and regulatory risk she is responsible for managing.
          - criterion: Management metrics selected and justified against business value
            points: 20
            hint: Does the answer go beyond volume counts and identify metrics that answer the question management is actually asking — "is the programme working and worth the investment?"
            question: >
              Your CISO has asked for a one-page monthly dashboard showing whether the
              Proofpoint programme is effective. What five metrics would you include,
              and why each one? Explain what each metric tells the CISO that raw
              violation counts do not.
          - criterion: Policy exception request handled with risk framing and process
            points: 20
            hint: Does the answer describe a structured exception process and frame the discussion in terms of risk acceptance rather than security refusing a business request?
            question: >
              The Head of Business Development tells you that a DLP policy is blocking
              their team from sending deal room documents to investment bankers, and asks
              for a permanent policy exception for their entire division. How do you
              respond? Describe the process you would follow, what documentation you
              would require, and how you frame the conversation around risk acceptance
              rather than a security veto.
          - criterion: Breach communication approach is accurate, proportionate, and actionable
            points: 20
            hint: Does the answer balance accuracy (not understating severity) with proportionality (not causing disproportionate alarm), and give leadership a clear next step?
            question: >
              A Proofpoint policy match has confirmed that an employee emailed a spreadsheet
              containing 2,000 customer records to a personal Gmail address before resigning.
              You need to brief the CISO and General Counsel within the hour. What do you
              tell them? Structure your briefing: what happened, what you know and don't
              know yet, what the regulatory exposure might be, and what the immediate
              next steps are.

  # ============================================================
  # COURSE 12 — Enterprise Email Infrastructure & DNS
  # ============================================================
  - slug: enterprise-email-dns
    title: "Enterprise Email Infrastructure & DNS"
    tagline: "One backbone. Every domain. No exceptions."
    description: >
      Five lessons covering enterprise email infrastructure at depth: DNS records
      and how email routing actually works, building and maintaining the full
      authentication stack (SPF, DKIM, DMARC), designing mail routing architecture
      for complex organisations, consolidating domains through M&A, and enforcing
      DLP and compliance across every subsidiary centrally.
    icon: "📡"
    tier: 2
    lessons:

      - slug: email-dns-fundamentals
        number: 1
        title: "DNS Fundamentals for Email"
        tagline: "How DNS actually routes mail — before you touch a single policy."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Every email delivery decision starts with DNS. When a sending mail server needs to deliver a message to user@example.com, it does not know the destination IP address — it queries DNS for the MX (Mail Exchanger) records for the domain example.com. MX records return one or more hostnames with associated priority values (lower number = higher priority). The sending server attempts delivery to the highest-priority MX host; if that fails, it tries the next in the list. The MX record points to a hostname, not an IP address, which means the sending server must then resolve that hostname to an A or AAAA record to get a usable address. This two-step resolution (domain → MX hostname → IP) is fundamental to how SMTP routing works and is the mechanism that lets organisations point inbound mail at a gateway like Proofpoint or Mimecast rather than their internal mail server.

          TTL (Time to Live) controls how long DNS resolvers cache a record before querying authoritative nameservers again. For email records, TTL decisions have operational consequences. A high TTL (86400 seconds / 24 hours) reduces DNS query load and speeds up resolution for senders who have cached your MX records, but means that any change — a gateway migration, a failover event, a new MX record — will take up to that TTL value to propagate globally. A low TTL (300–900 seconds) allows faster propagation of changes but increases DNS query volume. The operational practice for planned migrations is to lower TTL to 300 seconds 24–48 hours before the change, make the change, then raise TTL back to the normal value after confirming stability. This ensures the old high-TTL cached records expire quickly while giving administrators control over rollback windows.

          Beyond MX, email-specific DNS records include: SPF (TXT record defining which servers are authorised to send mail for the domain), DKIM (TXT record publishing the public key used to verify message signatures), DMARC (TXT record specifying policy for SPF/DKIM failures and a reporting address), and MTA-STS (a policy file accessed via HTTPS that specifies TLS requirements for inbound connections). PTR records (reverse DNS, mapping IP to hostname) are configured by the owner of the IP address range — typically the ISP or cloud provider — and are used by receiving servers to verify that a sending IP has a matching forward and reverse DNS entry. Missing or mismatched PTR records are a common cause of deliverability problems. A senior email administrator needs to understand all of these record types, where they are configured, and how they interact.
        challenge: |
          DNS errors are silent until mail stops flowing. Understanding how
          DNS drives email routing — at the record level, not just conceptually —
          is the foundation every other email infrastructure skill builds on.

          Answer the five questions below with the precision a senior
          administrator would use when diagnosing a live routing problem.
        instructions: |
          Key areas this lesson covers:
          — MX record resolution: two-step lookup, priority, fallback behaviour
          — TTL: caching implications, pre-migration TTL reduction strategy
          — SPF, DKIM, DMARC, MTA-STS: what each record does and where it lives
          — PTR records: who configures them, why they matter for deliverability
          — DNS propagation: what it means and why it is not instantaneous
        rubric:
          - criterion: MX record resolution process explained correctly
            points: 20
            hint: Does the answer describe the two-step resolution (MX hostname → A/AAAA), priority handling, and fallback behaviour accurately?
            question: >
              Walk through exactly what happens at the DNS level when a mail server
              at Gmail tries to deliver a message to user@example.com. What queries
              are made, in what order, and what determines which server receives
              the connection? What happens if the highest-priority MX host is unreachable?
          - criterion: TTL strategy for migration understood and applied
            points: 20
            hint: Does the answer explain why TTL matters for change propagation and describe the reduce-ahead-of-change practice with appropriate timing?
            question: >
              You are planning to migrate your inbound mail gateway from one vendor
              to another in two weeks. Your MX records currently have a TTL of 86400
              seconds. What TTL changes would you make and when, and why? Walk through
              the timing and the risk you are managing with each step.
          - criterion: Email DNS record types distinguished accurately
            points: 20
            hint: Does the answer correctly describe SPF, DKIM, DMARC, and PTR as distinct record types with distinct purposes — not conflated?
            question: >
              A new domain has just been provisioned for a subsidiary. List the DNS
              records you would configure to make it a fully functional sending domain
              with proper authentication. For each record, state its type, where it goes,
              and what it does. Include PTR and explain who needs to configure it and why.
          - criterion: Propagation implications understood in an incident context
            points: 20
            hint: Does the answer show understanding that propagation is a caching phenomenon, not an instantaneous event, and apply that to a realistic diagnostic scenario?
            question: >
              You updated your MX records 30 minutes ago to route inbound mail through
              a new gateway. Some senders are still delivering to the old server.
              Explain why this is happening, how long it is likely to continue,
              and what — if anything — you can do to accelerate it.
          - criterion: PTR record ownership and deliverability impact explained
            points: 20
            hint: Does the answer correctly identify that PTR records are configured by the IP owner (not the domain owner), and explain why receiving servers care about them?
            question: >
              A new outbound mail relay has been provisioned on a cloud IP address.
              Deliverability tests show the sending IP has no PTR record. Explain
              what a PTR record is, why its absence causes deliverability problems,
              who is responsible for creating it, and what the correct value should be.

      - slug: email-auth-stack
        number: 2
        title: "Email Authentication Stack"
        tagline: "SPF, DKIM, and DMARC — configured correctly, not just present."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          SPF (Sender Policy Framework) is a DNS TXT record that lists the mail servers authorised to send email on behalf of a domain. The record is published at the domain root (e.g. example.com) and contains mechanisms that evaluate to pass or fail for a given sending IP. Common mechanisms include: `ip4:` and `ip6:` for explicit IP ranges; `include:` to reference another domain's SPF record (used for third-party senders like Salesforce or SendGrid); `a:` and `mx:` to allow the domain's own A or MX records to send; and the catch-all qualifiers `~all` (softfail — treat failures permissively) and `-all` (hard fail — reject on failure). A critical constraint is the 10 DNS lookup limit: SPF evaluation must complete within 10 DNS lookups (each `include:` counts as one), and records that exceed this limit produce a `permerror` result, which many receivers treat as a failure. SPF alone does not authenticate the From: header the user sees — it only validates the envelope sender (SMTP MAIL FROM), which is invisible to end users.

          DKIM (DomainKeys Identified Mail) addresses the From: header gap by placing a cryptographic signature in the email header that ties the message to the sending domain. The sending mail server signs each outgoing message using a private key; the receiving server retrieves the corresponding public key from DNS (a TXT record at selector._domainkey.example.com) and verifies the signature. If the message body or headers are modified in transit, the signature verification fails. DKIM survives email forwarding (where SPF typically fails), which makes it the more reliable signal for DMARC alignment. Key management discipline matters: DKIM keys should be rotated periodically (annually at minimum, quarterly for high-risk domains), and old keys should remain in DNS for 48–72 hours after rotation to allow in-flight messages signed with the old key to be delivered.

          DMARC (Domain-based Message Authentication, Reporting & Conformance) is the policy layer that makes SPF and DKIM actionable. A DMARC record specifies what receiving servers should do when messages fail both SPF and DKIM alignment: `p=none` (monitor only, take no action), `p=quarantine` (deliver to spam folder), or `p=reject` (do not deliver). DMARC also specifies reporting addresses for aggregate reports (rua=) and forensic reports (ruf=). Aggregate reports (sent as XML, typically daily) show which sources are sending mail claiming to be from your domain and whether they pass authentication — invaluable for discovering shadow IT, misconfigured third-party senders, and phishing attempts. The progression from none → quarantine → reject should be data-driven: move to quarantine only when aggregate reports show that all legitimate sending sources pass authentication, and move to reject only after quarantine has been stable for a sufficient observation period.
        challenge: |
          A misconfigured authentication stack causes legitimate mail to be
          rejected and makes phishing trivially easy. Knowing that SPF, DKIM,
          and DMARC exist is not enough — you need to build and troubleshoot them.

          Answer the five questions below at the level of someone who has
          done this in production and knows where it breaks.
        instructions: |
          Key areas this lesson covers:
          — SPF syntax: mechanisms, qualifiers, the 10-lookup limit
          — DKIM: key generation, DNS publication, rotation, selector naming
          — DMARC: policy progression, alignment modes, aggregate report interpretation
          — SPF vs DKIM alignment: why DKIM survives forwarding and SPF does not
          — Common failure modes: SPF permerror, DKIM selector mismatch, DMARC none trap
        rubric:
          - criterion: SPF record construction and lookup limit explained correctly
            points: 20
            hint: Does the answer correctly describe SPF mechanisms, the 10-lookup limit constraint, and what happens when it is exceeded?
            question: >
              You are building an SPF record for a domain that sends mail through:
              your on-premises Exchange server (static IP), Salesforce (which uses
              an include: mechanism with 3 sub-lookups), SendGrid, and a marketing
              platform with its own include:. Walk through how you would construct
              this record and what risks you need to manage. What happens if you
              exceed 10 DNS lookups, and how do you avoid it?
          - criterion: DKIM key management understood with rotation process described
            points: 20
            hint: Does the answer describe selector naming, DNS publication of the public key, the reason old keys must remain in DNS after rotation, and a rotation process?
            question: >
              Describe the end-to-end process of rotating DKIM keys for a production
              domain. What is a DKIM selector, why do you need more than one, and
              what must you leave in DNS after switching to a new key? What would
              break if you removed the old key immediately after rotation?
          - criterion: DMARC policy progression applied to a realistic scenario
            points: 20
            hint: Does the answer describe the none → quarantine → reject progression as data-driven, using aggregate reports to confirm readiness before each step?
            question: >
              A domain has just had a DMARC record added at p=none with aggregate
              reporting configured. Describe what you would do over the following
              90 days to progress to p=reject. What would you look for in aggregate
              reports before moving to quarantine? What would tell you the domain
              is ready for reject enforcement?
          - criterion: SPF/DKIM forwarding behaviour explained with alignment implications
            points: 20
            hint: Does the answer correctly explain that SPF fails on forwarding because the forwarding server's IP is not in the original SPF record, while DKIM survives if the message is not modified?
            question: >
              A user reports that legitimate emails forwarded from a mailing list
              are landing in their spam folder. DMARC aggregate reports show these
              messages failing authentication. Explain what is likely happening at
              the SPF and DKIM level when a message is forwarded, and what options
              exist to resolve the deliverability problem.
          - criterion: Authentication failure diagnosed from a realistic error scenario
            points: 20
            hint: Does the answer identify plausible root causes (misconfigured include, wrong selector, DMARC none trap, missing PTR) and describe a systematic diagnostic approach?
            question: >
              Outbound mail from a newly configured sending application is failing
              DMARC at receiving servers. The application is listed in the SPF record.
              DKIM is configured. Aggregate reports show all messages from this source
              as failing. Walk through the diagnostic steps you would take to identify
              the root cause, and describe three distinct failure modes that could
              produce this symptom.

      - slug: email-routing-architecture
        number: 3
        title: "Enterprise Mail Routing Architecture"
        tagline: "Smart hosts, connectors, and routing every domain through one backbone."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Enterprise mail routing architecture is the set of decisions that determine how messages flow between internal systems, outbound through security gateways, and inbound from the internet. The central pattern in large organisations is a hub-and-spoke model: a centralised gateway (Proofpoint, Mimecast, or similar) handles all inbound and outbound traffic for every domain the organisation owns, while internal mail servers (Exchange, Google Workspace) handle mailbox hosting and internal routing. This architecture centralises policy enforcement — all DLP rules, spam filtering, and email authentication signing happen at the gateway, not on individual subsidiary systems — and simplifies operational management because there is one place to look when something goes wrong.

          A smart host (also called a relay host or outbound connector) is the mechanism that implements this centralisation for outbound mail. Instead of allowing internal mail servers to deliver directly to external recipients via MX lookup, administrators configure the internal server to route all outbound mail to the gateway via SMTP. The gateway then performs policy checks, applies DKIM signing, and delivers to the recipient. In Microsoft Exchange and Exchange Online, this is configured as a Send Connector (on-premises) or an Outbound Connector in Exchange Online, specifying the gateway FQDN as the smart host. For inbound mail, the gateway is placed in front of the internal server via MX records: the MX record points to the gateway, which filters and then routes clean messages to the internal server via a configured inbound connector or routing rule. The internal server must be configured to accept relay connections from the gateway's IP addresses and should not be publicly reachable on port 25 — this is enforced via firewall rules to prevent gateway bypass.

          Connector configuration details matter operationally. Key parameters include: TLS enforcement (whether TLS is required or optional for the SMTP connection), certificate validation (whether the connecting server's TLS certificate must match a specific domain or be issued by a trusted CA), IP restrictions (which source IPs are permitted to relay), and accepted domains (which recipient domains this connector will accept mail for). In complex organisations with multiple subsidiaries, each subsidiary domain must be listed as an accepted domain in the gateway's routing configuration. Misconfigured accepted domains are a common source of NDRs (non-delivery reports) when new domains are added without updating gateway routing. Routing rules or transport rules at the gateway level can further modify message routing based on sender, recipient, content classification, or policy match — enabling different delivery paths for different domain groups or content types.
        challenge: |
          Mail routing architecture is where design decisions become operational
          reality. Getting it wrong means mail bounces, policies are bypassed,
          or subsidiaries route outside the gateway entirely.

          Answer the five questions below with the precision of an architect
          who will also be the one on call when it breaks.
        instructions: |
          Key areas this lesson covers:
          — Hub-and-spoke gateway architecture: inbound and outbound flows
          — Smart hosts and send connectors: Exchange, Exchange Online configuration
          — MX record placement and internal relay acceptance
          — Accepted domains and connector routing for multi-domain organisations
          — Firewall rules to prevent gateway bypass on port 25
        rubric:
          - criterion: Inbound routing flow described end-to-end correctly
            points: 20
            hint: Does the answer trace the full inbound path — external sender → MX lookup → gateway → internal server — including the connector/relay configuration at each hop?
            question: >
              Describe the complete inbound mail flow for a large organisation using
              Proofpoint as a centralised gateway in front of Microsoft Exchange Online.
              Start from the moment an external sender's mail server does a DNS lookup
              and end at the mailbox. What is configured at each hop, and what would
              cause mail to bypass the gateway entirely?
          - criterion: Smart host/send connector configured correctly for outbound
            points: 20
            hint: Does the answer correctly describe configuring Exchange Online to route all outbound mail through the gateway smart host, including what would break if TLS or certificate validation is misconfigured?
            question: >
              You need to route all outbound mail from Microsoft Exchange Online through
              a Proofpoint gateway for DLP inspection and DKIM signing before external
              delivery. Walk through the configuration required in both Exchange Online
              and Proofpoint. What authentication method does the connector use, and
              what happens to outbound mail if the gateway is unreachable?
          - criterion: Accepted domain misconfiguration diagnosed correctly
            points: 20
            hint: Does the answer identify that the gateway must have the domain listed as an accepted/routed domain, and that its absence causes NDRs for inbound mail to that domain?
            question: >
              A new subsidiary domain has been added to Exchange Online as an accepted
              domain and mailboxes have been provisioned. Inbound mail to the new domain
              is bouncing with NDRs at the gateway level — mail never reaches Exchange.
              What is the most likely cause, how do you verify it, and what is the fix?
          - criterion: Port 25 firewall restriction and bypass risk understood
            points: 20
            hint: Does the answer explain that allowing direct inbound port 25 access to the internal server bypasses the gateway, and describe how to prevent this?
            question: >
              After a Proofpoint gateway deployment, a security audit finds that
              the Exchange Online inbound connector accepts connections from any IP
              on port 25. Explain the security risk this creates, what an attacker
              or misconfigured external server could do with this access, and how
              you would remediate it without breaking legitimate mail flow.
          - criterion: Multi-domain routing architecture described with operational specificity
            points: 20
            hint: Does the answer address how each domain's accepted domain configuration, MX record, and gateway routing rules interact for correct routing?
            question: >
              Your organisation owns 12 domains across 4 subsidiaries. All inbound
              mail should route through a single Proofpoint gateway before delivery
              to subsidiary Exchange Online tenants. Walk through the architecture:
              what DNS records each domain needs, how the gateway is configured to
              route each domain to the correct Exchange tenant, and what you would
              check first if one subsidiary stops receiving mail.

      - slug: email-ma-integration
        number: 4
        title: "M&A Email Integration"
        tagline: "Consolidating domains post-acquisition without dropping a single message."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Email integration during mergers and acquisitions is one of the highest-risk operational tasks an email administrator faces. The combination of time pressure (business leadership wants integration completed before the deal is fully understood), technical complexity (the acquired company's mail environment is typically unknown until due diligence), and disruption risk (a misconfigured cutover can result in lost mail or broken authentication for thousands of users) makes M&A integration a genuine test of email infrastructure expertise. The first step is always discovery: mapping the acquired organisation's email architecture — what mail systems they run, what domains they own, how authentication is configured, what third-party sending services are in use, and where their MX records currently point.

          Coexistence strategies allow the acquired organisation's mail to continue functioning independently while integration work proceeds, typically via cross-forest trust or SMTP relay between the two organisations' mail systems. This avoids the big-bang cutover risk but introduces complexity: addresses from both organisations must be resolvable for internal mail routing, calendar and free/busy lookups must work across both systems, and SMTP relay between systems must be properly authenticated to prevent open relay conditions. The technical mechanisms include: adding the acquired domain as an accepted domain in the parent organisation's Exchange environment; configuring an inbound connector to route mail for the acquired domain to the acquired organisation's mail servers; and eventually migrating mailboxes and pointing MX records at the parent's gateway.

          DNS cutover planning for an acquired domain follows the same TTL-reduction discipline as any MX change, but with added complexity: the acquiring organisation must ensure their gateway is fully configured to accept and route mail for the new domain before the MX record change takes effect. The checklist before cutover includes: gateway accepted domain configured; MX records lowered to short TTL (300–900 seconds) 24–48 hours prior; SPF record for the acquired domain updated to authorise the parent's sending infrastructure; DKIM signing configured for the domain on the parent's gateway; DMARC record updated to report to the parent's reporting address; inbound routing rule in the gateway directing mail to the correct Exchange tenant; Exchange accepted domain and routing configured; and a rollback plan (the old MX record value) available if delivery problems are detected after cutover.
        challenge: |
          M&A email integration is where everything you know about DNS,
          authentication, and routing gets tested simultaneously, under
          time pressure, on an environment you may never have seen before.

          Answer the five questions below with the operational thoroughness
          of an administrator who has to get this right the first time.
        instructions: |
          Key areas this lesson covers:
          — Discovery: mapping an acquired organisation's email environment
          — Coexistence strategies: SMTP relay, accepted domains, cross-routing
          — DNS cutover checklist: TTL, MX, SPF, DKIM, DMARC, gateway config
          — Mailbox migration sequencing and parallel mail flow during migration
          — Rollback planning and post-cutover validation
        rubric:
          - criterion: Discovery process described with completeness
            points: 20
            hint: Does the answer identify the key information needed before any integration work begins — mail systems, domains, authentication state, third-party senders, MX records?
            question: >
              Your organisation has just acquired a company with 800 employees across
              three domains. You have two weeks before integration work must begin.
              Describe the discovery process: what information you need, how you get it,
              and what you are looking for that would significantly complicate the
              integration plan.
          - criterion: Coexistence architecture explained with technical accuracy
            points: 20
            hint: Does the answer describe a specific mechanism (relay, accepted domain, connector) for maintaining parallel mail flow, and address the open relay risk?
            question: >
              During a phased integration, you need mail to flow bidirectionally
              between your Exchange Online environment and the acquired company's
              on-premises Exchange Server while mailbox migration proceeds over
              three months. Describe the technical configuration required for
              coexistence, and explain what you must do to prevent the relay
              configuration from creating an open relay.
          - criterion: Pre-cutover DNS checklist complete and correctly ordered
            points: 20
            hint: Does the answer include TTL reduction timing, gateway accepted domain, SPF update, DKIM signing setup, DMARC update, and Exchange routing — in a logical sequence?
            question: >
              You have just acquired three companies. Walk me through every DNS
              change needed to route their inbound mail through your Proofpoint
              gateway and their outbound mail through your infrastructure. Include
              the order of operations, the TTL changes and timing, and every
              record type that needs to be created or modified.
          - criterion: Rollback plan described with specific decision criteria
            points: 20
            hint: Does the answer specify what the rollback action is (revert MX to old value), how quickly it takes effect, and what signal triggers the rollback decision?
            question: >
              Thirty minutes after cutting over an acquired domain's MX records
              to your gateway, users at the acquired company report they are not
              receiving external mail. Describe your diagnostic process, the
              rollback procedure if needed, and how the TTL value you set before
              cutover affects how quickly a rollback takes effect.
          - criterion: Post-cutover validation process described systematically
            points: 20
            hint: Does the answer cover both inbound and outbound mail tests, authentication validation, and a time window for monitoring before declaring the cutover successful?
            question: >
              The MX cutover for an acquired domain completed 2 hours ago with no
              immediate errors reported. Describe the validation process you would
              run before declaring the cutover successful. What specific tests do
              you perform, what do you check in gateway logs, and how long do
              you monitor before standing down?

      - slug: email-dlp-compliance-scale
        number: 5
        title: "DLP & Compliance Enforcement at Scale"
        tagline: "One policy engine. Every subsidiary. Auditable from day one."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Enforcing DLP and compliance across a multi-domain, multi-subsidiary organisation from a centralised gateway is an architectural advantage — but only if the gateway is actually in the routing path for every domain, the policies are correctly scoped, and exceptions are governed rather than ad hoc. The centralisation benefit is that a single HIPAA policy, for example, applies to outbound mail from every subsidiary without requiring each subsidiary to run its own filtering infrastructure. The operational requirement is that the gateway routing configuration is kept current: every new domain acquired or provisioned must be added to the gateway's accepted domain list and routing rules before go-live, or it will route outside the gateway and outside policy enforcement entirely.

          Policy scoping in a multi-domain environment requires deliberate design. Some policies should apply universally — a policy blocking outbound transmission of unencrypted SSNs should apply to every domain regardless of subsidiary. Other policies are subsidiary-specific: a HIPAA PHI policy is only relevant to subsidiaries that handle patient data, and applying it universally inflates false positive rates for entities that have no HIPAA obligations. Gateway platforms allow policy conditions to be scoped by sender domain, recipient domain, organisational unit, or a combination — enabling a single gateway deployment to enforce differentiated policy sets for different parts of the organisation. The configuration and maintenance of this scoping is an ongoing responsibility: when subsidiaries are added, their domain must be assigned to the correct policy group; when a subsidiary's regulatory status changes (e.g. it begins handling patient data), the policy scope must be updated accordingly.

          Auditing and exception management at scale introduce governance requirements that go beyond technical configuration. Every policy exception — a sender exempted from a DLP rule, a domain excluded from quarantine — must be documented with a business justification, an approval authority, an expiry date, and a review schedule. Undocumented exceptions accumulate over time and become compliance liabilities: during a regulatory audit, an undocumented exception for a domain that is transmitting PHI outside policy is indistinguishable from a control failure. Gateway platforms typically provide exception logging and policy match audit trails, but those are only useful if the exception governance process ensures they are reviewed. The operational discipline of exception lifecycle management — creating, documenting, reviewing, and retiring exceptions — is as important as the technical configuration of the policies themselves.
        challenge: |
          A centralised gateway is only as strong as the discipline behind it.
          Policies that don't cover every domain, exceptions that are never
          reviewed, and routing gaps for newly acquired subsidiaries all
          create real compliance exposure.

          Answer the five questions below with the rigour of an administrator
          who will be explaining their configuration to a regulator.
        instructions: |
          Key areas this lesson covers:
          — Gateway routing coverage: ensuring every domain is in the enforcement path
          — Policy scoping: universal vs subsidiary-specific rules
          — HIPAA, PCI, and DLP enforcement across differentiated subsidiary groups
          — Exception governance: documentation, approval, expiry, and review
          — Audit trail requirements and regulatory defensibility
        rubric:
          - criterion: Routing coverage gap identified and remediated correctly
            points: 20
            hint: Does the answer identify that a domain not in the gateway's accepted domain/routing configuration routes outside enforcement, and describe the fix and verification?
            question: >
              Three months after acquiring a subsidiary, a compliance audit finds
              that outbound mail from the subsidiary's domain has been routing
              directly to the internet rather than through your Proofpoint gateway.
              All DLP and HIPAA policies have been unenforced for that domain during
              this period. Explain how this happened, what the compliance exposure is,
              and what remediation steps you take — including how you verify the
              fix and what you document.
          - criterion: Policy scoping design for multi-subsidiary organisation explained
            points: 20
            hint: Does the answer distinguish universal policies (apply to all domains) from subsidiary-specific policies (scoped by domain or org unit), with a rationale for each?
            question: >
              Your organisation has 8 subsidiaries across 12 domains. Three subsidiaries
              handle HIPAA-regulated patient data; the others do not. One subsidiary
              is subject to ITAR export controls. Design the policy scoping architecture
              at the gateway level: which policies apply universally, which are
              subsidiary-specific, and how do you configure the gateway to enforce
              different policy sets for different sender domains?
          - criterion: Exception governance process described with lifecycle completeness
            points: 20
            hint: Does the answer describe a structured process including documentation, approval authority, expiry date, and a review schedule — not just approving exceptions informally?
            question: >
              A subsidiary CFO requests a permanent exception from a DLP policy that
              blocks transmission of financial data to external parties, citing a
              legitimate need to send financial reports to auditors weekly.
              Describe the exception governance process you would follow: what you
              document, who approves it, how long the exception lasts, and how
              it is reviewed. What would you configure in the gateway to implement
              the exception with the minimum necessary scope?
          - criterion: HIPAA enforcement architecture described with technical accuracy
            points: 20
            hint: Does the answer describe the technical components of HIPAA enforcement (PHI detection, EDM/dictionary, encryption or block action, audit logging) and how they map to gateway policy configuration?
            question: >
              Describe how you would configure centralised HIPAA PHI enforcement
              for three subsidiaries that handle patient data, routed through a
              single Proofpoint gateway. What detection methods would you use,
              what actions would you configure for PHI detected in outbound mail,
              and how would you ensure the policy generates an audit trail that
              satisfies HIPAA's required documentation standards?
          - criterion: Regulatory audit response described with evidence specificity
            points: 20
            hint: Does the answer identify the specific evidence available from the gateway (policy match logs, quarantine records, exception documentation, audit trail) and how it demonstrates control effectiveness?
            question: >
              A HIPAA auditor asks you to demonstrate that your organisation's
              email DLP controls are effective and that exceptions to DLP policies
              are properly governed. What evidence do you produce from the Proofpoint
              platform, and how do you present it? What gaps in your documentation
              would create problems during this audit, and how would you identify
              them before the auditor does?

  # ============================================================
  # COURSE 13 — IT Governance Fundamentals
  # ============================================================
  - slug: it-governance-fundamentals
    title: "IT Governance Fundamentals"
    tagline: "Who decides. Who's accountable. How you prove it."
    description: >
      Five lessons covering the frameworks, processes, and disciplines that
      make IT governable at scale: choosing and applying governance frameworks,
      running a change management process, building and maintaining a risk
      register, managing third-party risk, and preparing for internal and
      external audits with defensible evidence.
    icon: "🏛️"
    tier: 2
    lessons:

      - slug: governance-frameworks
        number: 1
        title: "Governance Frameworks"
        tagline: "COBIT, ITIL, ISO 27001 — what they are, what they're not, and how to choose."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          IT governance frameworks provide structured approaches to aligning IT activities with business objectives, managing risk, and demonstrating accountability. The three frameworks most frequently encountered in enterprise environments serve different purposes and operate at different levels of abstraction. COBIT (Control Objectives for Information and Related Technologies), published by ISACA, is a governance and management framework focused on the processes and controls needed to ensure IT delivers value and manages risk. It defines 40 governance and management objectives across five domains — Evaluate, Direct and Monitor (EDM); Align, Plan and Organise (APO); Build, Acquire and Implement (BAI); Deliver, Service and Support (DSS); and Monitor, Evaluate and Assess (MEA) — and is commonly used as the basis for IT audit programmes and for demonstrating governance maturity to boards and regulators.

          ITIL (Information Technology Infrastructure Library) is a framework for IT service management (ITSM), focused on how IT services are designed, delivered, and continuously improved. ITIL 4, the current version, organises guidance around a Service Value System and four dimensions of service management (organisations and people, information and technology, partners and suppliers, value streams and processes). It defines practices — including change enablement, incident management, problem management, and service desk — that describe what good looks like for operational IT processes. ITIL is not an audit or compliance framework; it is a practice guide. Organisations adopt ITIL practices to improve service quality and reduce operational risk. ISO/IEC 27001 is an international standard for information security management systems (ISMS). Unlike COBIT and ITIL, ISO 27001 can be formally certified against by an accredited certification body. It requires organisations to define the scope of their ISMS, conduct a risk assessment, select and implement controls from ISO 27002 (the companion control catalogue), and operate a continual improvement cycle. Certification is recognised by customers, regulators, and partners as evidence of a structured approach to information security governance.

          Choosing the right framework depends on the purpose. Organisations implementing ISO 27001 are typically doing so to achieve certification — either because customers require it, because a market requires it, or to demonstrate security maturity. Organisations adopting COBIT are typically doing so to establish an IT governance programme that can be audited internally or by external auditors against defined control objectives. Organisations implementing ITIL practices are doing so to improve service delivery operations. These are not mutually exclusive: many mature organisations use ITIL for operational processes, COBIT for governance and control, and ISO 27001 for security management — with mappings between frameworks to avoid duplicating documentation and control evidence. A governance professional needs to understand what each framework is for, what it requires, and how to navigate the evidence and documentation obligations each imposes.
        challenge: |
          Governance frameworks are only useful if you understand what each one
          actually requires and when to apply it. Knowing the acronyms is not
          the same as knowing the frameworks.

          Answer the five questions below with the depth of someone who has
          had to choose, implement, or be audited against one of these frameworks.
        instructions: |
          Key areas this lesson covers:
          — COBIT: governance vs management objectives, five domains, audit use
          — ITIL 4: Service Value System, key practices, operational focus
          — ISO 27001: ISMS scope, risk assessment, Annex A controls, certification
          — Framework selection criteria: purpose, audience, certification vs guidance
          — Mapping between frameworks to reduce duplication
        rubric:
          - criterion: COBIT purpose and structure explained accurately
            points: 20
            hint: Does the answer correctly describe COBIT as a governance/management framework (not ITSM), name its domains, and explain how it is used in practice?
            question: >
              Explain what COBIT is and what problem it is designed to solve.
              How does it differ from ITIL in purpose and scope? Describe a realistic
              scenario where an organisation would choose to implement COBIT governance
              objectives — what would they be trying to achieve, and who would use
              the outputs?
          - criterion: ISO 27001 requirements understood at implementation level
            points: 20
            hint: Does the answer describe the ISMS scope, risk assessment process, Annex A control selection, and the certification audit process — not just that ISO 27001 exists?
            question: >
              A company decides to pursue ISO 27001 certification. Walk through what
              this actually involves: what they must document, what a risk assessment
              produces, how controls are selected, and what happens during a
              certification audit. What ongoing obligations does certification create?
          - criterion: Framework selection rationale demonstrates practical judgment
            points: 20
            hint: Does the answer select appropriate frameworks for the given scenario and justify the choice based on the organisation's actual need, not just list all three frameworks?
            question: >
              A 500-person financial services firm wants to: (1) demonstrate to enterprise
              customers that it has mature information security, (2) improve the reliability
              of its IT service desk and change management processes, and (3) establish
              a governance programme that its internal audit team can assess against.
              Which framework or frameworks would you recommend for each objective,
              and why? Would you recommend all three simultaneously?
          - criterion: Governance vs management distinction applied correctly
            points: 20
            hint: Does the answer correctly distinguish governance (evaluate, direct, monitor — board/executive level) from management (plan, build, run, monitor — operational level)?
            question: >
              COBIT distinguishes between governance and management of IT. Explain
              the difference with a concrete example. Who is responsible for governance
              activities in a typical organisation, and who is responsible for management
              activities? Why does this distinction matter for how a governance framework
              is implemented?
          - criterion: Framework mapping value and approach articulated
            points: 20
            hint: Does the answer explain why mapping between frameworks reduces duplication and describe how a control in one framework might satisfy requirements in another?
            question: >
              An organisation is ISO 27001 certified and is now implementing COBIT
              governance objectives. Their governance team is concerned about duplicating
              documentation effort. Explain how framework mapping works in practice:
              how might an existing ISO 27001 control satisfy a COBIT management
              objective, and what does a mapping exercise actually produce?

      - slug: governance-change-management
        number: 2
        title: "Change Management"
        tagline: "The RFC process, change advisory boards, and the discipline that prevents Friday night outages."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          IT change management is the process by which modifications to IT systems, infrastructure, applications, and services are requested, evaluated, approved, implemented, and reviewed in a controlled manner. The objective is to minimise the risk that changes introduce incidents — service disruptions, security vulnerabilities, or compliance failures — while enabling the organisation to move at the pace the business requires. ITIL 4 uses the term "change enablement" deliberately: the goal is not to prevent change but to ensure changes are made safely. The tension between control and velocity is the central challenge of change management, and the design of the change process determines whether it serves this goal or becomes a bureaucratic obstacle that people route around.

          The core artefact of change management is the Request for Change (RFC). A well-structured RFC captures: what is being changed and why (business justification), what systems and services are affected, the technical implementation plan, the rollback plan if the change fails, the testing evidence that the change has been validated in a non-production environment, the change window (when the change will be implemented), and the post-implementation review plan. Change Advisory Boards (CABs) review RFCs for significant or high-risk changes before approval. The CAB typically includes representatives from IT operations, security, application owners, and business stakeholders — ensuring that the risk of a proposed change is evaluated by people who understand its potential impact across the organisation. Standard changes — pre-approved, low-risk, frequently repeated changes with a well-established procedure — do not require CAB review, which is how organisations maintain velocity for routine work.

          Emergency changes are the highest-risk category because they must bypass the normal approval process by necessity. A critical security patch, a production outage fix, or a regulatory deadline may require implementing a change without the time for standard CAB review. The emergency change process must define: who can authorise an emergency change, what documentation is required (even if completed retrospectively), how the change is communicated to affected stakeholders, and how it is reviewed after the fact to ensure it was genuinely necessary and correctly implemented. Organisations that treat emergency changes as a convenient workaround for poor planning — using them to avoid the RFC process — will see their change-related incident rate climb. Emergency changes should be tracked and their frequency reviewed: a high emergency change rate is a governance signal that either the standard process is too slow or planning discipline is insufficient.
        challenge: |
          Change management done well prevents incidents. Change management done
          poorly creates them, or creates a process people bypass entirely.

          Answer the five questions below with the operational and governance
          depth of someone who runs or is audited on a change management process.
        instructions: |
          Key areas this lesson covers:
          — RFC structure: business justification, implementation plan, rollback, testing evidence
          — CAB composition, purpose, and meeting cadence
          — Standard vs normal vs emergency change categories
          — Emergency change authorisation and retrospective documentation
          — Change-related incident metrics as governance signals
        rubric:
          - criterion: RFC structure and content described with completeness
            points: 20
            hint: Does the answer describe all key RFC components — justification, affected systems, implementation plan, rollback plan, test evidence, change window, PIR?
            question: >
              Write out the key sections of a well-formed Request for Change for
              a significant infrastructure change — for example, upgrading the
              firmware on the organisation's core network switches during a
              maintenance window. What must each section contain, and why is
              the rollback plan as important as the implementation plan?
          - criterion: CAB purpose and composition explained correctly
            points: 20
            hint: Does the answer explain why CAB exists (risk evaluation across functions), who sits on it, and how it makes decisions — not just that it approves changes?
            question: >
              Describe the purpose and composition of a Change Advisory Board.
              Who should sit on a CAB, what is each member's role in evaluating
              an RFC, and what does the CAB actually produce — approval, rejection,
              or something else? How does a CAB handle changes that must be
              implemented before the next scheduled meeting?
          - criterion: Change categories distinguished with correct governance implications
            points: 20
            hint: Does the answer correctly define standard, normal, and emergency change types and explain the different approval path each follows?
            question: >
              Explain the difference between standard, normal, and emergency changes.
              Give a realistic example of each. For each category, describe the
              approval path, the documentation requirements, and what governance
              oversight applies. Why is the distinction between categories
              important for audit purposes?
          - criterion: Emergency change process described with appropriate controls
            points: 20
            hint: Does the answer specify who can authorise, what documentation is required (even retrospectively), how stakeholders are notified, and how the change is reviewed post-implementation?
            question: >
              A critical zero-day vulnerability requires an emergency patch to be
              applied to 200 production servers outside the normal change window.
              Walk through the emergency change process from the moment the decision
              is made to patch through to post-implementation review. What controls
              must remain in place even in an emergency, and what gets documented
              after the fact?
          - criterion: Change-related incident analysis used as governance signal
            points: 20
            hint: Does the answer explain how tracking change-related incidents reveals process failures (e.g. insufficient testing, emergency change abuse) and drives process improvement?
            question: >
              Your monthly governance report shows that 35% of P1 incidents last
              quarter were caused by changes — and that 60% of those were classified
              as emergency changes. What does this data tell you about the health of
              your change management process? What would you investigate, and what
              process changes would you consider?

      - slug: governance-risk-assessment
        number: 3
        title: "Risk Assessment"
        tagline: "Risk registers, likelihood vs impact, and the difference between accepting risk and ignoring it."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Risk assessment is the structured process of identifying, analysing, and evaluating risks so that an organisation can make informed decisions about how to treat them. In IT governance and information security contexts, risk assessment is a foundational requirement: ISO 27001 mandates it as part of the ISMS, COBIT includes risk management across its governance and management objectives, and regulators from the FCA to HIPAA require organisations to identify and treat risks to the assets they are responsible for protecting. A risk assessment produces a risk register — a documented list of identified risks, each with an owner, a likelihood rating, an impact rating, a risk score, a treatment decision, and a residual risk after controls are applied.

          Risk analysis involves two dimensions: likelihood (how probable is it that this risk event will occur?) and impact (how severe would the consequences be if it did?). These are typically rated on a scale — commonly 1–5 or Low/Medium/High/Critical — and multiplied or mapped on a heat map to produce an overall risk score. The resulting score determines prioritisation, not treatment: a high-likelihood, low-impact risk may require a different response than a low-likelihood, catastrophic-impact risk. The four standard risk treatment options are: mitigate (implement controls to reduce likelihood or impact), transfer (shift the financial consequence to a third party, typically via insurance or contract), accept (acknowledge the risk and take no further action, with documented justification and owner sign-off), and avoid (cease the activity that gives rise to the risk). Risk acceptance is a legitimate governance decision when the cost of mitigation exceeds the expected loss — but it must be documented, owned, and reviewed periodically. Undocumented risk acceptance is indistinguishable from a control failure during an audit.

          Residual risk is the risk that remains after controls have been applied. No control eliminates risk entirely; the objective of risk treatment is to reduce risk to a level the organisation considers acceptable — within its defined risk appetite and risk tolerance. Risk appetite is the board-level statement of how much risk the organisation is willing to accept in pursuit of its objectives. Risk tolerance is the operational boundary within which the organisation is prepared to work. A governance programme must track residual risk for all items in the risk register and ensure that residual risk levels are approved by the appropriate authority — a risk owner at operational level, escalated to a risk committee or board for high-residual risks. Risk registers are living documents: new risks must be added as they are identified, closed risks archived, and all risks reviewed at least annually or when material changes occur to the environment.
        challenge: |
          A risk register that nobody maintains is a compliance decoration.
          Real risk management is the discipline of making defensible decisions
          about what to protect, how, and who is accountable.

          Answer the five questions below with the rigour of someone who will
          be asked to justify their risk register to an auditor.
        instructions: |
          Key areas this lesson covers:
          — Risk register structure: risk owner, likelihood, impact, score, treatment, residual risk
          — Likelihood vs impact rating scales and heat map prioritisation
          — Four treatment options: mitigate, transfer, accept, avoid — with governance requirements for each
          — Residual risk, risk appetite, and risk tolerance
          — Risk register maintenance: review cadence, new risk intake, escalation
        rubric:
          - criterion: Risk register structure described with all required components
            points: 20
            hint: Does the answer describe a complete risk register entry — risk description, owner, likelihood, impact, score, treatment decision, controls applied, residual risk, review date?
            question: >
              Describe the structure of a well-formed risk register entry. Use a
              realistic IT risk as your example — for instance, the risk of a
              ransomware attack encrypting critical business systems. What fields
              does the entry contain, who owns it, and what information must be
              present for the entry to be defensible in an audit?
          - criterion: Risk treatment options applied correctly to scenario
            points: 20
            hint: Does the answer select the appropriate treatment option for each risk with a clear rationale, and describe what documented risk acceptance requires?
            question: >
              For each of the following risks, identify the most appropriate treatment
              option (mitigate, transfer, accept, avoid) and justify your choice:
              (1) A vendor's software has a known vulnerability with no available patch
              for 90 days. (2) The organisation processes payment cards but lacks the
              resources to achieve PCI-DSS compliance. (3) A low-value legacy system
              has not been patched in 18 months. What governance documentation is
              required if risk acceptance is chosen?
          - criterion: Likelihood and impact scoring applied with appropriate nuance
            points: 20
            hint: Does the answer explain that high likelihood + low impact and low likelihood + high impact require different treatment decisions despite potentially similar scores?
            question: >
              Two risks have identical risk scores on your heat map: Risk A is
              high-likelihood but low-impact; Risk B is low-likelihood but
              catastrophic-impact. Should they be treated the same way? Explain
              how likelihood and impact individually — not just their product —
              should influence treatment decisions and control selection.
          - criterion: Residual risk and risk appetite applied correctly
            points: 20
            hint: Does the answer explain the difference between inherent risk, controls applied, and residual risk, and describe what happens when residual risk exceeds risk appetite?
            question: >
              Explain the difference between inherent risk and residual risk.
              After implementing controls for a critical data exfiltration risk,
              the residual risk is still rated High. Your organisation's stated
              risk appetite accepts no High-rated residual risks without board
              approval. What happens next, and who is involved? What options
              does the board have when presented with this risk?
          - criterion: Risk register maintenance discipline described with governance rigour
            points: 20
            hint: Does the answer describe a review cadence, trigger events for ad-hoc review, escalation path for new high risks, and the governance consequence of an unmaintained register?
            question: >
              An auditor reviews your risk register and finds that 12 of 40 entries
              have not been reviewed in over 18 months. Three of those entries relate
              to risks that were rated Critical at the time of entry. What is the
              governance problem this creates, and what does it tell you about the
              risk management process? Describe the review and maintenance discipline
              a risk register requires to remain defensible.

      - slug: governance-vendor-risk
        number: 4
        title: "Third Party & Vendor Risk"
        tagline: "Your vendors are part of your attack surface. Govern them accordingly."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Third-party and vendor risk management (TPRM) is the governance discipline of identifying, assessing, and managing the risks introduced by organisations that your business depends on or shares data with. The regulatory and contractual drivers are substantial: GDPR requires organisations to ensure that data processors (third parties who process personal data on their behalf) provide sufficient guarantees of appropriate technical and organisational measures; HIPAA's Business Associate Agreement (BAA) requirements mean covered entities must have documented agreements with every vendor that handles PHI; and financial services regulators increasingly treat vendor risk as a first-order governance concern following high-profile supply chain failures. Beyond compliance, the operational reality is that a vendor who suffers a breach, an outage, or a failure of their own controls can cause direct harm to your customers, operations, and reputation.

          The TPRM lifecycle has five stages: inventory (knowing what third parties you have and what data or access they hold), tiering (classifying vendors by risk level based on data sensitivity, operational dependency, and access type), assessment (evaluating each vendor's controls against your requirements, proportionate to their risk tier), contracting (embedding security, audit, and notification obligations in vendor agreements), and ongoing monitoring (verifying that controls remain effective over the life of the relationship). Tiering is the mechanism that makes the programme operationally scalable: a low-tier vendor who receives only anonymised marketing data gets a lightweight self-assessment questionnaire; a tier-1 vendor who processes your customers' health records and has access to your production environment gets a full technical assessment, SOC 2 Type II report review, and potentially an on-site audit. Applying the same level of scrutiny to every vendor is neither practical nor necessary.

          Contractual controls are what convert a vendor assessment into an enforceable governance commitment. The key contractual provisions for high-risk vendors include: data processing agreements (DPAs) specifying what data can be processed, for what purpose, and under what security requirements; audit rights allowing your organisation to assess the vendor's controls on demand or on a schedule; breach notification obligations requiring the vendor to notify you within a specified timeframe (72 hours is typical for GDPR-covered data); sub-processor approval requirements preventing the vendor from passing your data to fourth parties without consent; and termination for cause provisions triggered by a material breach of security obligations. Ongoing monitoring bridges the gap between point-in-time assessments and the continuous reality of vendor relationships: it includes tracking vendor security ratings services, reviewing annual SOC 2 or ISO 27001 certification renewals, monitoring news for vendor incidents, and conducting periodic re-assessments when vendor scope changes.
        challenge: |
          A vendor breach that affects your data is your problem too.
          TPRM is not a procurement checkbox — it is a governance programme
          with regulatory consequences if it fails.

          Answer the five questions below at the depth of someone who
          owns or is accountable for a TPRM programme.
        instructions: |
          Key areas this lesson covers:
          — TPRM regulatory drivers: GDPR data processor requirements, HIPAA BAAs, financial services regulation
          — Vendor lifecycle: inventory, tiering, assessment, contracting, monitoring
          — Tiering criteria: data sensitivity, operational dependency, access type
          — Contractual controls: DPAs, audit rights, breach notification, sub-processor approval
          — Ongoing monitoring: security ratings, SOC 2 renewals, re-assessment triggers
        rubric:
          - criterion: TPRM regulatory context explained with accuracy
            points: 20
            hint: Does the answer correctly describe the GDPR data processor obligation, HIPAA BAA requirement, or financial services regulatory expectation — not just state that regulations exist?
            question: >
              A new vendor will process personal data of EU customers on your
              organisation's behalf. What are your GDPR obligations regarding
              this vendor before processing begins? What must the contract
              contain, and what must you have verified about the vendor's
              technical and organisational measures? What happens if the
              vendor suffers a breach affecting this data?
          - criterion: Vendor tiering approach described with defensible criteria
            points: 20
            hint: Does the answer describe tiering based on data sensitivity, access type, and operational dependency — and explain how tier determines the depth of assessment?
            question: >
              Describe how you would tier vendors in a TPRM programme. What
              criteria determine whether a vendor is tier 1, 2, or 3? Give a
              realistic example of a vendor at each tier and explain what
              assessment process each tier receives. Why is tiering necessary
              for programme scalability?
          - criterion: Vendor assessment process described with appropriate depth
            points: 20
            hint: Does the answer describe what a tier-1 assessment involves — questionnaire, SOC 2 review, penetration test evidence, on-site audit — and what a finding means for the relationship?
            question: >
              You are onboarding a tier-1 SaaS vendor who will process customer
              financial records and have API access to your core banking platform.
              Describe the full assessment process: what documents you request,
              what you evaluate, what findings would be blockers vs acceptable
              with compensating controls, and how you document the outcome.
          - criterion: Contractual control requirements identified correctly
            points: 20
            hint: Does the answer identify DPA, audit rights, breach notification timelines, sub-processor controls, and termination for cause as key contract provisions — with rationale for each?
            question: >
              A vendor's standard contract does not include audit rights, limits
              breach notification to "reasonable notice," and permits sub-processors
              without prior approval. Explain why each of these gaps is a governance
              risk, what the correct contractual provision should be, and how you
              would handle a vendor who refuses to negotiate on these points.
          - criterion: Ongoing monitoring programme described with operational specificity
            points: 20
            hint: Does the answer describe specific monitoring activities (security ratings, SOC 2 renewal tracking, re-assessment triggers) rather than just "periodic reviews"?
            question: >
              A vendor passed their initial assessment 18 months ago and has had
              no issues since. Your TPRM programme requires ongoing monitoring.
              Describe what that monitoring looks like in practice: what you check,
              how frequently, what events trigger an off-cycle re-assessment, and
              what you do if monitoring reveals the vendor has had a security
              incident they did not notify you about.

      - slug: governance-audit-prep
        number: 5
        title: "Audit Preparation"
        tagline: "Evidence collection, control testing, and not being surprised by findings."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Audit preparation is the discipline of ensuring that controls are operating effectively and that evidence of their operation is collected, organised, and available before auditors arrive — not in the 48 hours after they send their evidence request list. Audits in the IT governance context include internal audits (conducted by the organisation's own internal audit function), external audits (conducted by independent third parties, typically for certification or regulatory purposes), and customer audits (conducted by enterprise customers exercising their contractual audit rights). Each has different objectives, different evidence standards, and different consequences for findings, but all require the same underlying discipline: controls that are designed, implemented, and operating effectively, with evidence that demonstrates each of these three things.

          The audit evidence hierarchy distinguishes between types of evidence by reliability. Direct evidence — system-generated logs, configuration exports, automated alerts — is more reliable than testimonial evidence (what someone tells an auditor) because it is harder to fabricate and is contemporaneous with the control operation. The controls themselves are evaluated against three criteria: design effectiveness (is the control designed to address the risk it is supposed to mitigate?), implementation effectiveness (has the control been implemented as designed?), and operating effectiveness (has the control operated consistently over the audit period?). A control that is well designed and correctly implemented but only operated for two of the twelve months in the audit period will produce an operating effectiveness finding — the most common type of finding in practice, because organisations implement controls correctly but fail to maintain them consistently.

          Responding to audit findings is a governance process, not a reactive scramble. Findings are typically classified by severity — critical, high, medium, low — and each requires a management response that specifies the root cause, the remediation action, the owner, and the target completion date. Management responses should be honest about root cause: an auditor who receives a response that attributes a finding to "a one-time process gap" for a control that has failed in three consecutive audit periods will not accept the explanation, and the relationship between the organisation and the audit function will deteriorate. The right response to a recurring finding is a root cause analysis that identifies the systemic cause — inadequate resources, unclear ownership, competing operational priorities — and a remediation plan that addresses the system, not just the symptom. Tracking finding remediation to closure is the final step: open findings that age past their target date without escalation become a governance signal in their own right.
        challenge: |
          Auditors are not adversaries, but they are not forgiving of
          evidence gaps, untested controls, or recurring findings with
          superficial responses.

          Answer the five questions below with the preparation discipline
          of someone who wants no surprises on audit day.
        instructions: |
          Key areas this lesson covers:
          — Audit types: internal, external certification, customer audit rights
          — Evidence hierarchy: system-generated vs testimonial, contemporaneous vs reconstructed
          — Control evaluation criteria: design, implementation, operating effectiveness
          — Finding severity classification and management response requirements
          — Finding remediation tracking and root cause analysis for recurring findings
        rubric:
          - criterion: Audit evidence types distinguished with reliability implications
            points: 20
            hint: Does the answer correctly explain why system-generated, contemporaneous evidence is more reliable than testimonial evidence, and describe what good evidence looks like for a common control?
            question: >
              An auditor asks you to demonstrate that privileged access reviews
              are being conducted quarterly. Describe the evidence you would
              provide. What makes evidence reliable in an audit context, and why
              is a manager's verbal confirmation that reviews occurred insufficient?
              What would a well-evidenced quarterly access review produce?
          - criterion: Control operating effectiveness distinguished from design/implementation
            points: 20
            hint: Does the answer explain the three effectiveness criteria and correctly identify operating effectiveness findings as the most common — controls that work but are not consistently applied?
            question: >
              An auditor finds that your patch management policy requires critical
              patches to be applied within 14 days of release. Configuration data
              shows the policy is correctly configured. However, patch deployment
              logs show that in 4 of the last 12 months, the 14-day SLA was missed
              for more than 20% of systems. What type of finding is this, and why?
              What root causes would you investigate, and what evidence would you
              need to demonstrate remediation?
          - criterion: Management response to a finding structured correctly
            points: 20
            hint: Does the answer include root cause analysis, specific remediation action, named owner, and target date — and explain why generic responses are rejected by auditors?
            question: >
              An internal audit finding states: "User access reviews for privileged
              accounts are not being conducted on the required quarterly schedule.
              In the 12-month audit period, only one review was completed."
              Write a management response to this finding. Include root cause,
              remediation action, owner, and target date. What would an inadequate
              response look like, and why would an auditor reject it?
          - criterion: Evidence collection programme described proactively
            points: 20
            hint: Does the answer describe ongoing evidence collection (not audit-time reconstruction), with a schedule aligned to the audit period and organised by control?
            question: >
              Your annual ISO 27001 surveillance audit is six months away.
              Describe the evidence collection programme you would run between
              now and then. What controls require ongoing evidence, how is
              evidence stored and organised, and what would you review internally
              before the auditor arrives to identify potential findings before
              they do?
          - criterion: Recurring finding handled with systemic root cause analysis
            points: 20
            hint: Does the answer identify that a recurring finding indicates a systemic failure (not a one-time gap), describe a genuine root cause analysis, and propose a remediation that addresses the system?
            question: >
              A finding related to incomplete security awareness training records
              has appeared in three consecutive annual audits. Each year's management
              response committed to "refreshing the process." The finding keeps
              recurring. What does this pattern tell you about the management
              responses given so far? Describe how you would conduct a root cause
              analysis for this finding and what a credible remediation plan
              would contain.

  # ============================================================
  # COURSE 14 — Business Continuity & Disaster Recovery
  # ============================================================
  - slug: business-continuity-dr
    title: "Business Continuity & Disaster Recovery"
    tagline: "When everything breaks, this is what you practiced."
    description: >
      Five lessons covering the disciplines that keep organisations operational
      through disruption: understanding the difference between BCP and DR,
      building a business impact analysis, designing recovery strategies,
      running tabletop exercises that reveal real gaps, and communicating
      effectively during a crisis.
    icon: "🔄"
    tier: 2
    lessons:

      - slug: bcp-vs-dr
        number: 1
        title: "BCP vs DR"
        tagline: "Two disciplines, one goal — keeping the organisation alive through disruption."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Business Continuity Planning (BCP) and Disaster Recovery (DR) are related but distinct disciplines that are frequently conflated. Business continuity is the broader discipline: it addresses how an organisation continues to deliver its critical functions and services during and after a disruption, regardless of the cause. A BCP covers the people, processes, facilities, communications, and governance needed to maintain or quickly restore minimum viable operations. Disaster recovery is a subset of business continuity focused specifically on restoring IT systems and data after a disruptive event. DR is a technical programme; BCP is an organisational one. A BCP might describe how customer service operations continue if the primary office is unavailable; the DR plan describes how the CRM system those operations depend on is restored from backup or failed over to a secondary site.

          The scope of BCP extends well beyond IT. A comprehensive programme addresses: people continuity (what happens when key staff are unavailable), facility continuity (what happens when the primary workplace is inaccessible), supply chain continuity (what happens when critical suppliers fail), and communications continuity (how the organisation communicates internally and externally during a crisis). IT disaster recovery enables the technological foundations of these functions but does not replace the organisational planning required to actually use those technologies during a crisis. Many organisations learn this distinction the hard way: they invest heavily in technical DR capability — off-site backups, hot standby systems, cloud failover — and then discover during an actual incident that nobody knows the procedures, the contact list is three years out of date, and the recovery plan assumes a calm, sequential restoration process that bears no resemblance to reality.

          Executive sponsorship is not optional for BCP/DR programmes. Recovery time objectives, recovery point objectives, and minimum viable service levels are business decisions that require executive sign-off — they have direct cost implications (a two-hour RTO costs more than a 24-hour RTO) and they define what the organisation accepts as tolerable loss during a disruption. A programme that lives only in the IT department, without board-level visibility, will be under-resourced and will not have the authority to require business units to participate in impact analysis, testing, or plan maintenance. The governance structure for BCP/DR should include a named executive sponsor, a programme owner, business unit continuity coordinators, and a review and testing cadence that is formally approved and resourced.
        challenge: |
          BCP and DR are only as good as the clarity of thinking behind them.
          Organisations that confuse the two, or invest in one while ignoring
          the other, discover the gap during an actual disruption.

          Answer the five questions below with the organisational and technical
          depth the subject requires.
        instructions: |
          Key areas this lesson covers:
          — BCP scope: people, facilities, supply chain, communications, governance
          — DR scope: IT systems, data restoration, failover, technical recovery
          — How BCP and DR interact and depend on each other
          — Executive sponsorship requirements and governance structure
          — Common failure modes: technical DR without organisational BCP
        rubric:
          - criterion: BCP vs DR distinction explained with accurate scope
            points: 20
            hint: Does the answer correctly position DR as a subset of BCP focused on IT recovery, and describe the broader organisational scope of BCP?
            question: >
              Explain the difference between a Business Continuity Plan and a
              Disaster Recovery plan. Give a concrete example of a disruption
              scenario and describe what the BCP covers vs what the DR plan
              covers for that scenario. Why does an organisation that has only
              a DR plan still have a significant BCP gap?
          - criterion: Organisational BCP components identified beyond IT
            points: 20
            hint: Does the answer identify people, facilities, supply chain, and communications as BCP components — not just describe IT failover or data backup?
            question: >
              A company's primary office is rendered inaccessible by a flood.
              IT systems are unaffected — everything is cloud-hosted and accessible
              from any location. Why does the company still need a BCP? What
              non-IT elements of the plan are activated, and what would be missing
              if the organisation had only a DR plan?
          - criterion: Executive sponsorship requirement justified with business reasoning
            points: 20
            hint: Does the answer explain that RTO/RPO are business decisions with cost implications, require executive sign-off, and that programmes without executive sponsorship are structurally under-resourced?
            question: >
              Why does a BCP/DR programme require executive sponsorship rather
              than sitting entirely within the IT department? What decisions
              cannot be made at the IT level, and what happens to a programme
              that lacks board-level visibility and support? Give a specific
              example of a consequence of insufficient sponsorship.
          - criterion: Common failure modes identified from realistic scenario
            points: 20
            hint: Does the answer identify the gap between technical DR capability and organisational readiness — specifically that having the technology does not mean people know how to use it under pressure?
            question: >
              An organisation has invested significantly in a cloud-based DR
              environment with automated failover, off-site backups, and a
              documented recovery runbook. During a ransomware incident, recovery
              takes 72 hours instead of the planned 8. What are the most likely
              reasons for this gap, and what aspects of the BCP/DR programme
              does it suggest were inadequate despite the technical investment?
          - criterion: BCP governance structure described with appropriate components
            points: 20
            hint: Does the answer describe an executive sponsor, programme owner, business unit coordinators, and a testing and review cadence as governance components?
            question: >
              Describe the governance structure a mature BCP/DR programme requires.
              Who are the key roles, what is each responsible for, and how does
              the programme maintain relevance and accuracy over time? What does
              the programme produce that a board or auditor can review to assess
              its maturity?

      - slug: bcp-impact-analysis
        number: 2
        title: "Business Impact Analysis"
        tagline: "Identifying what you cannot afford to lose — before you lose it."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          A Business Impact Analysis (BIA) is the foundational analytical exercise that underpins all meaningful BCP and DR planning. Its purpose is to identify which business functions and processes are critical to the organisation's survival or regulatory compliance, quantify the impact of their disruption over time, and determine the recovery objectives — RTO and RPO — that recovery plans must be designed to meet. Without a BIA, RTOs and RPOs are guesses; with a rigorous BIA, they are business decisions grounded in evidence of actual impact. The BIA also identifies the dependencies of critical processes — the systems, data, suppliers, staff, and facilities that each process relies on — which is the input to dependency mapping and recovery architecture design.

          RTO (Recovery Time Objective) is the maximum acceptable duration of a process or system outage before the impact becomes unacceptable to the organisation. RPO (Recovery Point Objective) is the maximum acceptable data loss, expressed as a point in time: if the RPO for a critical database is four hours, the organisation must be able to restore that database to a state no older than four hours before the disruption. RTOs and RPOs are not the same across all processes: a payment processing system might have an RTO of two hours and an RPO of zero (no data loss acceptable); an internal reporting system might have an RTO of five days. The cost of meeting a given RTO or RPO scales steeply: a two-hour RTO requires near-real-time replication and hot standby infrastructure; a 24-hour RTO can be met with daily backups and a cold standby. The BIA makes these trade-offs explicit by quantifying the business impact at each time interval, allowing the organisation to make an informed investment decision.

          Conducting a BIA requires structured engagement with business process owners — not just the IT team. The analysis methodology typically involves interviews or workshops with each business unit to identify: the processes they perform, the maximum tolerable period of disruption (MTPD) for each, the minimum service level required to be considered operational, the downstream and upstream dependencies of each process, and the financial, regulatory, operational, and reputational impact of disruption at 1 hour, 4 hours, 24 hours, 72 hours, and one week. The outputs of the BIA — a ranked list of critical processes with RTOs, RPOs, and dependency maps — are the specification that the DR architecture, recovery procedures, and testing programme must be designed to satisfy. A BIA that is not translated into these downstream artefacts has not fulfilled its purpose.
        challenge: |
          An RTO or RPO that has not been validated against actual business impact
          is not an objective — it is a guess. BIA is the work that converts
          guesses into defensible requirements.

          Answer the five questions below with the analytical depth that
          the BIA process requires.
        instructions: |
          Key areas this lesson covers:
          — BIA purpose: identifying critical processes, quantifying disruption impact
          — RTO vs RPO: definitions, how they differ, and what sets them
          — Cost of meeting RTO/RPO: infrastructure implications of aggressive vs relaxed objectives
          — BIA methodology: interviews, MTPD, dependency mapping
          — BIA outputs: critical process list, recovery specifications for DR architecture
        rubric:
          - criterion: RTO and RPO defined correctly and distinguished
            points: 20
            hint: Does the answer correctly define RTO as time-based (maximum outage duration) and RPO as data-based (maximum data loss expressed as a point in time), and explain why they are different measurements?
            question: >
              Define RTO and RPO. A critical order management system goes down at
              09:00. The RTO is 4 hours and the RPO is 2 hours. What does this mean
              in concrete operational terms — when must the system be restored, and
              to what state? What is the maximum acceptable data loss, and what
              backup or replication approach is required to meet that RPO?
          - criterion: BIA methodology described with process-owner engagement
            points: 20
            hint: Does the answer describe a BIA as a business-led (not IT-led) process involving interviews with process owners, and identify the specific outputs each interview produces?
            question: >
              Describe how you would conduct a BIA for a 1,000-person financial
              services organisation with 12 business units. Who do you engage,
              what questions do you ask, and what information does each conversation
              produce? Why cannot the IT team conduct the BIA without substantive
              input from business process owners?
          - criterion: Impact quantification approach described with multiple impact dimensions
            points: 20
            hint: Does the answer identify financial, regulatory, operational, and reputational impact dimensions — not just financial — and explain how impact varies over time?
            question: >
              A BIA workshop for the payroll processing team reveals that a payroll
              system outage lasting more than 72 hours would mean employees are not
              paid on the scheduled pay date. Describe how you would quantify the
              impact of this outage across multiple dimensions, and how the impact
              profile changes at 4 hours, 24 hours, 72 hours, and one week.
              What RTO does this analysis suggest?
          - criterion: Dependency mapping applied to a realistic process scenario
            points: 20
            hint: Does the answer identify the upstream and downstream dependencies of a realistic business process — systems, data, people, suppliers — and explain how dependency mapping feeds DR architecture?
            question: >
              The BIA has identified customer order processing as a tier-1 critical
              process with a 4-hour RTO. Map the dependencies of this process:
              what systems, data sources, people, suppliers, and facilities does
              it depend on? How does this dependency map change the scope of
              what the DR plan must cover beyond just restoring the order management
              system itself?
          - criterion: BIA output translated into recovery architecture requirements
            points: 20
            hint: Does the answer demonstrate that BIA outputs (RTO, RPO, dependencies) directly drive recovery architecture decisions, and explain the cost implication of different RTO/RPO levels?
            question: >
              The BIA produces the following results: the CRM system has a 2-hour
              RTO and a 30-minute RPO; the internal HR portal has a 5-day RTO and
              a 24-hour RPO. Describe the recovery architecture implications for
              each system. What backup, replication, and standby infrastructure
              does each RTO/RPO pair require, and why would you not design both
              systems to the same standard?

      - slug: bcp-recovery-strategies
        number: 3
        title: "Recovery Strategies"
        tagline: "Backup approaches, failover options, and the cost of getting it wrong."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Recovery strategy selection is the process of choosing the technical and operational approaches that will enable an organisation to meet the RTOs and RPOs established in the BIA. The strategy must be matched to the objective: a 15-minute RTO requires a fundamentally different architecture than a 24-hour RTO, and the cost difference is significant. The spectrum of IT recovery strategies runs from cold standby (a spare environment that must be provisioned and configured from scratch when needed — the cheapest option, with the longest recovery time), through warm standby (a pre-provisioned environment that requires data restoration and some configuration before it is operational — intermediate cost and recovery time), to hot standby (a fully operational mirror environment that can accept traffic immediately, typically via automated failover — the most expensive option, with the shortest recovery time). Cloud infrastructure has substantially changed the economics of warm and hot standby approaches by eliminating the need to own and maintain physical secondary hardware.

          Backup strategy is the foundation of any recovery architecture. The 3-2-1 rule is the baseline: three copies of data, on two different media types, with one copy off-site. In modern cloud environments, the "off-site" requirement is typically met by replicating to a different cloud region or availability zone. Key backup parameters include: backup frequency (how often backups are taken, which directly determines RPO); retention period (how long backups are kept, which determines how far back you can restore); backup type (full, incremental, or differential, with trade-offs between backup duration and restore duration); and backup verification (whether backups are actually tested for restore integrity — untested backups are a common source of recovery failures). Encryption of backup data at rest and in transit is a security baseline; backup access controls are a governance requirement that is frequently overlooked until a ransomware incident demonstrates that attackers specifically target backup systems to prevent recovery.

          Cloud-based recovery strategies introduce both new options and new considerations. Cloud-native DR services (AWS Elastic Disaster Recovery, Azure Site Recovery, Google Cloud's backup and DR services) enable replication of on-premises workloads to cloud environments with configurable RPOs measured in minutes. Containers and infrastructure-as-code enable recovery from configuration as well as data, reducing the dependence on backup for the infrastructure layer. The key considerations for cloud DR are: network connectivity (if the WAN link to cloud is unavailable during a disruption, cloud DR may not be accessible), data sovereignty (regulatory requirements may restrict where backup data can be stored geographically), cost management (cloud DR costs increase with data volume and replication frequency — they must be modelled, not assumed), and testing (cloud DR environments are particularly easy to spin up and test regularly, and there is no excuse for untested cloud DR architecture).
        challenge: |
          A recovery strategy that has not been validated against your actual
          RTO/RPO requirements, tested under realistic conditions, and costed
          accurately is an assumption, not a plan.

          Answer the five questions below with the technical and financial
          specificity that recovery architecture decisions require.
        instructions: |
          Key areas this lesson covers:
          — Cold/warm/hot standby: trade-offs between cost, recovery time, and complexity
          — 3-2-1 backup rule: media, location, frequency, verification
          — Cloud DR options: replication services, infrastructure-as-code, availability zones
          — Backup security: encryption, access controls, ransomware protection
          — Recovery strategy alignment to BIA RTOs/RPOs
        rubric:
          - criterion: Standby tier options matched to RTO requirements correctly
            points: 20
            hint: Does the answer correctly match cold/warm/hot standby to different RTO ranges and explain the cost and complexity implications of each choice?
            question: >
              The BIA has produced three systems with different RTOs: System A has
              a 15-minute RTO, System B has a 4-hour RTO, and System C has a 48-hour
              RTO. For each system, recommend a standby approach (cold, warm, or hot)
              and justify your choice. What does each approach cost relative to the
              others, and what are the operational implications for System A's 15-minute
              RTO in practice?
          - criterion: Backup strategy described with all 3-2-1 components and RPO alignment
            points: 20
            hint: Does the answer describe backup frequency, retention, type (full/incremental/differential), off-site copy, and verification — and connect frequency directly to the RPO?
            question: >
              Design a backup strategy for a critical database with a 4-hour RPO
              and a requirement to restore to any point in the last 30 days.
              What backup frequency, type, and retention period does this require?
              Where are the copies stored, and how do you verify that backups
              are actually restorable? What is the most common gap in backup
              programmes that this verification process is designed to catch?
          - criterion: Ransomware threat to backup infrastructure identified and mitigated
            points: 20
            hint: Does the answer identify that ransomware specifically targets backup systems, and describe immutable backup storage, access controls, and air-gapping as mitigations?
            question: >
              A ransomware attack has encrypted the organisation's primary systems.
              The recovery team discovers that the backup repository was also
              encrypted by the attacker, who gained access via a compromised
              backup administrator account three weeks earlier. What backup
              architecture decisions would have prevented this outcome?
              Describe the controls that protect backup data from the same
              threat that affects production systems.
          - criterion: Cloud DR considerations applied to a realistic scenario
            points: 20
            hint: Does the answer address connectivity dependency, data sovereignty, cost modelling, and testing as cloud DR considerations — not just describe cloud DR as a straightforward option?
            question: >
              An organisation is evaluating a cloud-based DR architecture to replace
              its aging secondary data centre. Describe the key considerations before
              committing to this approach. What dependencies does cloud DR introduce
              that a physical secondary data centre does not? What must be confirmed
              about data sovereignty, network connectivity, and costs before the
              architecture is approved?
          - criterion: Recovery strategy validation requirement articulated
            points: 20
            hint: Does the answer explain that an untested recovery strategy is not a verified capability, and describe what a recovery test must produce to be meaningful evidence?
            question: >
              An organisation's DR plan documents a 4-hour RTO for its core ERP
              system. The plan has never been tested in production. A board member
              asks whether the organisation can actually recover within 4 hours if
              needed. What is the honest answer, and why? Describe what a meaningful
              DR test for this system would involve and what evidence it would produce.

      - slug: bcp-tabletop-exercises
        number: 4
        title: "Tabletop Exercises"
        tagline: "Designing scenarios, surfacing gaps, and making practice count."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Tabletop exercises are facilitated discussion-based simulations in which key stakeholders walk through their response to a hypothetical disruptive event without actually activating systems or deploying personnel. They are the most accessible form of BCP/DR testing because they require no technical activation, can be conducted with cross-functional groups, and are specifically designed to surface gaps in plans, assumptions, and coordination rather than technical capabilities. A well-designed tabletop exercise reveals: which procedures are unclear or inconsistently understood; which decisions fall between roles with no clear owner; which communication paths break down under pressure; and which assumptions in the plan do not survive contact with a realistic scenario.

          Exercise design determines whether a tabletop is genuinely useful or a compliance box-ticking exercise. The scenario must be realistic and calibrated to the audience: a ransomware scenario for a financial services organisation is more likely to reveal real gaps than a scenario about a meteorite strike. The scenario should have sufficient specificity — a named system affected, a specific time of day, a specific data type involved — to force concrete decisions rather than abstract discussions about "what we would generally do." Injects are pre-planned complications introduced during the exercise to push the scenario in new directions: a key staff member is unavailable, a communication channel fails, a regulatory notification deadline is approaching, the backup system is not responding. Well-timed injects reveal how the plan degrades under realistic adverse conditions rather than the idealised conditions the plan was written for.

          Documentation and follow-through are what distinguish exercises that improve organisational resilience from exercises that generate a report nobody reads. During the exercise, a dedicated observer should record: decisions made, gaps identified, assumptions challenged, and action items arising. The post-exercise report should clearly list findings — gaps in the plan, unclear ownership, missing documentation, failed assumptions — with named owners and target remediation dates. The real test of an exercise programme's maturity is whether findings from previous exercises have been closed before the next exercise runs. Organisations that run annual tabletops and find the same gaps year after year have an exercise programme that documents problems without fixing them. The governance requirement is not just to run exercises but to demonstrate that exercises drive measurable improvement in the organisation's recovery capability.
        challenge: |
          Tabletop exercises are only as useful as the gaps they reveal
          and the improvements they drive. A tabletop that confirms
          everything is fine is probably not a good tabletop.

          Answer the five questions below with the facilitator's eye for
          what makes an exercise genuinely useful.
        instructions: |
          Key areas this lesson covers:
          — Tabletop vs technical/live DR tests: purpose and appropriate use of each
          — Scenario design: specificity, calibration to audience, realistic adverse conditions
          — Injects: purpose, design, and timing to reveal plan degradation
          — Documentation during the exercise: observer role, gap capture
          — Post-exercise report and finding remediation tracking
        rubric:
          - criterion: Tabletop exercise purpose distinguished from technical DR test
            points: 20
            hint: Does the answer correctly describe tabletops as discussion-based gap-finding exercises — distinct from technical tests that verify actual system recovery?
            question: >
              Explain the difference between a tabletop exercise and a technical
              disaster recovery test. What does each one test, what gaps does each
              type of exercise surface, and when would you use each? Can a strong
              tabletop exercise programme substitute for technical DR testing?
          - criterion: Scenario design principles applied to a realistic scenario
            points: 20
            hint: Does the answer describe a specific, realistic scenario with enough detail to force concrete decisions — not a vague "major outage" description?
            question: >
              Design a tabletop exercise scenario for a healthcare organisation's
              incident response and BCP teams. The scenario should test their
              response to a ransomware attack affecting the patient records system
              on a Friday afternoon. Write the scenario description an exercise
              facilitator would read to the room, then describe three injects
              you would introduce over the course of the 90-minute exercise.
          - criterion: Inject design used to surface realistic plan degradation
            points: 20
            hint: Does the answer describe injects that introduce realistic adverse conditions — unavailable staff, failed communications, approaching deadlines — not just technical complications?
            question: >
              During a ransomware tabletop, the team is progressing through the
              response plan smoothly and confidently. Design three injects that
              would test whether the plan degrades gracefully under realistic
              adverse conditions. For each inject, explain what assumption or
              gap in the plan you are trying to surface and how participants'
              responses will reveal it.
          - criterion: Post-exercise documentation and reporting described completely
            points: 20
            hint: Does the answer describe real-time gap capture by an observer, a post-exercise report with named owners and dates, and a mechanism for tracking finding remediation?
            question: >
              Describe the documentation process for a tabletop exercise: what
              is captured during the exercise, who captures it, and what the
              post-exercise report contains. A finding from this exercise identifies
              that the crisis communication plan has not been updated in 18 months
              and contains contact details for staff who have left the organisation.
              Write the finding and management response as they would appear in
              the report.
          - criterion: Exercise programme maturity assessed from finding recurrence
            points: 20
            hint: Does the answer identify recurring findings as a sign of an exercise programme that documents but does not improve, and describe the governance mechanism for tracking improvement?
            question: >
              An organisation has run annual BCP tabletop exercises for four years.
              Reviewing the last four post-exercise reports, you find that the same
              three findings — unclear escalation paths, an out-of-date contact list,
              and no documented process for regulatory notification — appear in every
              report. What does this pattern indicate about the exercise programme,
              and what governance change would you recommend to ensure exercises
              drive improvement rather than just documenting recurring gaps?

      - slug: bcp-crisis-communication
        number: 5
        title: "Crisis Communication"
        tagline: "Stakeholder notification, regulatory reporting, and keeping trust when things go wrong."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Crisis communication is the discipline of managing information flow to internal and external stakeholders during a disruptive event in a way that maintains trust, satisfies regulatory obligations, and supports the recovery effort rather than impeding it. It is the element of BCP most frequently underprepared, because it requires coordination across functions — legal, communications, HR, IT, senior leadership — and depends on decisions that cannot be fully pre-scripted. What can be pre-scripted are the processes: who activates the communication plan, who approves external statements, what the notification hierarchy is, what the regulatory reporting obligations are and when they are triggered, and what channels are used when primary communication tools (email, internal chat) may themselves be unavailable.

          Stakeholder notification hierarchies define who is told what, in what order, and through what channel. Internal notification typically follows an inverted funnel: the incident commander or crisis team is notified first, followed by the executive team, followed by affected business units, followed by all staff. External notification follows a different logic governed by legal and regulatory obligation: regulators with mandatory breach notification windows (GDPR's 72 hours to the supervisory authority; HIPAA's 60-day notification requirement; SEC's 4-business-day material cybersecurity incident disclosure for public companies) are notified according to the applicable deadline regardless of whether the incident is fully understood. This creates a significant governance challenge: mandatory notifications must often be made before the full scope of an incident is known, and the content of early notifications must be carefully drafted to be accurate without creating liability from later contradictions. Legal counsel is a required participant in external regulatory notifications, not an optional escalation.

          Post-incident review is the final and frequently skipped stage of the crisis communication process. A post-incident review examines not just what happened technically but how the communication plan performed: were the right people notified in the right order? Did the regulatory notification meet the deadline? Were public statements accurate and did they need to be retracted or corrected? Were customers or partners notified in a timely and appropriate manner? What did the communication plan assume that turned out not to be true? The outputs of a post-incident review feed directly back into the BCP: updated contact lists, revised escalation paths, corrected regulatory notification procedures, and lessons learned that improve the next response. Organisations that complete post-incident reviews consistently have demonstrably better crisis responses over time than those that consider the incident closed when systems are restored.
        challenge: |
          The technical recovery and the communication response to a crisis
          are equally important — and organisations that are technically
          prepared but communicatively unprepared will still suffer lasting
          damage to trust, reputation, and regulatory standing.

          Answer the five questions below with the precision and legal
          awareness that crisis communication requires.
        instructions: |
          Key areas this lesson covers:
          — Communication plan components: notification hierarchy, approval chain, channel backup
          — Internal vs external notification: different audiences, different obligations
          — Regulatory notification: GDPR 72-hour window, HIPAA timeline, SEC disclosure
          — Drafting early notifications: accuracy without liability from incomplete information
          — Post-incident review: what it examines, what it produces, how it feeds back into the BCP
        rubric:
          - criterion: Notification hierarchy described with correct sequencing
            points: 20
            hint: Does the answer describe a specific, sequenced notification hierarchy — incident commander → executive → business units → staff — and explain why the order matters?
            question: >
              Design the internal notification hierarchy for a major ransomware
              incident at a 2,000-person organisation. Who is notified first,
              what information do they receive at each stage, and what decisions
              does each notification enable? What happens if the primary communication
              channel (corporate email) is itself unavailable due to the incident?
          - criterion: Regulatory notification obligations identified correctly with deadlines
            points: 20
            hint: Does the answer correctly state the GDPR 72-hour supervisory authority notification window, describe what triggers the obligation, and explain that notifications must be made before the incident is fully understood?
            question: >
              A ransomware attack at 14:00 on Monday has encrypted systems containing
              personal data of EU customers. At what point does the GDPR notification
              obligation to the supervisory authority begin, and when does it expire?
              What must the notification contain, and what do you do if the full
              scope of the breach is not yet known when the deadline arrives?
              Who in the organisation must be involved in drafting this notification?
          - criterion: Early external statement drafted with accuracy and appropriate hedging
            points: 20
            hint: Does the answer demonstrate awareness that early statements must acknowledge what is known without creating liability from claims that later prove inaccurate?
            question: >
              Four hours into a significant data breach, the CEO asks you to draft
              a brief statement for the company's website acknowledging the incident.
              The investigation is ongoing and the full scope is unknown. Write the
              statement. Then explain the principles you applied: what you included,
              what you deliberately omitted, and why early statements must be
              drafted differently from post-incident communications.
          - criterion: Customer/partner notification approach described with appropriate timing
            points: 20
            hint: Does the answer address the tension between notifying customers promptly (to allow them to protect themselves) and the risk of premature disclosure before facts are established?
            question: >
              A breach has potentially exposed customer payment card data. Legal
              counsel advises waiting until the forensic investigation is complete
              before notifying affected customers — which could take three weeks.
              The security team believes customers should be notified within 48 hours
              so they can protect their accounts. How do you navigate this tension?
              What factors determine the appropriate timing and content of customer
              notification?
          - criterion: Post-incident review process described with BCP improvement outputs
            points: 20
            hint: Does the answer describe a post-incident review that examines communication plan performance specifically, and produces updates to the BCP as a documented output?
            question: >
              Six weeks after a major incident, you are facilitating the post-incident
              review. The technical recovery has been thoroughly analysed. Describe
              how you would review the communication plan's performance specifically.
              What questions do you ask, what evidence do you review, and what outputs
              does the communication review produce that must feed back into the BCP?

  # ============================================================
  # COURSE 15 — Linux System Reliability & Tuning
  # ============================================================
  - slug: linux-system-reliability
    title: "Linux System Reliability & Tuning"
    tagline: "A system that survives by swapping itself to death isn't stable. It's dying in installments."
    description: >
      Five lessons covering what it actually takes to keep Linux systems
      stable under load: understanding availability as a discipline, diagnosing
      and fixing memory and swap problems, controlling process resource usage,
      identifying I/O bottlenecks, and building the observability that lets you
      act before the system fails rather than after.
    icon: "⚙️"
    tier: 2
    lessons:

      - slug: linux-cia-availability
        number: 1
        title: "The CIA Triad & Availability"
        tagline: "The leg everyone neglects until production goes down at 3am."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          The CIA triad — Confidentiality, Integrity, Availability — is the foundational model of information security, but availability is consistently the least systematically managed of the three. Confidentiality has encryption and access controls; integrity has checksums, signatures, and audit logs; availability has... an on-call rotation and a Slack channel. This asymmetry is a governance failure, not a technical one. Availability is measurable, plannable, and improvable — but only if you treat it as an engineering discipline with defined targets, measurement methodology, and accountability rather than as an operational hope.

          The industry standard vocabulary for availability targets is the SLA/SLO/SLI hierarchy. An SLI (Service Level Indicator) is the actual metric being measured — request success rate, latency at the 99th percentile, error rate, uptime percentage. An SLO (Service Level Objective) is the internal target for that indicator — "99.9% of requests complete successfully over a rolling 30-day window." An SLA (Service Level Agreement) is the contractual commitment to customers, typically set conservatively below the SLO to provide an operational buffer. A 99.9% SLO means 43.8 minutes of acceptable downtime per month; a 99.99% SLO means 4.38 minutes. These numbers have real cost implications: moving from three nines to four nines typically requires architectural changes (redundancy, failover, health checks, automated recovery) that a single-server deployment cannot provide regardless of how well it is tuned.

          The cost of downtime is almost always underestimated because direct revenue loss is only one component. Full cost accounting includes: direct revenue loss during the outage, support cost handling incoming tickets, engineer time for incident response and post-mortem, cost of remediation and architectural changes following the incident, damage to customer trust and churn probability, and regulatory or SLA penalty exposure. For a SaaS product, even a single hour of unplanned downtime can cost multiples of what a redundant architecture would have cost to build. The practical governance implication is that availability investment decisions should be made against a realistic cost-of-downtime model — not against an abstract preference for simplicity.
        challenge: |
          Availability without measurement is a wish. Availability with
          measurement but without targets is data collection. Availability
          with targets, measurement, and accountability is engineering.

          Answer the five questions below with the precision of someone
          who has had to defend an availability posture to a customer.
        instructions: |
          Key areas this lesson covers:
          — SLI, SLO, SLA: definitions, hierarchy, and the buffer between SLO and SLA
          — Nines of availability: what 99.9%, 99.99%, 99.999% mean in minutes per month
          — Cost of downtime: beyond revenue loss to full incident cost accounting
          — Availability as an engineering discipline vs an operational hope
          — Single points of failure: identifying and quantifying availability risk
        rubric:
          - criterion: SLI/SLO/SLA hierarchy explained correctly with concrete examples
            points: 20
            hint: Does the answer correctly distinguish indicator (what you measure), objective (your internal target), and agreement (what you promise customers), and explain why the SLA is set below the SLO?
            question: >
              Explain the difference between an SLI, an SLO, and an SLA using a
              realistic web service as your example. Why is the SLA typically set
              below the SLO rather than equal to it? What happens operationally
              when you breach your SLO but not your SLA?
          - criterion: Nines translated to operational reality with cost implications
            points: 20
            hint: Does the answer correctly calculate the downtime budget for 99.9% and 99.99%, and explain what architectural requirements each level imposes?
            question: >
              A product manager asks you to commit to a 99.99% uptime SLA for
              a service currently running on a single server. Translate 99.99%
              into a monthly downtime budget in minutes. What does achieving
              that target actually require architecturally, and why can it not
              be delivered by tuning a single server more carefully?
          - criterion: Full cost of downtime quantified beyond direct revenue loss
            points: 20
            hint: Does the answer identify multiple cost categories — direct revenue, support, engineering time, remediation, customer trust/churn, regulatory — and explain why direct revenue alone understates the true cost?
            question: >
              Your organisation has a one-hour production outage. Direct revenue
              loss is estimated at £12,000. Describe the full cost of this outage —
              what other cost categories exist beyond direct revenue loss, and why
              does the true cost typically exceed the revenue impact by a significant
              multiple? How would you present this to a CFO to justify investment
              in redundancy?
          - criterion: Single point of failure identified and quantified in a realistic system
            points: 20
            hint: Does the answer identify specific SPOFs in the described architecture and explain how each one translates into availability risk?
            question: >
              A web application runs on a single Linux server: Nginx, a Python
              application server, PostgreSQL, and Redis all on the same host.
              Identify the single points of failure in this architecture. For
              each one, describe the failure mode and its availability impact.
              What is the realistic availability ceiling for this architecture
              regardless of how well it is tuned?
          - criterion: Availability measurement approach described with operational specificity
            points: 20
            hint: Does the answer describe what to measure (not just uptime percentage but relevant SLIs), how to measure it, and how to use that data to drive improvement?
            question: >
              You are asked to implement availability measurement for a production
              service that currently has no SLOs or monitoring. Describe the
              measurement programme: what SLIs you would define, how you would
              collect the data, how you would set initial SLO targets, and how
              you would use the data to identify and prioritise reliability
              improvements.

      - slug: linux-memory-management
        number: 2
        title: "Memory Management & Swap"
        tagline: "Swap is not extra RAM. It is the last line before the OOM killer."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Linux memory management is one of the most misunderstood areas of systems administration, and misunderstanding it is expensive. The kernel manages physical RAM through a virtual memory system: every process gets a virtual address space, and the kernel maps pages of that address space to physical RAM frames on demand. When physical RAM is exhausted, the kernel has two options: reclaim memory by evicting clean page cache entries (data that can be re-read from disk) and writing dirty pages (modified data) to swap, or trigger the OOM (Out of Memory) killer to terminate one or more processes to free memory. The OOM killer chooses its victim using an `oom_score` — a kernel-calculated value based on the process's memory usage and other heuristics. The process with the highest score is killed. This is not always the right process, and OOM kills in production are almost always a symptom of insufficient memory planning rather than a normal operational event.

          The `vm.swappiness` kernel parameter (range 0–100, default typically 60) controls how aggressively the kernel prefers swapping anonymous memory (process heap and stack) versus reclaiming page cache. A value of 60 means the kernel will begin considering swap relatively early; a value of 10 means it will strongly prefer to keep process memory in RAM and reclaim page cache instead. For database servers where the page cache is cold and process memory is hot, a low swappiness (10) is often appropriate. For general-purpose servers with mixed workloads, the default may be acceptable. Setting swappiness to 0 in recent kernels does not disable swap entirely — it means the kernel will only use swap when memory is critically exhausted, not to avoid OOM. Disabling swap entirely (by removing the swap partition) removes the safety net: a single memory spike can cause OOM kills that a small swap partition would have absorbed.

          Identifying memory problems requires distinguishing between the legitimate use of memory for page cache (which appears as "used" in naive readings of `free` but is immediately available to processes) and actual memory pressure. The output of `free -h` shows `buff/cache` separately from process memory; the `available` column is the correct measure of how much memory is available for new processes without swapping. Tools for deeper analysis include: `vmstat 1` for real-time memory and swap I/O rates; `smem` for per-process proportional set size (PSS) analysis; `/proc/<pid>/smaps` for detailed process memory maps; and `sar -r` for historical memory usage trends. A memory leak presents as steady growth in a process's RSS over time with no corresponding increase in workload — diagnosing it requires tracking per-process memory over time, not just looking at current totals.
        challenge: |
          Swap activity in production is a warning sign, not a feature.
          Understanding the full memory management stack — from page cache
          to OOM killer — is what separates reactive firefighting from
          proactive capacity management.

          Answer the five questions below at the diagnostic depth a
          senior sysadmin would use during a live incident.
        instructions: |
          Key areas this lesson covers:
          — Virtual memory, page cache, and the difference between "used" and "available"
          — swappiness: what it controls, appropriate values for different workloads
          — OOM killer: oom_score, victim selection, how to adjust oom_score_adj
          — Swap as guardrail vs solution: why disabling swap entirely is risky
          — Memory leak identification: RSS growth, smem, /proc/<pid>/smaps
        rubric:
          - criterion: Page cache vs process memory distinguished correctly
            points: 20
            hint: Does the answer correctly explain that buff/cache in free output is not "wasted" memory, and that the "available" column is the correct measure of free memory?
            question: >
              A junior engineer runs `free -h` on a production server and reports
              that "only 200MB of RAM is free — we're almost out of memory."
              The server has 32GB RAM total. Explain what they are likely misreading,
              what the "available" column means vs the "free" column, and how you
              would determine whether the server is actually under memory pressure.
          - criterion: swappiness setting applied correctly to a specific workload
            points: 20
            hint: Does the answer correctly explain what swappiness controls, and justify a specific value recommendation for the described workload with a sound rationale?
            question: >
              You are tuning a Linux server running PostgreSQL as its primary workload.
              The server has 64GB RAM. Explain what the vm.swappiness parameter does,
              what value you would set it to for this workload, and why. What is the
              risk of setting it to 0, and what is the risk of leaving it at the
              default of 60?
          - criterion: OOM killer behaviour explained with intervention options
            points: 20
            hint: Does the answer explain how the OOM killer selects its victim (oom_score), and describe oom_score_adj as the mechanism for protecting or de-prioritising specific processes?
            question: >
              A production server is periodically OOM-killing a critical background
              worker process while the less important web server process survives.
              Explain how the OOM killer chooses which process to kill, and describe
              two approaches to influence its behaviour to protect the worker process.
              What does this recurring OOM event tell you about the server's
              memory capacity planning?
          - criterion: Memory leak diagnosis approach described with correct tooling
            points: 20
            hint: Does the answer describe tracking RSS growth over time, using smem for proportional set size, and looking at /proc/<pid>/smaps — not just reading current memory totals?
            question: >
              A Python web application's memory usage grows steadily from 500MB
              at startup to 4GB over 72 hours before it is restarted. Describe
              the diagnostic approach you would use to confirm this is a memory
              leak, identify which component is leaking, and gather enough
              evidence to hand the problem to the development team.
          - criterion: Swap sizing and role articulated correctly
            points: 20
            hint: Does the answer explain swap as a pressure-relief guardrail rather than extra RAM, describe appropriate sizing, and explain why removing swap entirely is risky?
            question: >
              A colleague proposes removing the swap partition from all production
              servers to "force good memory discipline and prevent slow swap I/O
              from masking memory problems." Evaluate this proposal. What is the
              correct role of swap in a well-managed Linux system, how should
              it be sized, and what is the actual risk of removing it entirely?

      - slug: linux-process-resource-limits
        number: 3
        title: "Process Management & Resource Limits"
        tagline: "Ulimits, cgroups, and the difference between a watchdog and a prayer."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Linux provides a layered system for controlling what resources processes can consume: ulimits at the process level, cgroups at the group level, and systemd resource controls as a management interface over cgroups for service-managed processes. Understanding all three layers — and which one to use for which problem — is essential for running stable multi-service systems where one misbehaving process cannot exhaust resources for everything else. The most common production failure pattern is not a single process crashing, but a runaway process consuming all available memory, CPU, or file descriptors and degrading every other service on the host until the system becomes unresponsive.

          Ulimits (`ulimit -a` to view, `/etc/security/limits.conf` to configure persistently) control per-process limits including: `nofile` (maximum open file descriptors — the most commonly hit limit for network-heavy applications, often requiring an increase from the default 1024 to 65536 or higher); `nproc` (maximum threads/processes per user); `stack` (stack size); and `core` (core dump size). Hard limits are enforced by the kernel and cannot be exceeded; soft limits are the current effective limit and can be raised by the process itself up to the hard limit. Modern systemd services set limits via `LimitNOFILE=`, `LimitNPROC=`, etc. in the service unit file, which is the preferred method for service-specific limits and does not require modifying system-wide configuration files.

          Cgroups (control groups) provide hierarchical resource accounting and limiting at the group level. Cgroups v2, the unified hierarchy now default in modern distributions, provides: `cpu.max` for CPU bandwidth limiting (useful for preventing a CPU-intensive process from starving others); `memory.max` for hard memory limits with OOM kill within the cgroup rather than system-wide; `io.max` for I/O bandwidth limits; and `pids.max` for process count limits. Systemd exposes cgroups through service unit directives like `CPUQuota=`, `MemoryMax=`, `IOWeight=`, and `TasksMax=`. A well-configured production service unit should specify both resource limits (to bound the blast radius of a runaway process) and a restart policy (`Restart=on-failure`, `RestartSec=5`, `StartLimitIntervalSec=`, `StartLimitBurst=`). The common mistake is a watchdog restart policy with no limits: if the service is crashing due to a memory condition, restarting it every five seconds does nothing but consume more resources on the way to a harder crash.
        challenge: |
          Resource limits without measurement are guesses. Resource limits
          without restart policies are hopes. And a watchdog that restarts
          a crashing process indefinitely is not a reliability feature —
          it is deferred failure with extra steps.

          Answer the five questions below with the operational depth of
          someone who has debugged a production resource exhaustion incident.
        instructions: |
          Key areas this lesson covers:
          — ulimits: nofile, nproc, hard vs soft limits, systemd LimitNOFILE
          — cgroups v2: cpu.max, memory.max, io.max, pids.max
          — systemd service unit resource controls: CPUQuota, MemoryMax, TasksMax
          — Restart policies: Restart=on-failure, StartLimitBurst, the restart loop trap
          — Watchdog discipline: when restart policies help vs when they mask root cause
        rubric:
          - criterion: File descriptor limit problem diagnosed and resolved correctly
            points: 20
            hint: Does the answer identify nofile ulimit as the likely cause, describe how to confirm it, and give the correct fix for a systemd-managed service?
            question: >
              A high-traffic Nginx reverse proxy starts returning "too many open
              files" errors under load. The OS reports 150,000 active connections
              but the system has only 8GB RAM and is not memory-constrained.
              Diagnose the problem: what limit is being hit, how do you confirm
              it, and how do you fix it correctly for a systemd-managed service?
              Why might a change to /etc/security/limits.conf alone not fix
              the problem for this service?
          - criterion: cgroups memory limit applied to prevent blast radius
            points: 20
            hint: Does the answer describe setting memory.max or the systemd MemoryMax directive, explain what happens when the limit is hit (OOM kill within cgroup), and justify the limit value?
            question: >
              You are running five microservices on a single 16GB Linux host.
              One of them, a data processing service, occasionally grows to consume
              all available memory and causes OOM kills in the other services.
              Describe how you would use cgroups (via systemd service unit directives)
              to contain this service's memory usage. What happens when the limit
              is hit, and how do you choose the limit value without starving the service?
          - criterion: Restart policy configured correctly without creating a restart loop
            points: 20
            hint: Does the answer describe Restart=on-failure with StartLimitBurst/StartLimitIntervalSec to cap restart attempts, and explain why unlimited restarts of a crashing service are harmful?
            question: >
              A systemd service is configured with `Restart=always` and no other
              restart-related directives. The service crashes on startup due to a
              misconfigured environment variable. Describe what happens to the
              system over the next five minutes, why this is harmful, and how
              you would configure the restart policy correctly to allow recovery
              from transient failures while halting on persistent ones.
          - criterion: Hard vs soft ulimit distinction applied correctly
            points: 20
            hint: Does the answer correctly explain that processes can raise their soft limit up to the hard limit without privilege, but cannot exceed the hard limit, and apply this to a realistic scenario?
            question: >
              An application raises its own file descriptor soft limit at startup
              using `setrlimit()`. The system's soft limit is 1024 and the hard
              limit is 4096. The application requests a soft limit of 8192 and
              fails. Explain why, what the application can and cannot do without
              elevated privileges, and what the correct fix is to allow the
              application to use 8192 file descriptors.
          - criterion: Watchdog restart value vs covering root cause articulated clearly
            points: 20
            hint: Does the answer explain that restart policies are appropriate for transient failures but mask systematic problems, and describe when a restart loop is a signal that requires investigation rather than a longer retry interval?
            question: >
              A monitoring dashboard shows a production service restarting every
              3 minutes, 24 hours a day. The on-call engineer says "it's fine,
              the watchdog keeps it running." Explain why this is not fine, what
              the restart loop is telling you, and what investigation and remediation
              process you would initiate. What metrics or logs would you examine
              first?

      - slug: linux-storage-io
        number: 4
        title: "Storage & I/O Performance"
        tagline: "iowait is a symptom. Knowing what it's a symptom of is the job."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Storage I/O is the most common performance bottleneck in production Linux systems and the most frequently misdiagnosed. High iowait (the CPU time spent waiting for I/O to complete, visible in `top` as the `wa` field) tells you that processes are blocked on I/O — but not which processes, which devices, or what kind of I/O. Diagnosing an I/O problem requires layering tools: `iostat -x 1` for per-device utilisation, await, and queue depth; `iotop` for per-process I/O attribution; `blktrace`/`blkparse` for block-level I/O traces; and `vmstat 1` for the relationship between I/O, swap, and CPU states. A system with 80% iowait is not necessarily broken — a bulk data import legitimately dominates I/O; but 80% iowait on a system that should be serving interactive web requests is a production emergency.

          SSD write endurance is a reliability concern that most administrators underestimate until a drive fails unexpectedly. SSDs have a finite number of program-erase cycles per NAND cell, measured in DWPD (Drive Writes Per Day) or TBW (Terabytes Written). Consumer SSDs (including many used in cloud VMs and budget VPS providers) have significantly lower endurance than enterprise SSDs. The practical implications are: log-heavy applications writing multiple gigabytes per hour can exhaust consumer SSD endurance in months, not years; NVMe drives in high-write database workloads require enterprise-grade hardware rated for the actual write load; and monitoring write amplification and drive health via SMART data (`smartctl -a /dev/sda`) gives advance warning before a drive hits its TBW limit. `nvme smart-log /dev/nvme0` reports percentage_used which directly indicates remaining endurance — a drive at 95% used is approaching end of life.

          Log management is one of the most controllable sources of unnecessary I/O in production systems. Uncontrolled log growth has produced more unplanned outages than most categories of hardware failure. The correct architecture for logs is: application logs written to journald or a structured log aggregator (not raw files that accumulate indefinitely); logrotate or journald size/time limits configured for all file-based logs; tmpfs for genuinely ephemeral data (session files, PID files, temporary uploads, cache files that can be regenerated) to eliminate disk I/O entirely for that category; and monitoring of filesystem utilisation with alerting well before 100% — a full filesystem on the root partition causes systemd, journald, and many applications to fail in difficult-to-diagnose ways. The combination of a disk-full event and aggressive log writes is one of the most reliable ways to turn a manageable incident into an unrecoverable one.
        challenge: |
          iowait numbers without context are noise. An I/O bottleneck you
          cannot attribute to a specific process and device is an I/O
          bottleneck you cannot fix.

          Answer the five questions below with the tool-level precision
          of someone who has diagnosed a live I/O performance incident.
        instructions: |
          Key areas this lesson covers:
          — iowait: what it measures, what it does not tell you, tools to drill down
          — iostat, iotop, blktrace: choosing the right tool for the question
          — SSD write endurance: DWPD, TBW, SMART monitoring, nvme smart-log
          — Log management: logrotate, journald limits, tmpfs for ephemeral data
          — Filesystem capacity monitoring: why 100% root filesystem is catastrophic
        rubric:
          - criterion: iowait diagnosis approach described with correct tooling progression
            points: 20
            hint: Does the answer correctly describe iowait as a symptom requiring further investigation, and progress from iostat (device level) to iotop (process level) to identify the root cause?
            question: >
              A production web server shows 75% iowait in `top`. Walk through
              your diagnostic process step by step: what commands you run, in
              what order, what you are looking for at each step, and what
              distinguishes a genuine I/O bottleneck requiring intervention from
              a legitimate high-I/O workload that is operating normally.
          - criterion: SSD write endurance risk identified and monitored correctly
            points: 20
            hint: Does the answer describe SMART monitoring, nvme smart-log percentage_used, and the write load patterns (logs, databases) that accelerate wear?
            question: >
              You inherit a production Linux server that has been running for
              two years on a consumer NVMe SSD. The server runs a PostgreSQL
              database with heavy write load and verbose application logging.
              Describe how you would assess the drive's remaining endurance,
              what commands you would run, what output would concern you,
              and what you would do if the drive is at 70% of its rated TBW.
          - criterion: tmpfs use case applied correctly with trade-offs understood
            points: 20
            hint: Does the answer correctly identify data categories appropriate for tmpfs (ephemeral, regenerable, high-write), and explain the trade-off (data lost on reboot/crash)?
            question: >
              A PHP application writes session files to /var/lib/php/sessions/
              at a rate of 10,000 writes per minute under peak load, causing
              measurable iowait. Describe how you would use tmpfs to eliminate
              this I/O, including the exact configuration, the persistence
              trade-off this introduces, and what application behaviour must
              be confirmed before making this change.
          - criterion: Log rotation and growth control described with configuration specifics
            points: 20
            hint: Does the answer describe logrotate configuration (size, rotate, compress, postrotate) and/or journald SystemMaxUse — not just "use logrotate"?
            question: >
              A production server's /var/log partition is at 94% utilisation.
              Investigation shows that a single application is writing 2GB of
              logs per day with no rotation configured. Describe the immediate
              remediation steps and the permanent log management configuration
              you would implement. Include the specific logrotate directives
              for daily rotation, 7-day retention, compression, and the
              postrotate signal to the application.
          - criterion: Full filesystem consequences explained and monitoring approach described
            points: 20
            hint: Does the answer correctly identify that a full root filesystem causes systemd, journald, and application failures — and describe filesystem utilisation monitoring with appropriate alerting thresholds?
            question: >
              A production server becomes unresponsive at 03:00. Investigation
              shows the root filesystem is at 100%. Describe the immediate
              recovery procedure and the cascade of failures a full root
              filesystem causes. What monitoring and alerting configuration
              would have given you advance warning, and at what utilisation
              threshold should an alert fire to allow adequate response time?

      - slug: linux-observability-tuning
        number: 5
        title: "Observability & Proactive Tuning"
        tagline: "The system will always tell you it's dying. The question is whether you're listening."
        difficulty: intermediate
        lesson_type: knowledge
        content: |
          Observability is not the same as monitoring. Monitoring asks "is it up?" — a binary question answered by uptime checks and ping tests. Observability asks "what is the system doing, and why?" — a continuous question answered by metrics, logs, and traces that together allow you to understand the internal state of a system from its external outputs. For a Linux system administrator, the practical difference is between knowing that a server is "up" (it responds to HTTP health checks) and knowing that it is healthy — that memory is not under pressure, that I/O is not saturated, that process counts are within expected ranges, that no services are in restart loops, and that filesystem utilisation is not trending toward a capacity event.

          The minimum viable observability stack for a Linux production server covers four domains. Resource utilisation: CPU usage (broken down into user, system, iowait, and steal — steal is particularly important in VM environments as it indicates the hypervisor is overcommitting CPU across tenants), memory pressure (available memory and swap usage rate, not just total used), disk I/O utilisation, and network throughput. Process health: systemd service states (`systemctl --failed` for a summary of failed units), process restart counts, and the presence of zombie processes. Storage: filesystem utilisation with trend data, inode utilisation (a filesystem can be full of inodes while showing plenty of space), and disk SMART health. Application signals: error rates, response times, and queue depths — because a system can look healthy at the OS level while the application layer is degrading. The tools for interactive investigation include `bpytop` or `htop` for CPU and memory, `iotop` for I/O attribution, `nethogs` for per-process network attribution, and `ss -s` for socket state summaries.

          Proactive tuning means acting on trend data before thresholds are breached. A server whose available memory has declined from 8GB to 2GB over two weeks is not yet in crisis, but it is trending toward one — and the investigation should happen now, during business hours, not at 03:00 when it hits zero. The discipline requires: alerting on rate-of-change as well as absolute thresholds (a filesystem at 60% utilisation growing by 2% per day is more urgent than one at 80% that has been stable for months); regular review of capacity headroom across all constrained resources; and acted-on post-mortem findings. The most reliable predictor of the next production incident is an unresolved finding from the last one. Organisations that run post-mortems but do not close their action items will reliably reproduce the same classes of incident until they do.
        challenge: |
          Observability infrastructure you do not act on is an expensive
          feeling of safety. The value is not in collecting the data —
          it is in the changes made because of it.

          Answer the five questions below with the operational discipline
          of a team that has reduced its incident rate, not just survived it.
        instructions: |
          Key areas this lesson covers:
          — Monitoring vs observability: the distinction and why it matters
          — Minimum viable observability: CPU steal, memory pressure, disk inodes, service states
          — bpytop, htop, iotop, nethogs, ss: choosing the right tool for the question
          — Alerting on rate-of-change vs absolute thresholds
          — Post-mortem discipline: why unresolved findings predict future incidents
        rubric:
          - criterion: CPU steal identified and interpreted in a VM context
            points: 20
            hint: Does the answer correctly explain CPU steal as time the VM's vCPU is waiting for the hypervisor (not available for the VM's processes), and describe what it indicates about the hosting environment?
            question: >
              A production VM shows 18% CPU steal consistently during peak hours.
              The VM itself is underutilised — application CPU usage is only 30%.
              Explain what CPU steal is, what 18% steal indicates about the
              hosting environment, and what the practical performance impact is
              on the application. What options does a sysadmin have when
              experiencing persistent high steal?
          - criterion: Inode exhaustion diagnosed correctly and distinguished from space exhaustion
            points: 20
            hint: Does the answer correctly explain that inodes are separate from disk space, that a filesystem can have space available while being inode-exhausted, and describe how to diagnose and fix it?
            question: >
              Applications on a production server begin failing with "no space
              left on device" errors. `df -h` shows the filesystem is only
              at 45% capacity. Explain what is actually causing the error,
              how you diagnose it, which workload patterns typically cause
              this condition, and how you resolve it without reformatting
              the filesystem.
          - criterion: Rate-of-change alerting justified over absolute threshold alerting
            points: 20
            hint: Does the answer explain why a stable 80% is less urgent than a growing 60%, and describe how to implement trend-based alerting?
            question: >
              Your monitoring system alerts when filesystem utilisation exceeds
              85%. A filesystem has been at 82% for six months with no growth.
              Another filesystem is at 55% but has grown from 40% in the past
              three weeks. Which should you act on first, and why? Describe
              how you would configure alerting to detect growth rate as well
              as absolute thresholds.
          - criterion: Observability gap between OS health and application health articulated
            points: 20
            hint: Does the answer correctly explain that OS-level metrics (CPU, memory, disk) can look healthy while the application is degrading, and describe what application-layer signals to monitor?
            question: >
              A server passes all infrastructure health checks — CPU under 40%,
              memory pressure low, no failed systemd units, disk utilisation
              normal. Users are reporting slow response times and intermittent
              errors. Explain the gap between OS-level health and application
              health, what additional signals you would look at to understand
              the application-layer degradation, and what tools you would use.
          - criterion: Post-mortem action item discipline connected to incident reduction
            points: 20
            hint: Does the answer explain that unresolved post-mortem findings predict future incidents, and describe a governance mechanism for tracking and closing action items?
            question: >
              Your team has run post-mortems after every major incident for
              the past year and has produced 47 action items. A review shows
              that 31 of them have not been completed. Three recent incidents
              were caused by conditions that were identified as findings in
              previous post-mortems. What does this pattern indicate, and
              what governance and process changes would you implement to
              ensure post-mortem findings translate into actual reliability
              improvements?

  # ============================================================
  # COURSE 17 — Ehlers-Danlos Syndrome Awareness
  # ============================================================
  - slug: ehlers-danlos-syndrome
    title: "Ehlers-Danlos Syndrome Awareness"
    tagline: "The condition that bends without breaking."
    description: >
      Five compassionate, accurate lessons covering EDS from first principles —
      what it is, how it presents, what living with it looks like, and how to
      support the people who have it. Written for patients, carers, and anyone
      who wants to understand one of the most underdiagnosed conditions in medicine.
    icon: "🧬"
    tier: 1
    lessons:

      - slug: eds-what-is-eds
        number: 1
        title: "What is EDS?"
        tagline: "Connective tissue, collagen, and the 13 subtypes."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Ehlers-Danlos Syndrome (EDS) is not one condition — it is a group of thirteen heritable connective tissue disorders, all of which share a common thread: something has gone wrong with collagen. Collagen is the structural protein that holds the body together. It is found in skin, joints, ligaments, tendons, blood vessel walls, and organs. When collagen is faulty — either because of how it is produced, processed, or what type is made — the structures it supports become fragile, stretchy, or unstable in ways that cause real, often severe, and frequently invisible suffering.

          The thirteen subtypes of EDS are each distinct conditions with different genetic causes, different clinical presentations, and different implications. Classical EDS (cEDS) is caused by mutations in COL5A1 or COL5A2 genes and produces fragile, stretchy skin and significant joint hypermobility. Vascular EDS (vEDS) is caused by mutations in COL3A1 and is the most life-threatening subtype — arterial and organ rupture are genuine risks, and many patients do not survive past middle age. Kyphoscoliotic EDS (kEDS), Dermatosparaxis EDS (dEDS), and others each have known genetic markers that can be confirmed by targeted testing.

          The most common subtype — hypermobile EDS (hEDS) — affects the majority of EDS patients and is, paradoxically, the only subtype without a confirmed genetic marker as of 2024. This is not because the genetic cause does not exist; researchers believe it does. It is because the genetics of hEDS are almost certainly polygenic and complex, and the research required to characterise it fully has been chronically underfunded. The diagnostic criteria for hEDS were revised in 2017 specifically to improve accuracy and reduce over-diagnosis, and they rely on clinical assessment of joint hypermobility, skin findings, family history, and the exclusion of other diagnoses.

          EDS is estimated to affect between 1 in 2,500 and 1 in 5,000 people for the rarer subtypes, while hEDS may affect as many as 1 in 500. It is not rare in the way some conditions are rare — it is underdiagnosed, and for reasons we will explore in the next lesson, that underdiagnosis can span years or even decades. EDS affects all sexes, all ethnicities, and all ages. It is not a childhood condition that resolves — it is a lifelong condition that requires lifelong management.

          One important point about EDS and the broader community: many people with EDS also meet criteria for hypermobile spectrum disorder (HSD), a related but distinct diagnosis for those who have symptomatic hypermobility without meeting the full hEDS criteria. HSD is not a lesser diagnosis — its impact on quality of life is comparable, and both conditions benefit from the same management approaches.
        challenge: |
          In your own words, explain what Ehlers-Danlos Syndrome is,
          why collagen matters, and what makes hEDS unusual compared to
          the other subtypes.

          Imagine explaining this to someone who has just heard the name
          for the first time — a friend, a colleague, a family member.
        instructions: |
          Think about:
          — What connective tissue is and why collagen specifically matters
          — The thirteen subtypes and what distinguishes them
          — Why hEDS is the most common but the least understood genetically
          — What it means to have a condition with no confirmatory blood test
          — Who gets EDS and how common it might actually be
        rubric:
          - criterion: Collagen and connective tissue explained accurately
            points: 20
            hint: Does the answer explain what collagen does and why its dysfunction causes problems?
            question: Explain in your own words what collagen is and what happens when it is faulty in EDS. Why does this affect so many different parts of the body?
          - criterion: Multiple subtypes acknowledged
            points: 20
            hint: Does the answer acknowledge that EDS is not a single condition?
            question: Name at least three EDS subtypes and describe what distinguishes them from each other. What do all subtypes have in common?
          - criterion: hEDS correctly identified as most common and genetically unconfirmed
            points: 20
            hint: Does the answer correctly state that hEDS has no confirmed genetic marker?
            question: What makes hEDS unusual compared to subtypes like cEDS or vEDS? Why does it not have a genetic test, and what does that mean for patients?
          - criterion: Scope and prevalence understood
            points: 20
            hint: Does the answer convey that EDS is underdiagnosed rather than simply rare?
            question: Is EDS rare? How would you explain its prevalence — or why its prevalence is difficult to know — to someone who just asked?
          - criterion: Empathy and accuracy in framing
            points: 20
            hint: Does the answer convey EDS as a real, serious, lifelong condition without being alarmist?
            question: How would you explain EDS to a friend who has just been diagnosed? What would you make sure they understood in the first few minutes of that conversation?

      - slug: eds-symptoms-diagnosis
        number: 2
        title: "Symptoms & Diagnosis"
        tagline: "The long road to a name."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          EDS presents differently in almost every person who has it, which is one reason it takes so long to diagnose. The average time from first symptom to confirmed diagnosis for hypermobile EDS is between ten and twelve years. That is a decade or more of pain, dismissal, misdiagnosis, and frequently being told that symptoms are psychological. Understanding why this happens — and what the diagnostic criteria actually look like — is important for anyone who cares about someone with EDS, or who suspects they might have it themselves.

          The cardinal features of hypermobile EDS are joint hypermobility, musculoskeletal pain, and skin changes. Joint hypermobility means joints that move beyond their normal range — fingers that hyperextend past 90 degrees, knees that hyperextend backwards, a thumb that reaches the forearm. The Beighton score is a nine-point scale used to quantify hypermobility, and a score of five or more is one component of the hEDS diagnostic criteria. However, hypermobility decreases with age, which means people who were highly hypermobile in childhood may score below the threshold by their forties, even while still having significant joint instability and pain.

          The skin in hEDS is often soft and velvety to the touch, may be mildly stretchy, and heals slowly or poorly. Stretch marks appearing in unusual places or at young ages — on the thighs of a twelve-year-old, or on the shoulders of someone who has never been overweight — can be an early sign. Wounds may widen into so-called "cigarette paper" scars. In classical EDS, these features are more pronounced, and skin fragility is more severe.

          Chronic pain is almost universal in EDS. It is often widespread, poorly localised, and worsened by activity in ways that do not follow the patterns clinicians expect from more common pain conditions. Fatigue is equally common and equally disabling — not tiredness that resolves with rest, but bone-deep exhaustion that compounds over time. Both pain and fatigue are frequently dismissed as functional or psychosomatic, particularly in women, who make up the majority of EDS diagnoses and who face well-documented gender bias in pain assessment.

          EDS very commonly co-occurs with other conditions: Postural Orthostatic Tachycardia Syndrome (POTS), a form of dysautonomia where standing causes an abnormal heart rate increase and symptoms including dizziness, pre-syncope, and cognitive impairment; Mast Cell Activation Syndrome (MCAS), where mast cells trigger inappropriate allergic-type reactions; and gastrointestinal dysmotility, including gastroparesis. These comorbidities are not coincidental — the same connective tissue dysfunction that affects joints also affects blood vessel walls, nerves, and the gut. A patient presenting with multiple unexplained conditions simultaneously should raise EDS as a possibility.

          The diagnostic criteria for hEDS, revised by the International EDS Consortium in 2017, require the presence of all three of the following: generalised joint hypermobility (defined by Beighton score or equivalent), at least two of three systemic features (tissue fragility features, family history, musculoskeletal complications), and the exclusion of other relevant diagnoses. There is no blood test for hEDS. Diagnosis is clinical, and it requires a clinician who knows what to look for — which is itself part of the problem.
        challenge: |
          Explain why EDS is so frequently misdiagnosed or diagnosed late,
          and what the diagnostic process for hypermobile EDS actually involves.

          Include in your answer the role that gender bias plays, and what
          the common comorbidities suggest about the condition's underlying cause.
        instructions: |
          Think about:
          — What the typical symptom picture looks like, and why it doesn't fit neat categories
          — How long diagnosis typically takes, and why
          — The Beighton score and its limitations
          — How skin features and pain patterns present
          — POTS, MCAS, and GI dysmotility as comorbidities — and why they co-occur
          — Gender bias in pain and diagnosis
          — What the 2017 hEDS criteria actually require
        rubric:
          - criterion: Diagnostic delay and its causes explained
            points: 20
            hint: Does the answer explain both the length of the diagnostic journey and the reasons for it?
            question: Why does it take so long to diagnose hEDS? Give at least three specific reasons — not just "doctors don't know about it."
          - criterion: Core symptoms described accurately
            points: 20
            hint: Does the answer cover hypermobility, pain, skin features, and fatigue?
            question: Describe the main symptoms of hEDS. Include joint, skin, pain, and fatigue features. What makes this symptom picture difficult to recognise?
          - criterion: Comorbidities and their connection to EDS understood
            points: 20
            hint: Does the answer mention POTS, MCAS, or GI issues and explain why they co-occur?
            question: Name two common EDS comorbidities and explain why they occur alongside EDS rather than being coincidental. What do they share mechanistically?
          - criterion: Gender bias acknowledged and explained
            points: 20
            hint: Does the answer address how gender affects the diagnostic journey?
            question: How does gender bias affect EDS diagnosis specifically? Why are women with EDS more likely to be told their symptoms are psychological?
          - criterion: Diagnostic criteria for hEDS correctly described
            points: 20
            hint: Does the answer accurately describe what is needed for a diagnosis, including the lack of a genetic test?
            question: What does an hEDS diagnosis actually require? What three things must be confirmed, and what does the absence of a genetic test mean for the patient and clinician?

      - slug: eds-living-with-eds
        number: 3
        title: "Living with EDS"
        tagline: "Pacing, adapting, and finding a new normal."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Living with EDS means navigating a condition that is invisible, variable, and often misunderstood by the people around you. On a good day, someone with EDS might appear completely well. On a bad day — which may follow the good day simply because of what happened on the good day — they may be unable to get out of bed, think clearly, or tolerate noise and light. This variability is not inconsistency. It is the nature of the condition, and understanding it is essential for anyone supporting a person with EDS.

          Pacing is the single most important practical concept in EDS management. It is the practice of managing energy and physical exertion to avoid exceeding capacity — not because doing more is dangerous in the moment, but because overdoing it triggers what is often called "post-exertional malaise" or a flare: a period of increased pain, fatigue, and dysfunction that can last days or weeks. Pacing is not laziness. It is the deliberate management of a finite resource. People with EDS often describe the "boom-and-bust" pattern they fall into before learning to pace: doing too much on a good day, crashing badly the next, resting until they feel better, doing too much again. Learning to stay below the threshold — even when you feel good — is one of the hardest things EDS asks of people.

          Joint protection is equally important. Because ligaments in EDS are lax, joints rely disproportionately on muscles to hold them stable. Subluxations — partial dislocations where a joint moves partially out of position and back, often causing significant pain — are common. Bracing, splinting, and taping can provide additional support. Avoiding positions and activities that place load on hypermobile joints in vulnerable configurations (particularly end-range positions) protects against both acute subluxation and cumulative damage. Occupational therapy can be transformative in identifying adaptations — from how to hold a pen to how to organise a kitchen — that reduce load on vulnerable joints throughout the day.

          The mental health impact of EDS is profound and frequently underaddressed. Depression and anxiety are significantly more prevalent in EDS populations than in the general public. This is not simply a psychological reaction to pain — though that is real and legitimate — it is also related to the neurobiological effects of chronic pain, the isolation that disability can cause, the grief of losing a life that was expected, and the specific exhaustion of spending years being disbelieved. Many people with EDS have been through diagnostic odysseys during which their pain was attributed to anxiety rather than recognised as its cause. The psychological damage of that experience does not resolve when a diagnosis is finally given.

          Social and occupational functioning is frequently affected. Managing education, employment, and relationships while managing an unpredictable chronic condition requires flexibility that workplaces and social environments often do not naturally provide. Reasonable adjustments — flexible hours, working from home, permission to stand or change position, reduced commuting — can make the difference between someone with EDS remaining in work or being forced out of it. Clear, specific communication about needs — both to employers and to friends and family — is a skill that matters enormously, and one that many people with EDS have had to learn the hard way.
        challenge: |
          A close friend has just told you they were diagnosed with hEDS
          three months ago. They seem overwhelmed and don't know where to start.

          What would you tell them about pacing, joint protection, and mental health?
          What would you want them to know that they might not have been told yet?
        instructions: |
          Think about:
          — What pacing is and why it matters more than almost anything else
          — The boom-and-bust cycle and how to break it
          — Joint protection strategies — bracing, splinting, movement patterns
          — The mental health landscape of EDS and why it is not simply secondary
          — The grief and loss dimension of chronic illness diagnosis
          — What workplace and social adjustments can make a real difference
        rubric:
          - criterion: Pacing explained clearly and compassionately
            points: 20
            hint: Does the answer explain pacing in terms a newly diagnosed person could actually use?
            question: How would you explain pacing to your friend? Describe what it means, why it matters, and what happens when people don't do it. Be specific.
          - criterion: Joint protection strategies described
            points: 20
            hint: Does the answer address practical joint protection — not just "be careful"?
            question: What specific joint protection strategies would you mention? Why do joints need extra protection in EDS when they don't in most people?
          - criterion: Mental health dimension addressed with empathy
            points: 20
            hint: Does the answer acknowledge the psychological impact of EDS without reducing it to "it's hard to be sick"?
            question: What would you tell your friend about the mental health impact of EDS? Why is the psychological dimension of this diagnosis not simply a side effect of the physical one?
          - criterion: Grief and diagnosis experience acknowledged
            points: 20
            hint: Does the answer acknowledge what it means to have spent years undiagnosed and then receive a label?
            question: Your friend says they feel relieved to have a name but devastated at the same time. What is happening for them, and what would you say?
          - criterion: Practical daily life adaptations mentioned
            points: 20
            hint: Does the answer mention at least two concrete real-world adaptations?
            question: Name two specific adaptations — at work, at home, or socially — that can make a real difference for someone with EDS. Why does each one help?

      - slug: eds-treatment-support
        number: 4
        title: "Treatment & Support"
        tagline: "What helps, what doesn't, and why."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          There is no cure for EDS, and no treatment that addresses its underlying cause. What exists is a range of management strategies that can meaningfully improve quality of life — and a smaller range of interventions that can make things significantly worse. Understanding both is essential, because people with EDS often encounter well-meaning clinicians, trainers, or family members who recommend approaches that are, for EDS specifically, harmful.

          Physical therapy is the most evidence-supported intervention for hEDS, but only when provided by a therapist who understands EDS. Standard physiotherapy protocols — the kind applied to sports injuries or post-operative rehabilitation — are frequently inappropriate. Aggressive stretching, which is often recommended for musculoskeletal pain in the general population, is contraindicated in hypermobile EDS. Hypermobile joints do not need more range of motion. They need stability. The correct approach in EDS physiotherapy focuses on strengthening the muscles that stabilise hypermobile joints: proprioceptive exercises, closed-chain movements, isometric strengthening, and gradual, load-progressive programmes designed to build muscle support without pushing joints to end-range positions. Hydrotherapy and Pilates, adapted for EDS, are often well-tolerated starting points. High-impact exercise, heavy weightlifting without specialist guidance, and activities requiring joint loading at end range should generally be avoided until a stable strengthening programme is in place.

          Pain management in EDS is complex and requires a multidisciplinary approach. Paracetamol and NSAIDs provide limited relief for many patients and often become less effective over time. Neuropathic pain agents — pregabalin, gabapentin, duloxetine, amitriptyline — may help when pain has a neuropathic component. Low-dose naltrexone (LDN) is used off-label by some patients with promising self-reported results, though controlled evidence remains limited. Opioids are generally not recommended for EDS — they do not address the underlying mechanical cause, tolerance develops quickly, and they can worsen associated conditions such as POTS. Interventional pain procedures (injections, nerve blocks) may provide temporary relief but do not address underlying instability.

          The multidisciplinary team for EDS ideally includes a rheumatologist or geneticist for diagnosis and monitoring, a physiotherapist with EDS experience, an occupational therapist, and — because of the high prevalence of comorbidities — cardiologists, gastroenterologists, or allergists as needed. In practice, accessing this team is difficult. EDS specialists are few, waiting lists are long, and many healthcare providers are unfamiliar with EDS. Patient organisations — the EDS Society, Ehlers-Danlos Support UK, and national equivalents — maintain directories of informed practitioners and are often the most practical first step for newly diagnosed patients seeking specialist care.

          Psychological support is part of treatment, not separate from it. Acceptance and Commitment Therapy (ACT) and pain-adapted Cognitive Behavioural Therapy (CBT) have evidence in chronic pain populations and can help people build a functioning life alongside their condition. It is important that this is framed correctly to patients: psychological support is not a suggestion that pain is not real. It is recognition that living with real, severe, chronic pain requires psychological tools that most people are not born with.
        challenge: |
          A physiotherapist has suggested your friend with EDS start an aggressive
          stretching programme "to improve flexibility." Your friend asks you whether
          this sounds right.

          Explain what treatment approaches are actually recommended for EDS,
          what approaches are potentially harmful, and how to find the right support.
        instructions: |
          Think about:
          — Why aggressive stretching is wrong for hypermobile EDS specifically
          — What physiotherapy for EDS should actually look like
          — Pain management options — pharmacological and otherwise
          — The multidisciplinary team and who should be on it
          — How to access specialist care when it is hard to find
          — The role of psychological support in chronic pain — and how to frame it correctly
        rubric:
          - criterion: Why stretching is contraindicated explained correctly
            points: 20
            hint: Does the answer explain the specific reason stretching is wrong for hEDS, not just that it is wrong?
            question: Why is aggressive stretching contraindicated for hypermobile EDS? What is the physiotherapist getting wrong about what hEDS joints need?
          - criterion: Correct physiotherapy approach described
            points: 20
            hint: Does the answer describe stabilisation and strengthening rather than flexibility work?
            question: What should physiotherapy for EDS actually focus on? Describe the correct approach — including the types of exercises that are typically appropriate.
          - criterion: Pain management options covered accurately
            points: 20
            hint: Does the answer address pharmacological options and their limitations?
            question: What pain management options are used in EDS? For each one you name, explain its role and any important limitations or caveats.
          - criterion: Multidisciplinary team and access described
            points: 20
            hint: Does the answer mention the team needed and how to actually access specialist care?
            question: Who should ideally be involved in managing EDS? How would you advise your friend to find practitioners who actually understand EDS?
          - criterion: Psychological support framed correctly
            points: 20
            hint: Does the answer address psychological support in a way that does not imply symptoms are psychosomatic?
            question: Your friend worries that being referred to a psychologist means their doctor thinks the pain is in their head. What would you tell them? How should psychological support be framed in EDS?

      - slug: eds-advocacy-research
        number: 5
        title: "Advocacy & Research"
        tagline: "Your voice matters. Use it well."
        difficulty: beginner
        lesson_type: knowledge
        content: |
          Living with EDS, or supporting someone who does, often requires becoming an advocate — for yourself, for your care, and sometimes for recognition of the condition itself. This is not how it should be, but it is how it is. The medical system was not designed with complex, multi-system, underdiagnosed conditions in mind, and navigating it well requires skills that are not taught anywhere but are desperately needed.

          Advocating for yourself in a medical consultation begins before you walk through the door. Keeping a symptom diary — specific, dated, quantified where possible — transforms vague descriptions into evidence. "I've been in pain" is easy to dismiss. "I have been tracking my pain for three months. Here are the dates, the severity scores, the triggers, and what I tried." is not. Bringing a trusted person to appointments can help both with memory (the cognitive impact of pain and anxiety means people often forget what was said) and with being taken seriously. Asking for your concerns to be documented — and following up in writing — creates a record that makes dismissal harder and accountability clearer.

          Finding the right specialists is one of the most practically important challenges for people with EDS. General practitioners vary enormously in their familiarity with EDS — some are knowledgeable and helpful, many are not. Rheumatologists, geneticists, and neurologists with EDS experience are the most useful referral targets. The EDS Society's "Find a Healthcare Provider" directory, maintained at ehlers-danlos.com, is the most widely used international resource. In the United Kingdom, Ehlers-Danlos Support UK maintains a similar list. When seeing a new clinician, having a brief written summary of your diagnosis, key symptoms, current medications, and what has and has not helped can short-circuit the need to start from scratch at every appointment.

          Research into EDS has accelerated since the 2017 criteria revision, but remains significantly underfunded relative to prevalence. The most active research areas include: identifying the genetic architecture of hEDS (multiple gene variants are suspected to act additively); developing biomarkers that could make diagnosis more objective; understanding the mechanisms linking hypermobility to dysautonomia and MCAS; and evaluating treatment protocols more rigorously. Patient registries — where people with EDS contribute their data — are a significant driver of this research, and participation is one of the most meaningful ways individuals can contribute to progress.

          Supporting someone with EDS well means starting from belief, not scepticism. The single most damaging thing you can say to someone with EDS is some version of "but you don't look sick." Invisible illness is real illness. The fatigue, pain, and cognitive symptoms of EDS are not invented, amplified, or a personality trait. Practical support — offering to carry things, not pressuring someone to attend events they have already said they cannot manage, understanding that cancellations are not personal — makes a real difference. So does informing yourself rather than requiring the person with EDS to educate you every time the subject comes up. The fact that you are completing this course is already an act of support.
        challenge: |
          Someone close to you has EDS and has asked for your help preparing
          for a difficult appointment with a specialist who has previously
          dismissed their symptoms.

          What practical preparation would you recommend before the appointment?
          What would you tell them about advocating for themselves in the room?
          And what does the current state of EDS research mean for someone
          who has just been diagnosed — is there reason for hope?
        instructions: |
          Think about:
          — What practical preparation makes a consultation more productive
          — How to document symptoms in a way that is harder to dismiss
          — What to do if a clinician is dismissive or uninformed
          — How to find good specialists
          — The current state of EDS research and what it means for newly diagnosed patients
          — What supporting someone with EDS looks like in practice
        rubric:
          - criterion: Practical pre-appointment preparation described
            points: 20
            hint: Does the answer give specific, actionable preparation steps — not just "be organised"?
            question: What specific steps would you recommend before the appointment? Give at least three concrete actions your friend could take to prepare.
          - criterion: In-consultation advocacy strategies explained
            points: 20
            hint: Does the answer address how to handle the appointment itself, including the risk of dismissal?
            question: Your friend has been dismissed before. What specific strategies would you recommend for the consultation itself? How do you advocate without being dismissed again?
          - criterion: Specialist-finding resources mentioned
            points: 20
            hint: Does the answer mention specific resources — not just "find a specialist"?
            question: How would you help your friend find a clinician who actually understands EDS? Name at least one specific resource or approach.
          - criterion: Research landscape described accurately and hopefully
            points: 20
            hint: Does the answer give an honest but encouraging picture of where EDS research stands?
            question: What would you tell a newly diagnosed friend about EDS research? Where is it heading, and why is there reason for cautious optimism?
          - criterion: Supporting someone with EDS described with insight
            points: 20
            hint: Does the answer address what good support looks like — and what to avoid?
            question: What does supporting someone with EDS well look like in practice? Name two things that help and one thing that — however well-intentioned — often makes things harder.

